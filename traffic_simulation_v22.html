// ================================================================
// ===== 車プロフィールポップアップ =====
// ================================================================
// 駐車場ノードのスロット座標を返す（クリック判定・描画共通）
// 戻り値: [{wx, wy, cw, ch}]（ワールド座標）
function getParkingSlotPositions(n){
  const dox = n.drawOffsetX || 0;
  const doy = n.drawOffsetY || 0;
  const dx = n.x + dox, dy = n.y + doy;
  const result = [];

  if(n.houseType === 'sparse'){
    // 住宅: パターン別駐車スペース
    const patterns=[
      {x:2,  y:54, w:20, h:10},
      {x:48, y:54, w:20, h:10},
      null,
      {x:2,  y:4,  w:20, h:10},
      {x:48, y:4,  w:20, h:10},
    ];
    const pat = patterns[(n.housePattern||0)%5];
    if(pat && n.parkedCars && n.parkedCars.length > 0){
      const lx = n.x - 18, ty = n.y - 18;
      result.push({
        wx: lx + pat.x + pat.w/2,
        wy: ty + pat.y + pat.h/2,
        cw: 18, ch: 8,
        car: n.parkedCars[0]
      });
    }
    return result;
  }

  // 通常駐車場: SLOTS配列を再現
  if(!n.parkedCars) return result;

  // SLOTS_V
  const SLOTS_V = [];
  for(let row=0; row<6; row++){
    const cy = -27.5 + row*11;
    SLOTS_V.push({cx:-14, cy, cw:18, ch:9});
    SLOTS_V.push({cx: 14, cy, cw:18, ch:9});
  }
  // SLOTS_ST2
  const SLOTS_ST2 = [];
  for(let i=0;i<12;i++) SLOTS_ST2.push({cx:-15.25, cy:-49.5+i*9, cw:20.5, ch:9.5});
  for(let i=0;i<12;i++) SLOTS_ST2.push({cx: 14.75, cy:-49.5+i*9, cw:20.5, ch:9.5});
  // SLOTS_LARGE (48台)
  const SLOTS_LARGE = [];
  const largeL = [-49.25,-29.25,-9.25,10.75,30.75];
  for(const cx of largeL.slice(0,2)) for(let r=0;r<12;r++) SLOTS_LARGE.push({cx, cy:-54.75+r*9.0, cw:20.5, ch:9.5});
  for(const cx of largeL.slice(2))   for(let r=0;r<12;r++) SLOTS_LARGE.push({cx, cy:-54.75+r*9.0, cw:20.5, ch:9.5});
  // SLOTS standard (12台)
  const SLOTS_STD = [
    {cx:-19.25,cy:-24.75,cw:20.5,ch:9.5},{cx:-19.25,cy:-15,cw:20.5,ch:10},
    {cx:-19.25,cy:-5,   cw:20.5,ch:10}, {cx:-19.25,cy: 5, cw:20.5,ch:10},
    {cx:-19.25,cy:15,   cw:20.5,ch:10}, {cx:-19.25,cy:24.75,cw:20.5,ch:9.5},
    {cx: 18.75,cy:-24.75,cw:20.5,ch:9.5},{cx: 18.75,cy:-15,cw:20.5,ch:10},
    {cx: 18.75,cy:-5,   cw:20.5,ch:10}, {cx: 18.75,cy: 5, cw:20.5,ch:10},
    {cx: 18.75,cy:15,   cw:20.5,ch:10}, {cx: 18.75,cy:24.75,cw:20.5,ch:9.5},
  ];
  // SLOTS_HOUSE
  const SLOTS_HOUSE = [{cx:0, cy:0, cw:18, ch:8}];

  const SLOTS = n.isStationParking2 ? SLOTS_ST2
              : n.isVertical ? SLOTS_V
              : n.isLarge    ? SLOTS_LARGE
              : SLOTS_STD;

  for(const p of n.parkedCars){
    if(p.slot < 0 || p.slot >= SLOTS.length) continue;
    const sl = SLOTS[p.slot];
    result.push({
      wx: dx + sl.cx,
      wy: dy + sl.cy,
      cw: sl.cw * 0.80,
      ch: sl.ch * 0.68,
      car: p
    });
  }
  return result;
}

function updateCarProfileBody(car, body){
  // 目的地ノード
  const destNode = car.route.length > 0
    ? car.route[car.route.length-1].edge.to
    : null;
  // car.destLabel が明示設定されていればそちらを優先
  const exitNum = destNode && destNode.external && destNode.exitNumber
    ? ` (出口${destNode.exitNumber})` : '';
  const destLabel = car.destLabel
    ? car.destLabel
    : destNode
      ? (destNode.type==='parking' ? '🅿 駐車場' :
         destNode.external ? `🚪 出口${destNode.exitNumber || ''}` :
         destNode.type==='cross' ? '🔀 交差点（経由地）' :
         destNode.type)
      : '不明';

  // 残りルート
  const remain = car.route.length - car.routeIdx;

  // 現在エッジ種別
  const edgeTypeLabel =
    (car.edge.from && car.edge.from.isRoundabout)
      ? '🔄 ラウンドアバウト走行中'
      : ({
          main: '🛣 幹線（2車線）',
          branch: '🛤 支線',
          oneway: '↗ 一方通行',
        }[car.edge.type] || car.edge.type);

  // 速度と制限速度
  const roadLimit = SPEED_LIMIT[car.edge.type] || car.maxSpeed;
  const speedPct = Math.round((car.speed / roadLimit) * 100);
  const limitKmh = SPEED_LIMIT_KMH[car.edge.type] || '—';
  const speedKmh = Math.round(car.speed / roadLimit * limitKmh);

  // 停止理由
  const stopLabel = car.stopReason
    ? `<span style="color:#ff8080">⚠ ${car.stopReason}</span>`
    : car.speed < 0.05
      ? '<span style="color:#ff6060">⚠ 停止中（理由不明）</span>'
      : '<span style="color:#80ff80">✓ 走行中</span>';

  // 前方車
  const currentLaneArr = car.edge.laneCars[car.lane];
  const aheadCar = currentLaneArr.filter(c=>c.pos>car.pos).sort((a,b)=>a.pos-b.pos)[0];
  const frontGap = aheadCar
    ? Math.round((aheadCar.pos-car.pos)*car.edge.length)
    : null;

  // 次交差点
  const toNode = car.edge.to;
  const distToNodePx = Math.round((1 - car.pos) * car.edge.length);
  const isInYieldZone = toNode.type==='cross' && toNode.isRealCross
    && distToNodePx < 80 && !toNode.hasSignal && !toNode.isRoundabout;
  const nextCrossLabel = toNode.type==='cross'
    ? (toNode.hasSignal
        ? (toNode.isRealCross ? '🚦 信号あり交差点' : '🚦 信号あり')
        : toNode.isRoundabout
          ? '🔄 ラウンドアバウト'
          : (toNode.isRealCross
              ? (isInYieldZone ? '⚠ 信号なし交差点 ⚡徐行圏内' : '⚠ 信号なし交差点')
              : '📍 通過点'))
    : toNode.external ? '🚪 出口' : '📍 端点';

  body.innerHTML = `
    <table style="width:100%;border-collapse:collapse;line-height:1.7;">
      <tr><td style="color:#aaa;width:80px">状態</td><td>${stopLabel}</td></tr>
      <tr><td style="color:#aaa">速度</td><td>
        <div style="background:#333;border-radius:3px;height:8px;width:100%;margin-top:3px">
          <div style="background:${speedPct>80?'#ff6040':speedPct>50?'#60d060':speedPct>20?'#d0d040':'#d06040'};height:8px;border-radius:3px;width:${Math.min(100,speedPct)}%"></div>
        </div>
        <span style="font-size:10px;color:#aaa">${speedKmh}km/h / 制限${limitKmh}km/h</span>
      </td></tr>
      <tr><td style="color:#aaa">停車累積</td><td>${car.wait > 0 ? car.wait + 'f (' + (car.wait/60).toFixed(1) + '秒)' : '—'}</td></tr>
      ${car.waitingForParking ? '<tr><td style="color:#ffaa40" colspan="2">🅿 駐車場満車のため待機中 (' + Math.floor((car.parkingWaitTimer||0)/60) + '秒) → 10秒後に転進</td></tr>' : ''}
      <tr><td style="color:#aaa">車線</td><td>${edgeTypeLabel}<br><span style="font-size:10px;color:#aaa">車線 ${car.lane+1} / pos ${car.pos.toFixed(3)}</span></td></tr>
      <tr><td style="color:#aaa">前方車</td><td>${aheadCar ? '🚗 #'+aheadCar.id+' ('+frontGap+'px先)' : '（なし）'}</td></tr>
      <tr><td style="color:#aaa">次のノード</td><td>${nextCrossLabel}<br><span style="font-size:10px;color:${distToNodePx<80?'#ffaa40':'#aaa'}">到達まで ${distToNodePx}px${distToNodePx<80?' ⚡':''}  </span></td></tr>
      <tr><td style="color:#aaa">目的地</td><td>${destLabel}</td></tr>
      <tr><td style="color:#aaa">ルート残り</td><td>${remain} エッジ</td></tr>
      ${car.edge.blocked ? '<tr><td colspan="2" style="color:#ff4040;text-align:center">⛔ このエッジは封鎖中</td></tr>' : ''}
      ${car.laneChangeCooldown > 0 ? '<tr><td style="color:#aaa">車線変更CD</td><td>'+car.laneChangeCooldown+'f</td></tr>' : ''}
    </table>
    <div style="font-size:10px;color:#555;margin-top:6px;text-align:center">クリックで閉じる ／ ドラッグで移動</div>
  `;
}

// ===== BFSルート生成（車線ルール対応版）=====
// targetNodes: 到達目標ノードの配列（呼び出し側で指定）
function generateRouteBFS(startNode, targetNodes){
  const targets = targetNodes.filter(n => n !== startNode);
  if(targets.length === 0) return null;

  const queue = [{ node: startNode, path: [], prevEdge: null }];
  const visited = new Set([startNode]);

  while (queue.length > 0) {
    const { node, path, prevEdge } = queue.shift();
    if (targets.includes(node) && path.length > 0) return path;

    for (const e of edges) {
      if (e.from !== node || visited.has(e.to)) continue;
      // signOverride チェック: 前エッジに制限がある場合、許可方向のみ通行
      if(e.blocked) continue;
      if(prevEdge && e.type !== 'roundabout'){
        const dir = getDirectionType(prevEdge, e);
        const laneOvr = prevEdge.signLaneOverride && prevEdge.signLaneOverride.size > 0
          ? [...prevEdge.signLaneOverride.values()].reduce((a,b)=>{ for(const d of b) a.add(d); return a; }, new Set())
          : null;
        const effOvr = laneOvr || prevEdge.signOverride;
        if(effOvr !== null && !effOvr.has(dir)) continue;
      }
      visited.add(e.to);
      // 立体交差ノード（踏切→overpass）を通過する場合は前のlaneを引き継ぐ
      const throughOverpass = prevEdge && prevEdge.to && prevEdge.to.isCrossing && prevEdge.to.isOverpass;
      const lane = throughOverpass
        ? (path.length > 0 ? path[path.length-1].lane : 0)
        : selectLaneForTurn(e, prevEdge);
      queue.push({ node: e.to, path: [...path, { edge: e, lane }], prevEdge: e });
    }
  }
  return null;
}

// ===== 進行方向に応じた車線選択 =====
// 左側通行ルール:
//   lane0 = 中央寄り（内側）: 直進・右折
//   lane1 = 外側: 左折
// prevEdge: 直前に走ったエッジ（交差点に入る方向）
// curEdge:  これから走るエッジ（交差点を出る方向）
function selectLaneForTurn(curEdge, prevEdge){
  if(curEdge.lanes === 1) return 0; // 1車線は選択の余地なし
  if(!prevEdge) return 0;            // 最初のエッジ: 内側

  // 進行方向の変化角を計算（-π〜π）
  const inDx  = prevEdge.to.x - prevEdge.from.x;
  const inDy  = prevEdge.to.y - prevEdge.from.y;
  const outDx = curEdge.to.x  - curEdge.from.x;
  const outDy = curEdge.to.y  - curEdge.from.y;

  // 外積（cross product）: 正=左折, 負=右折, 0=直進
  const cross = inDx * outDy - inDy * outDx;
  const dot   = inDx * outDx + inDy * outDy;
  const angle = Math.atan2(cross, dot); // -π〜π

  // Canvas座標はY下向きのため外積の符号が数学と逆:
  // angle > 0 → 右折, angle < 0 → 左折
  if(angle < -Math.PI / 6){
    // 左折（angle < -30度, Canvas Y下向き）→ 外側車線 lane1
    return 1;
  } else {
    // 直進・右折 → 内側車線 lane0
    return 0;
  }
}

// ===== 車線選択（混雑回避）=====
function selectLane(edge){
  let min = Infinity, chosen = 0;
  for (let i = 0; i < edge.lanes; i++) {
    if (edge.laneCars[i].length < min) { min = edge.laneCars[i].length; chosen = i; }
  }
  return chosen;
}

// 支線末端ノード: 全接続エッジがbranchのみのノード（純粋な枝の先端）
function getBranchTerminals(){
  return nodes.filter(n => {
    if(n.external || n.type !== "cross") return false;
    const conn = edges.filter(e => e.from === n || e.to === n);
    return conn.length > 0 && conn.every(e => e.type === "branch" || e.type === "oneway");
  });
}


// ===== 駐車場からの出発 =====
// 駐車場の車が滞在時間を終えたら呼ばれる
// 駐車場を start として新ルートを生成し、通常の spawnCar と同様に出発させる
function spawnCarFromParking(parkingNode, img){
  const extOnly = nodes.filter(n =>
    n.external && n.type !== "parking" && n !== parkingNode
  );
  const parkingDests = nodes.filter(n =>
    n.type === "parking" && n !== parkingNode &&
    n.slotUsed && n.slotUsed.some(used => !used)
  );
  const candidates = [...extOnly, ...parkingDests];
  if(candidates.length === 0) return;

  // ランダムに目的地を選んでBFS
  const shuffled = [...candidates].sort(() => Math.random() - 0.5);
  for(const goal of shuffled){
    const route = generateRouteBFS(parkingNode, [goal]);
    if(route && route.length > 0){
      const car = new Car(route, img || carImgs[Math.floor(Math.random()*carImgs.length)]);
      car.destLabel = goal.type === "parking" ? "🅿  別の駐車場" : "🚪 出口";
      cars.push(car);
      return;
    }
  }
}

// ===== 車生成 =====
function spawnCar(){
  // スポーン地点: 外部ノード + 駐車場ノード（駐車中の車がいるもの）
  // 駐車場は parkedCars がいる場合のみスポーン地点になる（車が出てくる）
  // 満車でない駐車場は目的地にはなれるが、parkedCars=0の駐車場はスポーンしない
  const spawnNodes = nodes.filter(n =>
    n.external && (n.type !== "parking" || (n.parkedCars && n.parkedCars.length > 0))
  );
  if(spawnNodes.length === 0){
    // 駐車場がすべて空でもゲームを止めないようにフォールバック
    const fallback = nodes.filter(n => n.external);
    if(fallback.length === 0) return;
    // 空の駐車場からは出発できないのでそのまま return
    return;
  }
  const start = spawnNodes[Math.floor(Math.random() * spawnNodes.length)];
  const isBike = Math.random() < 0.15;
  const img = isBike
    ? bikeImgs[Math.floor(Math.random() * bikeImgs.length)]
    : carImgs[Math.floor(Math.random() * carImgs.length)];

  // 目的地の優先度:
  //  30%: 駐車場を目的地に
  //  20%: 会社を目的地に
  //  20%: 支線末端を目的地に
  //  30%: 外部ノード→外部ノード（通常）
  const rand = Math.random();

  // ===== 朝ラッシュ（06:00〜09:00）: 駅前駐車場へ優先的に向かう =====
  const t = timeCounter % 3600;
  const isMorningRush = t < 375;   // 06:00〜09:00
  const isEveningRush = t >= 1125 && t < 1375; // 17:00〜19:00

  if(isMorningRush && rand < 0.65){
    // 朝ラッシュ: 65%の確率で駅前駐車場を目的地に
    const stationParkings = nodes.filter(n =>
      n.type === "parking" && n.isStationParking2 &&
      n.parkedCars && n.slotUsed &&
      n.slotUsed.some(used => !used)
    );
    if(stationParkings.length > 0){
      for(const goal of stationParkings){
        const route = generateRouteBFS(start, [goal]);
        if(route && route.length > 0){
          cars.push(new Car(route, img));
          return;
        }
      }
    }
  }

  if(rand < 0.30){
    // 駐車場を目的地に（満車は除外）
    const parkings = nodes.filter(n =>
      n.type==="parking" && n !== start &&
      n.parkedCars && n.slotUsed &&
      n.slotUsed.some(used => !used)  // 空きスロットがある駐車場のみ
    );
    if(parkings.length > 0){
      const shuffled = [...parkings].sort(() => Math.random() - 0.5);
      for(const goal of shuffled){
        const route = generateRouteBFS(start, [goal]);
        if(route && route.length > 0){
          cars.push(new Car(route, img));
          return;
        }
      }
    }
  } else if(rand < 0.50){
    // 会社を目的地に
    // 会社(cross でない)への直接BFSは不可 → 会社に最も近い cross を経由し
    // さらにその cross から伸びる支線の末端ノードまで延長することで
    // 「内部交差点でいきなり消える」という不自然な挙動を解消する
    const companies = nodes.filter(n => n.type==="company" && n !== start);
    if(companies.length > 0){
      const shuffled = [...companies].sort(() => Math.random() - 0.5);
      for(const goal of shuffled){
        // 会社に最も近い cross を探す
        const nearest = nodes.filter(n=>n.type==="cross"&&!n.external)
          .sort((a,b)=>Math.hypot(a.x-goal.x,a.y-goal.y)-Math.hypot(b.x-goal.x,b.y-goal.y))[0];
        if(!nearest) continue;

        // nearest cross から出る「支線エッジの末端ノード」を終点候補にする
        // （会社の方向に近い支線を優先）
        const branchOuts = edges.filter(e =>
          e.from === nearest &&
          (e.type === 'branch' || e.type === 'oneway')
        );
        // 会社方向に最も近い支線の末端を選ぶ
        let extendedGoal = null;
        if(branchOuts.length > 0){
          const goalDx = goal.x - nearest.x, goalDy = goal.y - nearest.y;
          const best = branchOuts.sort((a,b)=>{
            const adx=a.to.x-nearest.x, ady=a.to.y-nearest.y;
            const bdx=b.to.x-nearest.x, bdy=b.to.y-nearest.y;
            const dotA=(adx*goalDx+ady*goalDy)/(Math.hypot(adx,ady)||1);
            const dotB=(bdx*goalDx+bdy*goalDy)/(Math.hypot(bdx,bdy)||1);
            return dotB-dotA;
          })[0];
          extendedGoal = best.to;
        }

        const routeGoal = extendedGoal || nearest;
        const route = generateRouteBFS(start, [routeGoal]);
        if(route && route.length > 0){
          const car = new Car(route, img);
          car.destLabel = '🏢 会社'; // 目的地ラベルを明示
          cars.push(car);
          return;
        }
      }
    }
  } else if(rand < 0.70){
    // 支線末端を目的地に
    // getBranchTerminals が返す cross ノードは行き止まりなので
    // 「その cross」を終点にすると交差点で唐突に消える
    // → その cross に入ってくる直前のエッジの from ノードを終点にすることで
    //    支線の途中まで入って自然に目的地に「到着」する演出になる
    // ただし from が external ならそのまま external を使う
    const terminals = getBranchTerminals();
    if(terminals.length > 0){
      const shuffled = [...terminals].sort(() => Math.random() - 0.5);
      for(const goal of shuffled){
        // goal (行き止まり cross) への入口エッジを探す
        const inEdges = edges.filter(e => e.to === goal && !e.from.external);
        // 入口エッジの from (=支線の途中/外部ノード) を終点候補にする
        // external の出口ノードがあればそちらを優先
        const externalGoals = nodes.filter(n=>n.external && n !== start);
        const altGoal = inEdges.length > 0
          ? inEdges[Math.floor(Math.random()*inEdges.length)].from
          : null;
        // external があればexternal経由、なければ alt
        const finalGoal = altGoal || goal;
        const route = generateRouteBFS(start, [finalGoal]);
        if(route && route.length > 0){
          const car = new Car(route, img);
          car.destLabel = '🏘 住宅街';
          cars.push(car);
          return;
        }
      }
    }
  }

  // 通常: 外部ノード→外部ノード（駐車場以外）
  // ランダムに1つ選んでルートを試す（全候補一括渡しだと近い出口ばかり選ばれる）
  const extOnly = nodes.filter(n => n.external && n.type !== "parking" && n !== start);
  if(extOnly.length === 0) return;
  const shuffled = [...extOnly].sort(() => Math.random() - 0.5);
  for(const goal of shuffled){
    const route = generateRouteBFS(start, [goal]);
    if(route && route.length > 0){
      const car0 = new Car(route, img);
      if(isBike) car0.isBike = true;
      cars.push(car0);
      return;
    }
  }
}

// ===== 時間更新 =====
function updateTime(){
  timeCounter++;
  const t = timeCounter % 3600; // 0〜3599フレーム = ゲーム内24時間

  // ===== 24時間表記の計算 =====
  // 開始時刻 06:00、1サイクル3600フレーム=24時間
  // 1フレーム = 24*60/3600 = 0.4分 = 24分/フレーム相当
  const totalMinutes = (t / 3600) * 24 * 60; // 0〜1439分
  const gameMinutes  = (360 + Math.floor(totalMinutes)) % 1440; // 06:00スタート
  const hh = Math.floor(gameMinutes / 60);
  const mm = gameMinutes % 60;
  const timeStr = String(hh).padStart(2,'0') + ':' + String(mm).padStart(2,'0');

  // ===== 時間帯ラベルとスポーン率 =====
  // フレームと現実時刻の対応:
  //   t=0    → 06:00  朝ラッシュ開始
  //   t=375  → 09:00  午前
  //   t=625  → 12:00  昼ピーク
  //   t=750  → 13:00  午後
  //   t=1125 → 17:00  夕方ラッシュ
  //   t=1375 → 19:00  夜
  //   t=1750 → 22:00  深夜
  //   t=3600 → 06:00  (次サイクル)
  let rate, label;
  if(t < 375){
    rate=0.08; label='朝ラッシュ';        // 06:00〜09:00
  } else if(t < 625){
    rate=0.04; label='午前';              // 09:00〜12:00
  } else if(t < 750){
    rate=0.06; label='昼';               // 12:00〜13:00
  } else if(t < 1125){
    rate=0.03; label='午後';             // 13:00〜17:00
  } else if(t < 1375){
    rate=0.09; label='夕方ラッシュ';     // 17:00〜19:00
  } else if(t < 1750){
    rate=0.02; label='夜';               // 19:00〜22:00
  } else {
    rate=0.008; label='深夜';            // 22:00〜06:00
  }

  if(Math.random() < rate * flowRate * 2) spawnCar();
  document.getElementById("timeLabel").textContent = timeStr + ' (' + label + ')';

  // ===== nightAlpha 計算（夜間オーバーレイ強度）=====
  let targetAlpha;
  if(t < 375){
    targetAlpha = 0.30 * (1 - t / 375);       // 朝: だんだん明るく
  } else if(t < 1125){
    targetAlpha = 0.0;                          // 昼間: 明るい
  } else if(t < 1375){
    targetAlpha = 0.25 * (t - 1125) / 250;     // 夕方: だんだん暗く
  } else if(t < 1750){
    targetAlpha = 0.25 + 0.30 * (t - 1375) / 375; // 夜: さらに暗く
  } else {
    targetAlpha = 0.55 + 0.13 * Math.min(1, (t - 1750) / 500); // 深夜: 最大
  }
  nightAlpha += (targetAlpha - nightAlpha) * 0.02; // なめらかに追従
}

// ===== 道路描画 =====
//
// 描画方針:
//   ① drawIntersectionPads(): 交差点ノードに kousaten.png を描く（最初）
//   ② drawRoad(e): 各エッジを描く。交差点端はパッドに隠れる分だけトリム
//
// 道路テクスチャ使い分け:
//   main  → douro.png（幹線、2車線幅でタイル）
//   branch→ douro_small.png（支線、1車線幅でタイル。上り/下りそれぞれに適用で自然に見える）
//   oneway→ douro_small.png（1車線、矢印付き）


// ===== 進行方向サイン描画 =====
// 各エッジの to側（交差点手前）に、そのエッジから交差点を出た後の
// 進行可能方向を示すサイン画像を路面に描画する。
//
// 判定ロジック:
//   交差点ノード(e.to)から出て行くエッジ群を調べ、
//   入ってきた方向(e)との角度変化で直進/左折/右折を分類。
//   → 可能な方向の組み合わせで使用画像を決定する。
//
// 画像サイズ: 15×22px（元画像）を路面幅に合わせてスケーリング
// 配置: エッジ終端（交差点パッドのトリム境界）の少し手前

// エッジの実質的な始点を返す（isParkingAccessノードを遡って元の実ノードを取得）
// connectParkingToNearestEdge によるエッジ分割に対応
// toNode: サイン描画先の交差点ノード（方向判定の基準）
function getEffectiveFrom(e, toNode){
  if(!e.from.isParkingAccess) return e.from;
  // e の進行方向ベクトル（accessNode→toNode 方向）
  const dirX = toNode.x - e.from.x;
  const dirY = toNode.y - e.from.y;
  let cur = e.from;
  for(let _i = 0; _i < 20; _i++){
    // cur に入ってくるエッジのうち、進行方向と同じ向き（内積>0）のものを選ぶ
    // これにより toNode→accessNode（逆向き）を除外し、正しい起点方向を採用する
    const prevEdge = edges.find(ex => {
      if(ex.to !== cur) return false;
      if(ex.from.type === 'parking') return false;
      // 進行方向との内積（正なら同じ向き）
      const dx = cur.x - ex.from.x;
      const dy = cur.y - ex.from.y;
      return (dx * dirX + dy * dirY) > 0;
    });
    if(!prevEdge) break;
    if(!prevEdge.from.isParkingAccess) return prevEdge.from;
    cur = prevEdge.from;
  }
  return null; // 遡れなかった（描画スキップ対象）
}

function getDirectionType(inEdge, outEdge){
  // 入ってくる方向ベクトル
  const inDx  = inEdge.to.x  - inEdge.from.x;
  const inDy  = inEdge.to.y  - inEdge.from.y;
  // 出て行く方向ベクトル
  const outDx = outEdge.to.x - outEdge.from.x;
  const outDy = outEdge.to.y - outEdge.from.y;
  // 外積（正=左、負=右）と内積で角度を計算
  const cross = inDx * outDy - inDy * outDx;
  const dot   = inDx * outDx + inDy * outDy;
  const angle = Math.atan2(cross, dot); // -π〜π
  if(Math.abs(angle) < Math.PI / 6) return 'straight'; // ±30度以内: 直進
  // Canvas座標はY下向きのため外積の符号が数学と逆:
  // 外積 > 0 → 時計回り → 右折  (Canvas座標系)
  // 外積 < 0 → 反時計回り → 左折 (Canvas座標系)
  if(angle > 0) return 'right'; // 正: 右折（Canvas Y下向き）
  return 'left';                // 負: 左折（Canvas Y下向き）
}

function drawDirectionSigns(){
  // signEdit モード中: 変更可能エッジに📝アイコンを表示
  if(operationMode==='signEdit'){
    // signEdit モード: クリック可能な交差点に🔧アイコンを表示
    for(const n of nodes){
      if(n.type !== "cross" || n.external) continue;
      if(n.isParkingAccess || n.isRaEntry || n.isRaExit || n.isRoundabout || n.isCrossing) continue;
      const conn = edges.filter(e2=>e2.from===n||e2.to===n);
      const maxW2 = conn.length>0 ? Math.max(...conn.map(e2=>e2.lanes*LANE_W)) : LANE_W;
      // 変更済みエッジがあれば青、なければグレー
      const hasOverride = edges.some(e2=>e2.to===n && (e2.signOverride!==null||e2.signLaneOverride.size>0));
      ctx.save();
      ctx.font='13px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillStyle = hasOverride ? 'rgba(80,200,255,0.95)' : 'rgba(255,255,255,0.7)';
      ctx.fillText('🔧', n.x, n.y - maxW2 - 10);
      ctx.restore();
    }
  }

  // 内部交差点へ向かうエッジのみ対象
  for(const e of edges){
    const toNode = e.to;
    if(toNode.type !== "cross" || toNode.external) continue;
    if(toNode.isRoundabout) continue;
    if(toNode.isRaEntry || toNode.isRaExit) continue;
    if(toNode.isCrossing) continue;
    if(toNode.isParkingAccess) continue;
    const effectiveFrom = getEffectiveFrom(e, toNode);
    if(effectiveFrom === null) continue;
    if(e.from.isParkingAccess && effectiveFrom === toNode) continue;
    if(e.type === 'roundabout') continue;

    const outEdges = edges.filter(ex =>
      ex.from === toNode &&
      ex.to !== e.from &&
      ex.to.type !== 'parking'
    );
    if(outEdges.length === 0) continue;

    const fakeInEdge = { from: effectiveFrom, to: toNode };
    const autoDirs = new Set(outEdges.map(ex => getDirectionType(fakeInEdge, ex)));
    const isSelected = signEditEdge === e;

    const dx  = toNode.x - effectiveFrom.x;
    const dy  = toNode.y - effectiveFrom.y;
    const dist = Math.hypot(dx, dy);
    if(dist < 1) continue;
    const ux = dx / dist;
    const uy = dy / dist;
    const nx = -uy;
    const ny =  ux;

    const connOut = edges.filter(e2 => e2.from === toNode || e2.to === toNode);
    const trimTo  = connOut.length > 0 ? Math.max(...connOut.map(e2 => e2.lanes * LANE_W)) : 0;

    const signW = 14;
    const signH = 20;
    const roadAngle = Math.atan2(dy, dx);
    const signRotation = roadAngle + Math.PI / 2;

    for(let ln = 0; ln < e.lanes; ln++){
      const dirs = e.signLaneOverride.has(ln)
        ? e.signLaneOverride.get(ln)
        : (e.signOverride !== null ? e.signOverride : autoDirs);
      const hasSt=dirs.has('straight'), hasL=dirs.has('left'), hasR=dirs.has('right');
      let signKey=null;
      if(hasSt&&hasL&&hasR) signKey='st_right_left';
      else if(hasSt&&hasL)  signKey='st_left';
      else if(hasSt&&hasR)  signKey='st_right';
      else if(hasL&&hasR)   signKey='right_left';
      else if(hasSt)        signKey='straight';
      else if(hasL)         signKey='left';
      else if(hasR)         signKey='right';
      if(!signKey) continue;
      const img=signImgs[signKey];
      if(!img||!img.complete||!img.naturalWidth) continue;

      const lateralOffset = e.type === 'oneway' ? 0 : -(LANE_W * ln + LANE_W / 2);
      const alongOffset   = dist - trimTo - signH / 2 - 6 - 18;
      if(alongOffset < 2) continue;
      const wx = effectiveFrom.x + ux * alongOffset + nx * lateralOffset;
      const wy = effectiveFrom.y + uy * alongOffset + ny * lateralOffset;

      ctx.save();
      ctx.translate(wx, wy);
      ctx.rotate(signRotation);
      if(isSelected){
        ctx.strokeStyle = e.signLaneOverride.has(ln)
          ? 'rgba(80,255,150,0.95)' : 'rgba(80,200,255,0.9)';
        ctx.lineWidth=2;
        ctx.strokeRect(-signW/2-3,-signH/2-3,signW+6,signH+6);
      }
      ctx.drawImage(img,-signW/2,-signH/2,signW,signH);
      ctx.restore();
    }
  }
}

function drawIntersectionPads(){

  // ===== 凸包ユーティリティ（斜め交差点用）=====
  function convexHull(pts){
    if(pts.length < 3) return pts;
    pts = pts.slice().sort((a,b) => a.x===b.x ? a.y-b.y : a.x-b.x);
    const cross = (o,a,b) => (a.x-o.x)*(b.y-o.y)-(a.y-o.y)*(b.x-o.x);
    const lower=[], upper=[];
    for(const p of pts){ while(lower.length>=2 && cross(lower[lower.length-2],lower[lower.length-1],p)<=0) lower.pop(); lower.push(p); }
    for(let i=pts.length-1;i>=0;i--){ const p=pts[i]; while(upper.length>=2 && cross(upper[upper.length-2],upper[upper.length-1],p)<=0) upper.pop(); upper.push(p); }
    upper.pop(); lower.pop();
    return lower.concat(upper);
  }

  function hasDiagonalEdge(connEdges){
    return connEdges.some(e => {
      const dx=Math.abs(e.to.x-e.from.x), dy=Math.abs(e.to.y-e.from.y);
      return dx>2 && dy>2;
    });
  }

  for(const n of nodes){

    // ===== bend ノード（直角カーブの折れ点）=====
    if(n.type === "bend"){
      const connB = edges.filter(e => e.from===n || e.to===n);
      if(connB.length === 0) continue;
      const allOneway = connB.every(e => e.type === 'oneway');
      const bW = allOneway ? LANE_W / 2 : Math.max(...connB.map(e => e.lanes * LANE_W));
      ctx.save();
      ctx.fillStyle = allOneway ? "#4a4a5a" : "#555";
      ctx.fillRect(n.x - bW, n.y - bW, bW*2, bW*2);
      if(kousatenImg.complete && kousatenImg.naturalWidth > 0){
        ctx.save();
        ctx.beginPath();
        ctx.rect(n.x - bW, n.y - bW, bW*2, bW*2);
        ctx.clip();
        const tw = kousatenImg.naturalWidth, th = kousatenImg.naturalHeight;
        for(let tx = n.x - bW; tx < n.x + bW; tx += tw)
          for(let ty = n.y - bW; ty < n.y + bW; ty += th)
            ctx.drawImage(kousatenImg, tx, ty, tw, th);
        ctx.restore();
      }
      ctx.restore();
      continue;
    }

    if(n.type!=="cross" || n.external) continue;
    if(n.isRaEntry || n.isRaExit) continue;
    if(n.isParkingAccess) continue;
    if(n.isCrossing) continue;

    if(n.isRoundabout && n.rbHalfSize){
      const rbReady2 = roundaboutImg.complete && roundaboutImg.naturalWidth > 0;
      if(rbReady2){
        ctx.drawImage(roundaboutImg, n.x-n.rbHalfSize, n.y-n.rbHalfSize, n.rbHalfSize*2, n.rbHalfSize*2);
      } else {
        ctx.fillStyle="#4a7a4a"; ctx.beginPath(); ctx.arc(n.x,n.y,n.rbHalfSize*0.31*2,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#888";    ctx.beginPath(); ctx.arc(n.x,n.y,n.rbHalfSize,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#4a7a4a"; ctx.beginPath(); ctx.arc(n.x,n.y,n.rbHalfSize*0.31*2,0,Math.PI*2); ctx.fill();
      }
      continue;
    }

    const connEdges = edges.filter(e => e.from===n || e.to===n);
    if(connEdges.length===0) continue;

    const maxW = Math.max(...connEdges.map(e => edgeRoadWidth(e)));
    const padSize = maxW * 2;

    if(n.isRoundabout){
      const rbSize = Math.max(padSize * 1.7, 90);
      n.rbHalfSize   = rbSize / 2;
      n.rbRingRadius = rbSize * 0.32;
      const rbReady = roundaboutImg.complete && roundaboutImg.naturalWidth > 0;
      if(rbReady){
        ctx.drawImage(roundaboutImg, n.x-rbSize/2, n.y-rbSize/2, rbSize, rbSize);
      } else {
        ctx.fillStyle="#4a7a4a"; ctx.beginPath(); ctx.arc(n.x,n.y,rbSize*0.31,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#888";    ctx.beginPath(); ctx.arc(n.x,n.y,rbSize/2,0,Math.PI*2); ctx.fill();
        ctx.fillStyle="#4a7a4a"; ctx.beginPath(); ctx.arc(n.x,n.y,rbSize*0.31,0,Math.PI*2); ctx.fill();
      }
      continue;
    }

    // ===== 動的交差点描画 =====
    const inEdges = connEdges.filter(e => e.to === n);
    const padR = maxW;
    const isDiag = hasDiagonalEdge(connEdges);

    // 各エッジのノードから見た方向を計算
    function edgeDir(e){
      let ox, oy;
      if(e.from === n){ ox = e.to.x - n.x; oy = e.to.y - n.y; }
      else             { ox = e.from.x - n.x; oy = e.from.y - n.y; }
      const d = Math.hypot(ox,oy);
      if(d < 1) return null;
      return {ux:ox/d, uy:oy/d, rw:edgeRoadWidth(e)};
    }

    // 各エッジ方向でのパッド外縁距離（凸包境界までの距離）
    // 斜め交差点では角度に応じてトリム量が増えるのでそれと合わせる
    function edgePadDist(dir){
      if(!isDiag) return padR;
      // このエッジ方向と他エッジとの最小交差角のsin
      let minSin = 1.0;
      for(const e2 of connEdges){
        const d2 = edgeDir(e2);
        if(!d2) continue;
        const sinA = Math.abs(dir.ux*d2.uy - dir.uy*d2.ux);
        if(sinA < 0.1) continue;
        if(sinA < minSin) minSin = sinA;
      }
      if(minSin > 0.99) return padR;
      if(minSin < 0.3) minSin = 0.3;
      return Math.min(padR / minSin, padR * 2.5);
    }

    ctx.save();
    ctx.translate(n.x, n.y);

    // ------1. アスファルト地------
    ctx.save();

    if(isDiag){
      // 斜め道路あり: 角度考慮した距離で凸包ポリゴンを生成
      const pts = [{x:0,y:0}];
      for(const e of connEdges){
        const dir = edgeDir(e);
        if(!dir) continue;
        const epd = edgePadDist(dir);
        const nx2 = -dir.uy, ny2 = dir.ux;
        pts.push({x: dir.ux*epd + nx2*dir.rw, y: dir.uy*epd + ny2*dir.rw});
        pts.push({x: dir.ux*epd - nx2*dir.rw, y: dir.uy*epd - ny2*dir.rw});
      }
      const hull = convexHull(pts);
      if(hull.length >= 3){
        ctx.beginPath();
        ctx.moveTo(hull[0].x, hull[0].y);
        for(let i=1;i<hull.length;i++) ctx.lineTo(hull[i].x, hull[i].y);
        ctx.closePath();
        ctx.clip();
      } else {
        const cornerR = Math.max(4, padR * 0.18);
        ctx.beginPath();
        ctx.roundRect(-padR, -padR, padR*2, padR*2, cornerR);
        ctx.clip();
      }
    } else {
      // 通常（水平・垂直のみ）: 従来の角丸矩形
      const cornerR = Math.max(4, padR * 0.18);
      ctx.beginPath();
      ctx.roundRect(-padR, -padR, padR*2, padR*2, cornerR);
      ctx.clip();
    }

    ctx.fillStyle = "#555";
    ctx.fillRect(-padR*3, -padR*3, padR*6, padR*6); // 凸包に合わせて広めに塗る

    if(kousatenImg.complete && kousatenImg.naturalWidth > 0){
      const tileW = kousatenImg.naturalWidth;
      const tileH = kousatenImg.naturalHeight;
      for(let tx = -padR*3; tx < padR*3; tx += tileW)
        for(let ty = -padR*3; ty < padR*3; ty += tileH)
          ctx.drawImage(kousatenImg, tx, ty, tileW, tileH);
    }
    ctx.restore(); // clip 解除

    // ------2. 横断歩道 + 停止線（各進入方向）------
    for(const e of inEdges){
      const dx = e.from.x - n.x;
      const dy = e.from.y - n.y;
      const dist = Math.hypot(dx, dy);
      if(dist < 1) continue;
      const ux = dx / dist, uy = dy / dist;
      const perpX = -uy, perpY = ux;
      const roadW = edgeRoadWidth(e);

      const oppositeEdge = connEdges.find(e2 => e2.from === n && e2.to === e.from);
      const oppositeRoadW = oppositeEdge ? edgeRoadWidth(oppositeEdge) : 0;
      const totalRoadW = roadW + oppositeRoadW;

      // 横断歩道の開始位置: このエッジ方向での実際のパッド外縁距離に合わせる
      const dir = edgeDir(e);
      const epd = dir ? edgePadDist(dir) : padR;
      const cwStart  = epd + 3;
      const cwWidth  = 10;
      const stripeW  = 3;
      const stripeGap = 3;
      const stripeCount = Math.max(3, Math.floor(totalRoadW / (stripeW + stripeGap)));
      const totalStripeW = stripeCount * stripeW + (stripeCount - 1) * stripeGap;

      // perpX正方向 = inEdge(to=n)の道路側（from→toの右側 = 道路描画側）
      // 横断歩道範囲: perpX正方向にroadW、負方向にoppositeRoadW
      const rangeMin = -oppositeRoadW;   // oppositeEdge側の道路端
      const rangeMax = roadW;            // inEdge側の道路端
      const stripeOffStart = rangeMin + (totalRoadW - totalStripeW) / 2;

      ctx.save();
      ctx.fillStyle = "rgba(255,255,255,0.82)";
      for(let i = 0; i < stripeCount; i++){
        const off = stripeOffStart + i * (stripeW + stripeGap);
        const p0x = ux * cwStart               + perpX * off;
        const p0y = uy * cwStart               + perpY * off;
        const p1x = ux * (cwStart + cwWidth)   + perpX * off;
        const p1y = uy * (cwStart + cwWidth)   + perpY * off;
        const p2x = ux * (cwStart + cwWidth)   + perpX * (off + stripeW);
        const p2y = uy * (cwStart + cwWidth)   + perpY * (off + stripeW);
        const p3x = ux * cwStart               + perpX * (off + stripeW);
        const p3y = uy * cwStart               + perpY * (off + stripeW);
        ctx.beginPath();
        ctx.moveTo(p0x, p0y); ctx.lineTo(p1x, p1y);
        ctx.lineTo(p2x, p2y); ctx.lineTo(p3x, p3y);
        ctx.closePath(); ctx.fill();
      }
      ctx.restore();

      // ---- 停止線 ----
      const stopDist = epd + 1;
      const sx = ux * stopDist, sy = uy * stopDist;
      ctx.strokeStyle = "rgba(255,255,255,0.90)";
      ctx.lineWidth   = 2.2;
      ctx.lineCap     = "butt";
      ctx.beginPath();
      ctx.moveTo(sx + perpX * (rangeMin + 1), sy + perpY * (rangeMin + 1));
      ctx.lineTo(sx + perpX * (rangeMax - 1), sy + perpY * (rangeMax - 1));
      ctx.stroke();
    }

    ctx.restore(); // translate 解除
  }

  // ===== bend ノードのコーナーフィル =====
  // bend ノードで2本のエッジが直角に繋がる場合、
  // 道路帯の外側に「穴」が生じるのをコーナー矩形で埋める
  for(const n of nodes){
    if(n.type !== "bend") continue;

    // bend ノードに接続するエッジを取得（fromまたはto）
    const connB = edges.filter(e => e.from===n || e.to===n);
    if(connB.length < 2) continue;

    // エッジを2本取得（向き: bend を起点/終点にする方向に統一）
    // dir = bend から見た「エッジが伸びる方向」
    const getDirFrom = e => {
      if(e.from === n){
        const dx=e.to.x-n.x, dy=e.to.y-n.y, l=Math.hypot(dx,dy);
        return l>0 ? {ux:dx/l, uy:dy/l, w:e.lanes*LANE_W} : null;
      } else {
        const dx=e.from.x-n.x, dy=e.from.y-n.y, l=Math.hypot(dx,dy);
        return l>0 ? {ux:dx/l, uy:dy/l, w:e.lanes*LANE_W} : null;
      }
    };

    // 全エッジペアのコーナーを描画（通常は2本だが複数あっても対応）
    const processed = new Set();
    for(let i=0; i<connB.length; i++){
      for(let j=i+1; j<connB.length; j++){
        const d1 = getDirFrom(connB[i]);
        const d2 = getDirFrom(connB[j]);
        if(!d1 || !d2) continue;

        // 2本のエッジが同方向（平行）なら角はない
        const dot = d1.ux*d2.ux + d1.uy*d2.uy;
        if(Math.abs(dot) > 0.85) continue; // ほぼ平行なら除外

        const w = Math.max(d1.w, d2.w);
        const allOnewayB = connB.every(e => e.type === 'oneway');

        // 各エッジの左側法線（進行方向の左: nx=-uy, ny=ux）
        const n1x = -d1.uy, n1y = d1.ux;
        const n2x = -d2.uy, n2y = d2.ux;

        // oneway は中央描画なのでコーナーも中央基準（オフセット -w/2）
        const shift = allOnewayB ? -w/2 : 0;

        // コーナー矩形の4頂点
        const p0x = n.x + n1x*shift + n2x*shift,          p0y = n.y + n1y*shift + n2y*shift;
        const p1x = n.x + n1x*(shift+w) + n2x*shift,      p1y = n.y + n1y*(shift+w) + n2y*shift;
        const p2x = n.x + n1x*(shift+w) + n2x*(shift+w),  p2y = n.y + n1y*(shift+w) + n2y*(shift+w);
        const p3x = n.x + n1x*shift + n2x*(shift+w),      p3y = n.y + n1y*shift + n2y*(shift+w);

        ctx.save();
        // ベース色（onewayは専用色）
        ctx.fillStyle = allOnewayB ? "#4a4a5a" : "#555";
        ctx.beginPath();
        ctx.moveTo(p0x, p0y);
        ctx.lineTo(p1x, p1y);
        ctx.lineTo(p2x, p2y);
        ctx.lineTo(p3x, p3y);
        ctx.closePath();
        ctx.fill();

        // kousaten.png テクスチャを矩形範囲内にクリップして描画
        if(kousatenImg.complete && kousatenImg.naturalWidth > 0){
          ctx.beginPath();
          ctx.moveTo(p0x, p0y);
          ctx.lineTo(p1x, p1y);
          ctx.lineTo(p2x, p2y);
          ctx.lineTo(p3x, p3y);
          ctx.closePath();
          ctx.clip();
          const minX = Math.min(p0x,p1x,p2x,p3x);
          const minY = Math.min(p0y,p1y,p2y,p3y);
          const tw = kousatenImg.naturalWidth, th = kousatenImg.naturalHeight;
          ctx.drawImage(kousatenImg, minX, minY, w, w);
        }
        ctx.restore();
      }
    }
  }
}

// エッジの実際の描画幅を返す（asymエッジはlanes*LANE_Wではなく非対称）
function edgeRoadWidth(e){
  return e.lanes * LANE_W;
}

// ノードに接続するエッジのうち、そのノード側での最大道路幅を返す
function maxRoadWidthAtNode(n){
  const conn = edges.filter(e2 => e2.from===n || e2.to===n);
  if(conn.length === 0) return LANE_W;
  return Math.max(...conn.map(e2 => edgeRoadWidth(e2)));
}

function drawRoad(e){
  // 環状路エッジはスキップ
  if(e.type === 'roundabout') return;
  // 駐車場への接続エッジはスキップ（駐車場は沿道に直接接するため出入口道路不要）
  if(e.to   && e.to.type   === 'parking') return;
  if(e.from && e.from.type === 'parking') return;
  const roadW=e.lanes*LANE_W;
  const isInternalCross = n => n.type==="cross" && !n.external;
  function padRadius(n){
    // oneway専用bendノード
    if(n.type === 'bend'){
      const connB = edges.filter(e2 => e2.from===n || e2.to===n);
      const allOneway = connB.every(e2 => e2.type === 'oneway');
      return allOneway ? LANE_W / 2 : 0;
    }
    if(!isInternalCross(n)) return 0;
    if(n.isRaEntry || n.isRaExit) return 0;
    if(n.isParkingAccess) return 0;
    if(n.isCrossing) return 0;
    if(n.isRoundabout && n.rbHalfSize) return n.rbHalfSize;
    const conn = edges.filter(e2 => e2.from===n || e2.to===n);
    if(conn.length === 0) return 0;
    const baseR = maxRoadWidthAtNode(n);

    // 斜めエッジが存在する場合のみ角度考慮トリムを適用
    const hasDiag = conn.some(e2 => {
      const adx = Math.abs(e2.to.x - e2.from.x);
      const ady = Math.abs(e2.to.y - e2.from.y);
      return adx > 2 && ady > 2;
    });
    if(!hasDiag) return baseR; // 水平・垂直のみ → 従来通り

    // このエッジの方向
    const eDx = e.to.x - e.from.x, eDy = e.to.y - e.from.y;
    const eLen = Math.hypot(eDx, eDy);
    if(eLen < 1) return baseR;
    const eUx = eDx/eLen, eUy = eDy/eLen;

    let minSin = 1.0;
    for(const e2 of conn){
      if(e2 === e) continue;
      const dx2 = e2.to.x - e2.from.x, dy2 = e2.to.y - e2.from.y;
      const len2 = Math.hypot(dx2, dy2);
      if(len2 < 1) continue;
      const ux2 = dx2/len2, uy2 = dy2/len2;
      const sinA = Math.abs(eUx*uy2 - eUy*ux2);
      if(sinA < 0.1) continue; // 平行エッジ（往復）は除外
      if(sinA < minSin) minSin = sinA;
    }
    if(minSin > 0.99) return baseR; // 直交のみ → 従来通り
    if(minSin < 0.3) minSin = 0.3;
    const angularR = Math.min(baseR / minSin, baseR * 2.5);
    return Math.max(baseR, angularR);
  }

  const dx=e.to.x-e.from.x, dy=e.to.y-e.from.y;
  const fullDist=Math.sqrt(dx*dx+dy*dy);
  const trimFrom = padRadius(e.from);
  const trimTo   = padRadius(e.to);
  const drawStart = trimFrom;
  const drawLen   = fullDist - trimFrom - trimTo;
  if(drawLen <= 1) return;
  drawRoadSegmentDirect(e, roadW, drawStart, drawLen, e.from);
}

function drawRoadSegmentDirect(e, roadW, drawStart, drawLen, fromNode, angle){
  if(angle===undefined){
    const dx2=e.to.x-fromNode.x, dy2=e.to.y-fromNode.y;
    angle=Math.atan2(dy2,dx2);
  }

  ctx.save();
  ctx.translate(fromNode.x, fromNode.y);
  ctx.rotate(angle);

  // oneway は中心線基準で描画（コーナーパッドと位置を合わせるため）
  const yOffset = e.type === 'oneway' ? -roadW/2 : -roadW;

  // --- 道路ベース色 ---
  ctx.fillStyle = e.type==="oneway" ? "#4a4a5a" : "#555";
  ctx.fillRect(drawStart, yOffset, drawLen, roadW);

  // --- テクスチャ描画（clip で範囲制限）---
  ctx.save();
  ctx.beginPath();
  ctx.rect(drawStart, yOffset, drawLen, roadW);
  ctx.clip();

  if(e.type==="oneway"){
    // oneway: douro_small.png（1車線幅）
    if(onewayImg.complete && onewayImg.naturalWidth > 0){
      const tileW = 67;
      let x = drawStart - ((drawStart|0) % tileW);
      while(x < drawStart + drawLen){
        ctx.drawImage(onewayImg, x, yOffset, tileW, roadW);
        x += tileW;
      }
    }
  } else if(e.type==="branch"){
    // branch: douro_small.png を1車線幅でタイル
    // 上り/下り両エッジにそれぞれ適用することで双方向が自然に見える
    if(onewayImg.complete && onewayImg.naturalWidth > 0){
      const tileW = 67;
      let x = drawStart - ((drawStart|0) % tileW);
      while(x < drawStart + drawLen){
        ctx.drawImage(onewayImg, x, -roadW, tileW, roadW);
        x += tileW;
      }
    } else {
      ctx.fillStyle = "#4a4a5a";
      ctx.fillRect(drawStart, -roadW, drawLen, roadW);
    }
  } else if(e.type==="asym"){
    // asym: douro_asym.png（54px高）
    // 広側(2車線): テクスチャ上半分(0〜35px)を使用 → y=-36〜0
    // 狭側(1車線): テクスチャ下半分(36〜53px)を使用 → y=-18〜0
    const texH = 54; // テクスチャ総高
    const tileW = 140;
    const useImg = (e.closedLane >= 0 && asymClosedImg.complete && asymClosedImg.naturalWidth > 0)
      ? asymClosedImg : (asymImg.complete && asymImg.naturalWidth > 0 ? asymImg : null);

    if(useImg){
      // 広側(asymWide=true): テクスチャ上36px（2車線分）
      // 狭側(asymWide=false): テクスチャ下18px（1車線分）
      const srcY  = e.asymWide ? 0 : 36;
      const srcH  = e.asymWide ? 36 : 18;
      let x = drawStart - ((drawStart|0) % tileW);
      while(x < drawStart + drawLen){
        const drawW = Math.min(tileW, drawStart + drawLen - x);
        ctx.drawImage(useImg, 0, srcY, drawW, srcH, x, -roadW, drawW, roadW);
        x += tileW;
      }
    } else {
      ctx.fillStyle = "#555";
      ctx.fillRect(drawStart, -roadW, drawLen, roadW);
    }
  } else {
    // main: douro.png（幹線用）
    if(roadImg.complete && roadImg.naturalWidth > 0){
      let x = drawStart - ((drawStart|0) % 60);
      while(x < drawStart + drawLen){
        ctx.drawImage(roadImg, x, -roadW, 60, roadW);
        x += 60;
      }
    }
  }

  ctx.restore(); // clip 解除

  // --- 非対称道路の植栽帯 / 工事帯（狭側の外側＝広側との差分スペースに描画）---
  // 狭側(1車線=18px): 道路は y=-18〜0
  // 広側(2車線=36px): 道路は y=-36〜0
  // → 差分スペース: y=-36〜-18（狭側の外側）に植栽/工事帯を描く
  if(e.type === "asym" && !e.asymWide){
    const greenY = -(LANE_W * 2);  // -36
    const greenH = LANE_W;          // 18px（1車線分）
    ctx.save();
    ctx.beginPath();
    ctx.rect(drawStart, greenY, drawLen, greenH);
    ctx.clip();

    if(e.underConstruction){
      // ===== 工事帯: 砂利地肌 ＋ カラーコーン =====
      // 砂利ベース
      ctx.fillStyle = "#a89060";
      ctx.fillRect(drawStart, greenY, drawLen, greenH);

      // 砂利粒（暗め）
      ctx.fillStyle = "rgba(100,80,40,0.7)";
      for(let gx = drawStart + 6; gx < drawStart + drawLen; gx += 12){
        const gy = greenY + 3 + (gx % 5);
        ctx.beginPath(); ctx.arc(gx,     gy,     2,   0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(gx + 5, gy + 3, 1.5, 0, Math.PI*2); ctx.fill();
      }
      // 砂利粒（明るめ）
      ctx.fillStyle = "rgba(200,170,100,0.5)";
      for(let gx = drawStart + 3; gx < drawStart + drawLen; gx += 16){
        const gy = greenY + 5 + (gx % 4);
        ctx.beginPath(); ctx.arc(gx, gy, 1.5, 0, Math.PI*2); ctx.fill();
      }

      // 縁石（上下）
      ctx.fillStyle = "#9a9088";
      ctx.fillRect(drawStart, greenY,              drawLen, 2);
      ctx.fillRect(drawStart, greenY + greenH - 2, drawLen, 2);

      // カラーコーン（40px間隔）
      const coneStep = 40;
      const coneH   = greenH - 2;        // コーン高さ（帯幅に収める）
      const coneW   = coneH * 0.7;       // コーンの底幅
      const coneBaseY = greenY + greenH - 3;  // コーンの底y
      const coneTipY  = coneBaseY - coneH;    // コーンの先端y

      for(let cx = drawStart + coneStep/2; cx < drawStart + drawLen; cx += coneStep){
        // 台座
        ctx.fillStyle = "#333";
        ctx.fillRect(cx - coneW/2 - 1, coneBaseY - 1, coneW + 2, 2);
        // コーン本体（三角形）
        ctx.fillStyle = "#e05500";
        ctx.beginPath();
        ctx.moveTo(cx - coneW/2, coneBaseY);
        ctx.lineTo(cx,           coneTipY);
        ctx.lineTo(cx + coneW/2, coneBaseY);
        ctx.closePath();
        ctx.fill();
        // 反射帯（白ライン）
        const band1Y = coneBaseY - coneH * 0.35;
        const band1W = coneW * 0.55;
        ctx.fillStyle = "rgba(255,255,255,0.80)";
        ctx.beginPath();
        ctx.moveTo(cx - band1W/2, band1Y);
        ctx.lineTo(cx,            band1Y - coneH * 0.08);
        ctx.lineTo(cx + band1W/2, band1Y);
        ctx.lineTo(cx + band1W/2, band1Y + 1.5);
        ctx.lineTo(cx,            band1Y - coneH * 0.08 + 1.5);
        ctx.lineTo(cx - band1W/2, band1Y + 1.5);
        ctx.closePath();
        ctx.fill();
      }
    } else {
      // ===== 植栽帯 =====
      ctx.fillStyle = "#5a7a35";
      ctx.fillRect(drawStart, greenY, drawLen, greenH);
      // 縁石（上下）
      ctx.fillStyle = "#a8a09a";
      ctx.fillRect(drawStart, greenY,             drawLen, 2);
      ctx.fillRect(drawStart, greenY + greenH - 2, drawLen, 2);
      // 植木
      const treeStep = 54;
      const treeR = 6;
      const treeY = greenY + greenH / 2;
      for(let tx = drawStart + treeStep/2; tx < drawStart + drawLen; tx += treeStep){
        // 幹
        ctx.fillStyle = "#7a5a2a";
        ctx.fillRect(tx - 1.5, treeY + 2, 3, 4);
        // 葉（影）
        ctx.fillStyle = "#2a5a18";
        ctx.beginPath();
        ctx.ellipse(tx + 1, treeY - 1, treeR, treeR - 1, 0, 0, Math.PI*2);
        ctx.fill();
        // 葉（明）
        ctx.fillStyle = "#3d8025";
        ctx.beginPath();
        ctx.ellipse(tx, treeY - 2, treeR - 1, treeR - 2, 0, 0, Math.PI*2);
        ctx.fill();
        // ハイライト
        ctx.fillStyle = "rgba(100,180,60,0.4)";
        ctx.beginPath();
        ctx.ellipse(tx - 2, treeY - 3, 3, 2, -0.3, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.restore();
  }

  // --- 一方通行矢印 ---
  if(e.type==="oneway"){
    ctx.fillStyle="rgba(255,255,100,0.85)";
    ctx.font=`bold ${Math.max(10,roadW-2)}px sans-serif`;
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    const step=80;
    for(let x=drawStart+step/2; x<drawStart+drawLen; x+=step){
      ctx.fillText("▶", x, yOffset + roadW/2);
    }
  }

  // --- 車線中央線（main のみ）---
  // 交差点手前80px は黄色（車線規制ゾーン）、それ以外は白
  if(e.type==="main"){
    const isNearCross = e.to && e.to.type==="cross" && !e.to.external
                     && !e.to.isRoundabout && !e.to.isRaEntry;
    const YELLOW_ZONE = 80; // 黄色ゾーンの長さ(px)
    const drawEnd     = drawStart + drawLen;
    const yellowStart = isNearCross
      ? Math.max(drawStart, drawEnd - YELLOW_ZONE)
      : drawEnd; // 黄色なし

    ctx.setLineDash([10,8]);
    ctx.lineWidth=1.5;

    for(let ln=1; ln<e.lanes; ln++){
      const lineY = -ln*LANE_W;

      // 白区間（通常）
      if(yellowStart > drawStart){
        ctx.strokeStyle="rgba(255,255,255,0.55)";
        ctx.beginPath();
        ctx.moveTo(drawStart,    lineY);
        ctx.lineTo(yellowStart,  lineY);
        ctx.stroke();
      }

      // 黄色区間（交差点手前80px）
      if(isNearCross){
        ctx.strokeStyle="rgba(255,210,0,0.80)";
        ctx.beginPath();
        ctx.moveTo(yellowStart, lineY);
        ctx.lineTo(drawEnd,     lineY);
        ctx.stroke();
      }
    }
    ctx.setLineDash([]);
  }

  // --- 封鎖道路: 赤オーバーレイ + 🚧 ---
  if(e.blocked){
    ctx.save();
    ctx.globalAlpha=0.52;
    ctx.fillStyle='#cc1111';
    ctx.fillRect(drawStart, -roadW, drawLen, roadW);
    ctx.globalAlpha=1;
    ctx.strokeStyle='rgba(255,60,60,0.9)';
    ctx.lineWidth=2.5; ctx.setLineDash([10,5]);
    ctx.beginPath(); ctx.moveTo(drawStart,-roadW); ctx.lineTo(drawStart+drawLen,0); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(drawStart,0); ctx.lineTo(drawStart+drawLen,-roadW); ctx.stroke();
    ctx.setLineDash([]);
    ctx.font='bold 11px sans-serif';
    ctx.fillStyle='rgba(255,220,0,0.98)';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    const nSt=Math.max(1,Math.floor(drawLen/55));
    for(let si=0;si<nSt;si++) ctx.fillText('🚧', drawStart+(drawLen*(si+0.5)/nSt), -roadW/2);
    ctx.restore();
  }

  // --- 制限速度マーキング（エッジ中央に赤丸+数字）---
  if(!e.blocked && drawLen >= 80 && SPEED_LIMIT_KMH[e.type] &&
     !(e.to && (e.to.isRaEntry || e.to.isRaExit)) &&
     !(e.from && (e.from.isRaEntry || e.from.isRaExit))){
    const kmh = SPEED_LIMIT_KMH[e.type];
    const markX = drawStart + drawLen / 2;
    const markY = yOffset + roadW / 2;
    const markR = Math.min(7, roadW * 0.36);
    ctx.save();
    ctx.beginPath();
    ctx.arc(markX, markY, markR, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(200,20,20,0.88)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(markX, markY, markR * 0.70, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.96)';
    ctx.fill();
    ctx.fillStyle = '#111';
    ctx.font = `bold ${Math.max(5, Math.floor(markR * 1.05))}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(kmh, markX, markY);
    ctx.restore();
  }

  ctx.restore();
}

// ===== 信号タイミングパネル =====
function openSignalPanel(node, pageX, pageY){
  const panel = document.getElementById("signalTimingPanel");
  const v = node.greenDuration || 120;
  document.getElementById("signalPanelSlider").value = v;
  document.getElementById("signalPanelVal").textContent = v;
  document.getElementById("signalPanelSec").textContent = (v/60).toFixed(1);
  const rv = node.allRedDuration !== undefined ? node.allRedDuration : 45;
  document.getElementById("signalPanelRedSlider").value = rv;
  document.getElementById("signalPanelRedVal").textContent = rv;
  document.getElementById("signalPanelRedSec").textContent = (rv/60).toFixed(1);

  // 左折フェーズUI
  const ltChk = document.getElementById("signalPanelLeftTurn");
  ltChk.checked = !!node.hasLeftTurnPhase;
  const ltRow = document.getElementById("signalPanelLeftTurnRow");
  ltRow.style.display = ltChk.checked ? 'block' : 'none';
  const ltVal = node.phase3Duration || 60;
  document.getElementById("signalPanelLTSlider").value = ltVal;
  document.getElementById("signalPanelLTVal").textContent = ltVal;

  // 位置調整（画面端に出ないよう）
  let px = pageX + 10, py = pageY + 10;
  if(px + 240 > window.innerWidth)  px = pageX - 240;
  if(py + 200 > window.innerHeight) py = pageY - 200;
  panel.style.left = px + "px";
  panel.style.top  = py + "px";
  panel.style.display = "block";
}

function closeSignalPanel(){
  document.getElementById("signalTimingPanel").style.display = "none";
}

function onSignalPanelInput(val){
  const v = parseInt(val);
  document.getElementById("signalPanelVal").textContent = v;
  document.getElementById("signalPanelSec").textContent = (v/60).toFixed(1);
  if(selectedNode) selectedNode.greenDuration = v;
}

function onSignalRedInput(val){
  const v = parseInt(val);
  document.getElementById("signalPanelRedVal").textContent = v;
  document.getElementById("signalPanelRedSec").textContent = (v/60).toFixed(1);
  if(selectedNode) selectedNode.allRedDuration = v;
}

function onLeftTurnToggle(checked){
  const ltRow = document.getElementById("signalPanelLeftTurnRow");
  ltRow.style.display = checked ? 'block' : 'none';
  if(selectedNode){
    selectedNode.hasLeftTurnPhase = checked;
    if(!checked) selectedNode.phase3Duration = 0;
  }
}

function onLeftTurnInput(val){
  const v = parseInt(val);
  document.getElementById("signalPanelLTVal").textContent = v;
  if(selectedNode) selectedNode.phase3Duration = v;
}

function applySignalPanelToAll(){
  const v  = parseInt(document.getElementById("signalPanelSlider").value);
  const rv = parseInt(document.getElementById("signalPanelRedSlider").value);
  const lt = document.getElementById("signalPanelLeftTurn").checked;
  const ltv= parseInt(document.getElementById("signalPanelLTSlider").value);
  for(const n of nodes){
    if(n.type==="cross"&&!n.external&&n.hasSignal){
      n.greenDuration = v;
      n.allRedDuration = rv;
      n.hasLeftTurnPhase = lt;
      n.phase3Duration = lt ? ltv : 0;
    }
  }
  showToast(`🚦 全交差点: 青${v}f / 全赤${rv}f${lt?' / 左折'+ltv+'f':''} に設定しました`);
}

function applyGreenToAll(){
  const v = parseInt(document.getElementById("greenSlider").value);
  for(const n of nodes){
    if(n.type==="cross"&&!n.external&&n.hasSignal) n.greenDuration = v;
  }
  showToast(`🚦 全交差点の青時間を ${v}f に設定しました`);
}
