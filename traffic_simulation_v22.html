<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>都市交通シミュレーション v22</title>
<style>
body { margin:0; background:#1e1e1e; color:white; font-family:sans-serif; }
#ui { padding:6px; text-align:center; font-size:13px; }
#gameWrap { display:flex; justify-content:center; align-items:flex-start; gap:10px; }
canvas { background:#2b2b2b; display:block; flex-shrink:0; }
input { width:140px; }
#sidePanel {
  width:160px; background:#222; border:1px solid #444; border-radius:6px;
  padding:10px 8px; font-size:13px; display:flex; flex-direction:column; gap:8px;
  flex-shrink:0; margin-top:0;
}
#sidePanel h3 { margin:0 0 4px; font-size:14px; color:#f0c040; text-align:center; border-bottom:1px solid #444; padding-bottom:4px; }
#sidePanel .sec { font-size:11px; color:#aaa; margin-bottom:2px; }
#sidePanel button {
  width:100%; padding:5px 4px; border:none; border-radius:4px;
  cursor:pointer; font-size:12px; font-weight:bold; transition:opacity 0.15s;
}
#sidePanel button:hover { opacity:0.85; }
#sidePanel button:disabled { opacity:0.4; cursor:not-allowed; }
.btn-green  { background:#2a7a2a; color:#fff; }
.btn-red    { background:#7a2020; color:#fff; }
.btn-blue   { background:#1a4a9a; color:#fff; }
.btn-yellow { background:#8a6a00; color:#fff; }
.btn-active { outline:2px solid #f0c040; }
#budgetVal { font-size:18px; font-weight:bold; color:#f0c040; text-align:center; }
#modeLabel { text-align:center; font-size:11px; color:#80d0ff; min-height:16px; }
.cost-tag  { color:#ff9040; font-size:10px; }
#scoreBar {
  display:flex; justify-content:center; align-items:center; gap:20px;
  padding:6px 0; background:#111; border-bottom:1px solid #333;
  font-size:15px; letter-spacing:0.5px;
}
#scoreVal { font-size:22px; font-weight:bold; color:#f0c040; }
#rankVal  { font-size:18px; font-weight:bold; }
#accVal   { color:#ff6060; }
#bonusVal { color:#60d0ff; font-size:12px; }
.rank-S { color:#ff4fff; }
.rank-A { color:#ffaa00; }
.rank-B { color:#80e060; }
.rank-C { color:#60b0ff; }
.rank-D { color:#aaaaaa; }
/* 車プロフィールポップアップ */
#carProfile table td { padding:1px 4px; vertical-align:top; font-size:12px; }
#carProfile table tr:nth-child(even) { background:rgba(255,255,255,0.04); }
</style>
</head>
<body>
<div id="scoreBar">
  <span>SCORE: <span id="scoreVal">0</span></span>
  <span>RANK: <span id="rankVal" class="rank-B">B</span></span>
  <span id="bonusVal">BONUS ×1.0</span>
  <span>事故: <span id="accVal">0</span>件</span>
</div>
<div id="ui">
  🗺️ マップ:
  <select id="mapSelect" onchange="selectMap(this.value)"
    style="background:#222;color:#fff;border:1px solid #555;padding:2px 4px;font-size:12px;cursor:pointer">
    <option value="">🎲 ランダム生成</option>
    <option value="simple_cross_a">シンプル交差点A</option>
    <option value="simple_cross_b">シンプル交差点B</option>
    <option value="simple_cross_c">シンプル交差点C</option>
    <option value="simple_cross_d">シンプル交差点D</option>
    <option value="simple_cross_y">シンプル交差点Y</option>
    <option value="simple_cross_z">シンプル交差点Z</option>
    <option value="asym_test">非対称道路テスト</option>
    <option value="asym_test2">非対称道路テスト2</option>
    <option value="crossing_a">踏切のある交差点A</option>
    <option value="crossing_b">線路のある交差点B</option>
  </select>
  <button onclick="generateCity()" style="background:#444;color:#fff;border:1px solid #666;padding:2px 8px;cursor:pointer;font-size:12px">▶ 生成</button>
  |
  流入量: <input type="range" id="flowSlider" min="0" max="100" value="50"><span id="flowVal">50</span>
  |
  全交差点青時間: <input type="range" id="greenSlider" min="60" max="300" value="120"><span id="greenVal">120</span>
  <button onclick="applyGreenToAll()" style="background:#335;color:#adf;border:1px solid #557;padding:2px 6px;font-size:11px;cursor:pointer">全適用</button>
  |
  時間帯: <span id="timeLabel" style="font-family:monospace;font-size:13px;letter-spacing:0.5px;color:#80d0ff;min-width:140px;display:inline-block">06:00 (朝ラッシュ)</span>
  | <button id="btnPause" onclick="togglePause()" style="background:#333;color:#fff;border:1px solid #555;padding:2px 8px;cursor:pointer">⏸ 停止</button>
  <button onclick="setSpeed(1)" style="background:#333;color:#fff;border:1px solid #555;padding:2px 8px;cursor:pointer">×1</button>
  <button onclick="setSpeed(2)" style="background:#333;color:#fff;border:1px solid #555;padding:2px 8px;cursor:pointer">×2</button>
  <button onclick="setSpeed(4)" style="background:#333;color:#fff;border:1px solid #555;padding:2px 8px;cursor:pointer">×4</button>
  |
  渋滞: <span id="jam">0</span>
  | <button id="btnHeatmap" onclick="toggleHeatmap()" style="background:#333;color:#ccc;border:1px solid #555;padding:2px 8px;cursor:pointer;font-size:12px">🌡 渋滞マップ</button>
  | <button id="btnDebugGrid" onclick="toggleDebugGrid()" style="background:#333;color:#888;border:1px solid #555;padding:2px 8px;cursor:pointer;font-size:12px">🔲 グリッド</button>
  | 緊急対応(-300pt): <button id="clearAccBtn" onclick="clearAccident()">🚨 対応</button>
</div>
<div id="signalTimingPanel" style="
  display:none; position:fixed; z-index:9000;
  background:rgba(15,15,30,0.96); border:1px solid rgba(100,180,255,0.7);
  border-radius:10px; padding:12px 16px; color:#ddd; font-size:13px;
  min-width:220px; box-shadow:0 4px 20px rgba(0,0,0,0.8);
  pointer-events:auto; user-select:none;
">
  <div style="font-weight:bold;color:#7df;margin-bottom:8px;border-bottom:1px solid #334;padding-bottom:4px;">
    🚦 信号タイミング設定
  </div>
  <div style="margin-bottom:8px;">
    青時間: <span id="signalPanelVal" style="color:#afa;font-weight:bold">120</span>フレーム
    <span style="color:#888;font-size:11px"> (約<span id="signalPanelSec">2.0</span>秒)</span>
  </div>
  <input type="range" id="signalPanelSlider" min="60" max="300" value="120"
    style="width:180px;margin-bottom:10px;"
    oninput="onSignalPanelInput(this.value)">
  <div style="margin-bottom:6px;font-size:11px;">
    全赤バッファ: <span id="signalPanelRedVal" style="color:#f88;font-weight:bold">45</span>f
    <span style="color:#888">(約<span id="signalPanelRedSec">0.8</span>秒)</span>
  </div>
  <input type="range" id="signalPanelRedSlider" min="0" max="120" value="45"
    style="width:180px;margin-bottom:10px;"
    oninput="onSignalRedInput(this.value)">
  <div style="margin-bottom:4px;font-size:11px;">
    🔀 左折専用フェーズ:
    <label style="cursor:pointer;">
      <input type="checkbox" id="signalPanelLeftTurn" onchange="onLeftTurnToggle(this.checked)"
        style="margin-right:4px;">
      有効
    </label>
  </div>
  <div id="signalPanelLeftTurnRow" style="display:none;margin-bottom:10px;">
    左折時間: <span id="signalPanelLTVal" style="color:#fa0;font-weight:bold">60</span>f
    <input type="range" id="signalPanelLTSlider" min="30" max="150" value="60"
      style="width:160px;margin-left:4px;"
      oninput="onLeftTurnInput(this.value)">
  </div>
  <div style="display:flex;gap:6px;">
    <button onclick="applySignalPanelToAll()"
      style="background:#224;color:#adf;border:1px solid #446;padding:3px 8px;font-size:11px;cursor:pointer;border-radius:4px;">
      全交差点に適用
    </button>
    <button onclick="closeSignalPanel()"
      style="background:#333;color:#aaa;border:1px solid #555;padding:3px 8px;font-size:11px;cursor:pointer;border-radius:4px;">
      閉じる
    </button>
  </div>
</div>

<div id="gameWrap">
<canvas id="game" width="1000" height="700"></canvas>
<div id="sidePanel">
  <h3>💰 予算</h3>
  <div id="budgetVal">0</div>
  <div id="modeLabel">モード: 通常</div>
  <hr style="border-color:#444;margin:2px 0">
  <div class="sec">🚦 信号管理</div>
  <button class="btn-green"  id="btnInstall" onclick="setMode('install')">信号設置<br><span class="cost-tag">-500pt</span></button>
  <button class="btn-red"    id="btnRemove"  onclick="setMode('remove')">信号撤去<br><span class="cost-tag">-300pt</span></button>
  <button class="btn-blue"   id="btnRoundabout" onclick="setMode('roundabout')" style="background:#2a6a4a">🔄 環状交差<br><span class="cost-tag">-1500pt</span></button>
  <hr style="border-color:#444;margin:2px 0">
  <div class="sec">🔀 道路操作</div>
  <button class="btn-blue"   id="btnReverse" onclick="setMode('reverse')">一方通行反転<br><span class="cost-tag">-800pt</span></button>
  <button class="btn-blue"   id="btnSignEdit" onclick="setMode('signEdit')" style="background:#2a5a7a">サイン変更<br><span class="cost-tag">-400pt</span></button>
  <button class="btn-blue" id="btnBlock" onclick="setMode('block')" style="background:#7a1a1a">道路封鎖<br><span class="cost-tag">-2000pt</span></button>
  <button class="btn-blue" id="btnUnblock" onclick="setMode('unblock')" style="background:#1a5a1a">封鎖解除<br><span class="cost-tag">-500pt</span></button>
  <button class="btn-blue" id="btnOverpass" onclick="setMode('overpass')" style="background:#2a4a6a">立体交差<br><span class="cost-tag">-1200pt</span></button>
  <button class="btn-blue" id="btnAsymFlip" onclick="setMode('asymFlip')" style="background:#2a5a3a">非対称反転<br><span class="cost-tag">-600pt</span></button>
  <button class="btn-blue" id="btnConstruction" onclick="setMode('construction')" style="background:#7a4a10">工事帯切替<br><span class="cost-tag">-400pt</span></button>
  <hr style="border-color:#444;margin:2px 0">
  <div class="sec">🚗 渋滞対応</div>
  <button class="btn-yellow" id="btnRemoveCar" onclick="setMode('removeCar')">車両撤去<br><span class="cost-tag">-200pt/台</span></button>
  <hr style="border-color:#444;margin:2px 0">
  <div class="sec">🚨 緊急</div>
  <button class="btn-yellow" onclick="clearAccident()">事故対応<br><span class="cost-tag">-300pt</span></button>
  <hr style="border-color:#444;margin:2px 0">
  <button style="background:#333;color:#ccc;font-size:11px;padding:3px" onclick="setMode(null)">✕ キャンセル</button>
  <div style="font-size:10px;color:#666;margin-top:4px;line-height:1.4">
    [交差点クリック]で信号操作<br>[道路クリック]で反転
  </div>
</div>
</div>

// ===== ユーティリティ =====
function linesIntersect(p1,p2,p3,p4){
  if(p1===p3||p1===p4||p2===p3||p2===p4) return false;
  const ccw=(a,b,c)=>(c.y-a.y)*(b.x-a.x)>(b.y-a.y)*(c.x-a.x);
  return ccw(p1,p3,p4)!==ccw(p2,p3,p4) && ccw(p1,p2,p3)!==ccw(p1,p2,p4);
}

// より厳密な交差判定（パラメータ計算で端点上通過も検出）
// 共有ノード(同一オブジェクト)はOK、それ以外の交差は全てNG
// eps: 端点付近を交差とみなす閾値（0.02 = 線分の2%以内）
function segmentsCross(p1,p2,p3,p4, eps=0.03){
  // 共有端点は交差扱いしない
  if(p1===p3||p1===p4||p2===p3||p2===p4) return false;
  const d1x=p2.x-p1.x, d1y=p2.y-p1.y;
  const d2x=p4.x-p3.x, d2y=p4.y-p3.y;
  const denom=d1x*d2y - d1y*d2x;
  if(Math.abs(denom)<1e-10) return false; // 平行
  const t=((p3.x-p1.x)*d2y-(p3.y-p1.y)*d2x)/denom;
  const u=((p3.x-p1.x)*d1y-(p3.y-p1.y)*d1x)/denom;
  // 両方の線分の内側で交差していれば真
  return t>eps && t<1-eps && u>eps && u<1-eps;
}

// 既存エッジ群との交差チェック（候補線分a→bが既存エッジと交差するか）
// 共有ノード接続は許容する
function crossesAnyEdge(a, b){
  for(const e of edges){
    if(segmentsCross(a,b,e.from,e.to)) return true;
  }
  return false;
}

// ===== Node =====
class Node {
  constructor(x,y,type="cross",external=false,img=null){
    this.x=x; this.y=y; this.type=type; this.external=external; this.img=img;
    this.phase=0; this.timer=0; this.greenDuration=120;
    this.allRedDuration=45; // インターグリーン期間(フレーム)=約0.75秒
    // hasSignal: 初期は generateCity() で設定（内部交差点の40%のみtrue）
    this.hasSignal = false;
    // 駐車場専用フィールド
    if(this.type === "parking"){
      const cap = this.isLarge ? 48 : 12;
      this.capacity   = cap;
      this.parkedCars = [];
      this.slotUsed   = new Array(cap).fill(false);
    }
  }
  update(){
    // 駐車場タイマー: 滞在時間が来たら退場して再出発
    if(this.type === "parking"){
      for(let i = this.parkedCars.length-1; i >= 0; i--){
        const p = this.parkedCars[i];
        p.timer--;
        if(p.timer <= 0){
          // スロット解放
          if(this.slotUsed && p.slot >= 0) this.slotUsed[p.slot] = false;
          this.parkedCars.splice(i, 1);
          spawnCarFromParking(this, p.img);
        }
      }
      return;
    }
    // bend（L字折れ点）はロジック不要
    if(this.type === "bend") return;
    if(this.external || this.type!=="cross") return;
    if(!this.hasSignal) return;
    // フェーズ: 0=縦青, 1=横青, 2=全赤バッファ, 3=左折専用(縦方向のみ)
    // 3フェーズ信号: phase3Duration > 0 のとき有効
    const duration = this.phase===2 ? this.allRedDuration
      : this.phase===3 ? (this.phase3Duration||60)
      : this.greenDuration;
    if(++this.timer >= duration){
      this.timer=0;
      if(this.phase===2){
        this.phase = (this._nextPhase !== undefined) ? this._nextPhase : 1;
        delete this._nextPhase;
      } else if(this.phase===3){
        // 左折フェーズ終了 → 全赤
        this._nextPhase = 1;
        this.phase = 2;
      } else {
        // phase 0終了: 左折フェーズあり交差点は phase3 へ、それ以外は全赤
        if(this.phase===0 && this.hasLeftTurnPhase){
          this._nextPhase = undefined;
          this.phase = 3; // 左折専用フェーズ
        } else {
          this._nextPhase = (this.phase===0) ? 1 : 0;
          this.phase = 2;
        }
      }
    }
  }
  draw(){
    if(this.type==="house"||this.type==="park"||this.type==="company"){
      if(this.houseType === 'sparse'){
        drawHouseSparse(this);
      } else {
        if(this.img) ctx.drawImage(this.img, this.x-20, this.y-20, 40, 40);
      }
      return;
    }
    if(this.type==="parking"){
      // houseType='sparse' の住宅はdrawHouseSparseで描画
      if(this.houseType === 'sparse'){
        drawHouseSparse(this);
        return;
      }
      if(this.houseType === 'building'){
        drawBuilding(this);
        return;
      }
      if(this.houseType === 'mansionH'){
        drawMansionH(this);
        return;
      }
      if(this.houseType === 'mansionV'){
        drawMansionV(this);
        return;
      }
      if(this.houseType === 'gasStation'){
        drawGasStation(this);
        // ===== ガソリンスタンド給油中の車 =====
        // 給油エリアはスタンド下半分。ポンプ島2基の両脇に車を配置
        // facing回転を考慮してCanvas座標に変換
        const W=72, H=72;
        const facing = this.gsFacing || 'south';
        const rot = {south:0, north:Math.PI, east:-Math.PI/2, west:Math.PI/2}[facing] || 0;
        // スロット定義（回転前・中心基準座標）
        // 島1左: cx=-27, 島1右: cx=-14, 島2左: cx=+6, 島2右: cx=+19
        // y: 給油エリア中央 = H*0.52 + H*0.48/2 - H/2 = H*0.76 - H/2 = H*0.26 = ~19
        const GS_SLOTS = [
          {cx:-28, cy:16, angle: Math.PI/2},  // 島1左脇
          {cx:-10, cy:16, angle: Math.PI/2},  // 島1右脇
          {cx:  3, cy:16, angle: Math.PI/2},  // 島2左脇
          {cx: 23, cy:16, angle: Math.PI/2},  // 島2右脇
        ];
        for(const p of this.parkedCars){
          if(p.slot < 0 || p.slot >= GS_SLOTS.length) continue;
          const sl = GS_SLOTS[p.slot];
          // facing回転を適用
          const cosR = Math.cos(rot), sinR = Math.sin(rot);
          const rx = sl.cx * cosR - sl.cy * sinR;
          const ry = sl.cx * sinR + sl.cy * cosR;
          ctx.save();
          ctx.translate(this.x + rx, this.y + ry);
          ctx.rotate(sl.angle + rot);
          const carW = 14, carH = 9;
          if(p.img && p.img.complete && p.img.naturalWidth > 0){
            ctx.drawImage(p.img, -carW/2, -carH/2, carW, carH);
          } else {
            ctx.fillStyle='#4070c0';
            ctx.fillRect(-carW/2, -carH/2, carW, carH);
          }
          ctx.restore();
        }
        return;
      }
      // drawOffset: 描画位置のみをずらす（接続・経路計算は変わらない）
      // 未設定(undefined)の場合は 0 として扱う → 既存マップへの影響ゼロ
      const dox = this.drawOffsetX || 0;
      const doy = this.drawOffsetY || 0;
      const dx = this.x + dox;
      const dy = this.y + doy;

      // 駐車場タイプ別描画
      // isStationParking2: 駅前縦長タイプ（parking.png 60×60 を縦2枚 = 60×120）
      // isVertical:        縦長タイプ（parking_mid.png 60×120）
      // isLarge:           大型タイプ（parking.png 2×2・48台）
      // 通常:              標準タイプ（parking.png 60×60・12台）

      if(this.isStationParking2){
        const tW=60, tH=60;
        const sx = dx - tW/2;
        const sy = dy - tH;
        if(parkingImg.complete && parkingImg.naturalWidth > 0){
          ctx.drawImage(parkingImg, sx, sy,    tW, tH);
          ctx.drawImage(parkingImg, sx, sy+tH, tW, tH);
        } else {
          ctx.fillStyle="#3a3a4a";
          ctx.fillRect(sx, sy, tW, tH*2);
          ctx.fillStyle="white"; ctx.font="bold 18px sans-serif";
          ctx.textAlign="center"; ctx.textBaseline="middle";
          ctx.fillText("P", dx, dy);
        }
      } else if(this.isVertical){
        const vW = 60, vH = 120;
        if(parkingMidImg.complete && parkingMidImg.naturalWidth > 0){
          ctx.drawImage(parkingMidImg, dx - vW/2, dy - vH/2, vW, vH);
        } else {
          ctx.fillStyle = '#3a3a4a';
          ctx.fillRect(dx - vW/2, dy - vH/2, vW, vH);
        }
      } else {
        const pSize = this.isLarge ? 120 : 60;
        const half  = pSize / 2;
        if(parkingImg.complete && parkingImg.naturalWidth > 0){
          if(this.isLarge){
            ctx.drawImage(parkingImg, dx-half,    dy-half,    60, 60);
            ctx.drawImage(parkingImg, dx-half+60, dy-half,    60, 60);
            ctx.drawImage(parkingImg, dx-half,    dy-half+60, 60, 60);
            ctx.drawImage(parkingImg, dx-half+60, dy-half+60, 60, 60);
          } else {
            ctx.drawImage(parkingImg, dx-half, dy-half, pSize, pSize);
          }
        } else {
          ctx.fillStyle="#3a3a4a";
          ctx.fillRect(dx-half, dy-half, pSize, pSize);
          ctx.fillStyle="white";
          ctx.font=`bold ${this.isLarge?32:22}px sans-serif`;
          ctx.textAlign="center"; ctx.textBaseline="middle";
          ctx.fillText("P", dx, dy);
        }
      }

      // ===== 駐車中の車スロット定義 =====
      // isStationParking2 スロット（parking.png 60×60 縦2枚 = 60×120px・24台）
      // 上タイル中心: this.y - 30、下タイル中心: this.y + 30
      // 各タイルのスロット座標は通常parking.pngと同じ（cx/cy）
      const normalSlots = [
        {cx:-19.25, cy:-24.75, cw:20.50, ch:9.50,  angle:0},
        {cx:-19.25, cy:-15.00, cw:20.50, ch:10.00, angle:0},
        {cx:-19.25, cy: -5.00, cw:20.50, ch:10.00, angle:0},
        {cx:-19.25, cy:  5.00, cw:20.50, ch:10.00, angle:0},
        {cx:-19.25, cy: 15.00, cw:20.50, ch:10.00, angle:0},
        {cx:-19.25, cy: 24.75, cw:20.50, ch:9.50,  angle:0},
        {cx: 18.75, cy:-24.75, cw:20.50, ch:9.50,  angle:Math.PI},
        {cx: 18.75, cy:-15.00, cw:20.50, ch:10.00, angle:Math.PI},
        {cx: 18.75, cy: -5.00, cw:20.50, ch:10.00, angle:Math.PI},
        {cx: 18.75, cy:  5.00, cw:20.50, ch:10.00, angle:Math.PI},
        {cx: 18.75, cy: 15.00, cw:20.50, ch:10.00, angle:Math.PI},
        {cx: 18.75, cy: 24.75, cw:20.50, ch:9.50,  angle:Math.PI},
      ];
      // 上タイル(dy=-30): this.yから-30ずれた中心
      // 下タイル(dy=+30): this.yから+30ずれた中心
      const SLOTS_ST2 = [
        ...normalSlots.map(s=>({...s, cy:s.cy-30})), // 上タイル
        ...normalSlots.map(s=>({...s, cy:s.cy+30})), // 下タイル
      ];

      const SLOTS_V = [];
      for(let i=0; i<8; i++){
        const cy = -48 + i * 13.5;
        SLOTS_V.push({cx:-14, cy, cw:18, ch:9, angle:0});
        SLOTS_V.push({cx: 14, cy, cw:18, ch:9, angle:Math.PI});
      }

      // 住宅スロット: 駐車スペース位置（パターンにより異なるが中央固定で対応）
      // 駐車スペースは描画で管理するため、スロット座標は駐車枠の中央に合わせる
      const SLOTS_HOUSE = [{cx:0, cy:0, cw:18, ch:8, angle:0}];

      const SLOTS = this.houseType === 'sparse' ? SLOTS_HOUSE :
                    this.isStationParking2 ? SLOTS_ST2 : this.isVertical ? SLOTS_V : this.isLarge ? [
        // 左上左列A cx=-49.25, angle=0
        {cx:-49.25, cy:-54.75, cw:20.50, ch:9.50, angle:0},
        {cx:-49.25, cy:-45.0, cw:20.50, ch:9.50, angle:0},
        {cx:-49.25, cy:-35.0, cw:20.50, ch:9.50, angle:0},
        {cx:-49.25, cy:-25.0, cw:20.50, ch:9.50, angle:0},
        {cx:-49.25, cy:-15.0, cw:20.50, ch:9.50, angle:0},
        {cx:-49.25, cy:-5.25, cw:20.50, ch:9.50, angle:0},
        {cx:-49.25, cy:5.25, cw:20.50, ch:9.50, angle:0},
        {cx:-49.25, cy:15.0, cw:20.50, ch:9.50, angle:0},
        {cx:-49.25, cy:25.0, cw:20.50, ch:9.50, angle:0},
        {cx:-49.25, cy:35.0, cw:20.50, ch:9.50, angle:0},
        {cx:-49.25, cy:45.0, cw:20.50, ch:9.50, angle:0},
        {cx:-49.25, cy:54.75, cw:20.50, ch:9.50, angle:0},
        {cx:-11.25, cy:-54.75, cw:20.50, ch:9.50, angle:0},
        {cx:-11.25, cy:-45.0, cw:20.50, ch:9.50, angle:0},
        {cx:-11.25, cy:-35.0, cw:20.50, ch:9.50, angle:0},
        {cx:-11.25, cy:-25.0, cw:20.50, ch:9.50, angle:0},
        {cx:-11.25, cy:-15.0, cw:20.50, ch:9.50, angle:0},
        {cx:-11.25, cy:-5.25, cw:20.50, ch:9.50, angle:0},
        {cx:-11.25, cy:5.25, cw:20.50, ch:9.50, angle:0},
        {cx:-11.25, cy:15.0, cw:20.50, ch:9.50, angle:0},
        {cx:-11.25, cy:25.0, cw:20.50, ch:9.50, angle:0},
        {cx:-11.25, cy:35.0, cw:20.50, ch:9.50, angle:0},
        {cx:-11.25, cy:45.0, cw:20.50, ch:9.50, angle:0},
        {cx:-11.25, cy:54.75, cw:20.50, ch:9.50, angle:0},
        {cx:10.75, cy:-54.75, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:10.75, cy:-45.0, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:10.75, cy:-35.0, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:10.75, cy:-25.0, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:10.75, cy:-15.0, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:10.75, cy:-5.25, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:10.75, cy:5.25, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:10.75, cy:15.0, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:10.75, cy:25.0, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:10.75, cy:35.0, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:10.75, cy:45.0, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:10.75, cy:54.75, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:48.75, cy:-54.75, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:48.75, cy:-45.0, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:48.75, cy:-35.0, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:48.75, cy:-25.0, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:48.75, cy:-15.0, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:48.75, cy:-5.25, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:48.75, cy:5.25, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:48.75, cy:15.0, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:48.75, cy:25.0, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:48.75, cy:35.0, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:48.75, cy:45.0, cw:20.50, ch:9.50, angle:Math.PI},
        {cx:48.75, cy:54.75, cw:20.50, ch:9.50, angle:Math.PI},
      ] : [
        {cx:-19.25, cy:-24.75, cw:20.50, ch:9.50, angle:0},
        {cx:-19.25, cy:-15.00, cw:20.50, ch:10.00, angle:0},
        {cx:-19.25, cy: -5.00, cw:20.50, ch:10.00, angle:0},
        {cx:-19.25, cy:  5.00, cw:20.50, ch:10.00, angle:0},
        {cx:-19.25, cy: 15.00, cw:20.50, ch:10.00, angle:0},
        {cx:-19.25, cy: 24.75, cw:20.50, ch:9.50,  angle:0},
        {cx: 18.75, cy:-24.75, cw:20.50, ch:9.50,  angle:Math.PI},
        {cx: 18.75, cy:-15.00, cw:20.50, ch:10.00, angle:Math.PI},
        {cx: 18.75, cy: -5.00, cw:20.50, ch:10.00, angle:Math.PI},
        {cx: 18.75, cy:  5.00, cw:20.50, ch:10.00, angle:Math.PI},
        {cx: 18.75, cy: 15.00, cw:20.50, ch:10.00, angle:Math.PI},
        {cx: 18.75, cy: 24.75, cw:20.50, ch:9.50,  angle:Math.PI},
      ];

      for(const p of this.parkedCars){
        if(p.slot < 0 || p.slot >= SLOTS.length) continue;
        const sl = SLOTS[p.slot];
        const wx = dx + sl.cx; // drawOffset適用済みの描画中心から
        const wy = dy + sl.cy;

        ctx.save();
        ctx.translate(wx, wy);
        ctx.rotate(sl.angle);

        const carW = sl.cw * 0.80;
        const carH = sl.ch * 0.68;

        if(p.img && p.img.complete && p.img.naturalWidth > 0){
          ctx.drawImage(p.img, -carW/2, -carH/2, carW, carH);
        } else {
          ctx.fillStyle='#c04020';
          ctx.fillRect(-carW/2, -carH/2, carW, carH);
        }
        ctx.restore();
      }

      // 容量バッジ（描画中心の下に表示）
      const ratio = this.parkedCars.length / this.capacity;
      ctx.save();
      ctx.font='bold 8px sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='top';
      ctx.fillStyle = ratio >= 1 ? '#ff4040' : ratio > 0.7 ? '#ffaa40' : '#a0e080';
      const badgeY = dy + (this.isStationParking2 ? 62 : this.isVertical ? 62 : this.isLarge ? 63 : 31);
      if(this.houseType !== 'sparse'){ // 住宅はバッジ非表示
        ctx.fillText(
          ratio >= 1 ? '🅿満車' : `🅿${this.parkedCars.length}/${this.capacity}`,
          dx, badgeY
        );
      }
      ctx.restore();
      return;
    }
    // "bend" はL字の折れ点（視覚表現なし）
    if(this.type === "bend") return;
    // RA外縁点・駐車場アクセスノードは描画しない
    if(this.isRaEntry || this.isRaExit) return;
    if(this.isParkingAccess) return;
    // 踏切ノードは drawRailways() が描画するのでスキップ
    if(this.isCrossing) return;

    // 外部ノード: 小さな四角のみ（出入口マーカー）
    if(this.external){
      ctx.fillStyle = "#444";
      ctx.fillRect(this.x-8, this.y-8, 16, 16);
      return;
    }

    // 内部交差点: 中央の大きな四角は描画しない
    // 交差点パッドは drawIntersectionPads() で描画済み

    // ===== 操作モードのハイライト =====
    // 交差点全体のアウトラインで示す
    const connEdgesN = edges.filter(e => e.from===this || e.to===this);
    const padRN = connEdgesN.length > 0
      ? Math.max(...connEdgesN.map(e => e.lanes * LANE_W))
      : 15;

    // 選択中の信号交差点をハイライト
    if(selectedNode === this && this.hasSignal){
      ctx.save();
      ctx.strokeStyle='rgba(100,200,255,0.9)';
      ctx.lineWidth=2.5;
      ctx.setLineDash([5,3]);
      ctx.strokeRect(this.x-padRN-3, this.y-padRN-3, (padRN+3)*2, (padRN+3)*2);
      ctx.setLineDash([]);
      ctx.restore();
    }

    if(operationMode==='install' && !this.hasSignal){
      ctx.save();
      ctx.strokeStyle='rgba(80,255,80,0.8)';
      ctx.lineWidth=2;
      ctx.setLineDash([4,3]);
      ctx.strokeRect(this.x-padRN-2, this.y-padRN-2, (padRN+2)*2, (padRN+2)*2);
      ctx.setLineDash([]);
      ctx.restore();
    } else if(operationMode==='remove' && this.hasSignal){
      ctx.save();
      ctx.strokeStyle='rgba(255,80,80,0.8)';
      ctx.lineWidth=2;
      ctx.setLineDash([4,3]);
      ctx.strokeRect(this.x-padRN-2, this.y-padRN-2, (padRN+2)*2, (padRN+2)*2);
      ctx.setLineDash([]);
      ctx.restore();
    } else if(operationMode==='roundabout'){
      ctx.save();
      ctx.strokeStyle = this.isRoundabout ? 'rgba(255,80,80,0.8)' : 'rgba(60,200,120,0.8)';
      ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(this.x,this.y,padRN+2,0,Math.PI*2); ctx.stroke();
      ctx.restore();
    }

    // 信号なし交差点: 警戒マーク（交差点の少し上）
    if(!this.hasSignal){
      ctx.save();
      ctx.font='bold 11px sans-serif';
      ctx.textAlign='center';
      ctx.textBaseline='middle';
      ctx.fillStyle='rgba(255,220,0,0.9)';
      ctx.fillText('⚠', this.x, this.y - padRN - 6);
      ctx.restore();
      return;
    }

    // ===== 信号を四隅に配置 =====
    // 交差点の角（四隅）に信号を描画する
    // 四隅の座標: 接続エッジの最大道路幅 = padRN
    //   左上: (-padRN, -padRN), 右上: (+padRN, -padRN)
    //   左下: (-padRN, +padRN), 右下: (+padRN, +padRN)
    //
    // 各隅に「その隅を通過する道路方向」の信号を配置する
    // 接続エッジを上下・左右に分類して割り当てる

    // phase=2: 全赤, phase=0: 縦青, phase=1: 横青, phase=3: 縦+左折青
    const vG = (this.phase===0 || this.phase===3);
    const hG = (this.phase===1);
    const isLeftTurnPhase = this.phase===3;
    const sigReady = sigGreenImg.complete && sigGreenImg.naturalWidth > 0
                  && sigRedImg.complete  && sigRedImg.naturalWidth  > 0;

    function drawSig(sx, sy, angle, isGreen, isLT){
      const W=20, H=7;
      ctx.save();
      ctx.translate(sx, sy);
      ctx.rotate(angle);
      if(sigReady){
        ctx.drawImage(isGreen ? sigGreenImg : sigRedImg, -W/2, -H/2, W, H);
      } else {
        ctx.fillStyle = isGreen ? '#00cc44' : '#dd2222';
        ctx.fillRect(-W/2, -H/2, W, H);
      }
      if(isLT && isGreen){
        ctx.fillStyle='rgba(255,160,0,0.95)';
        ctx.font=`bold ${H+2}px sans-serif`;
        ctx.textAlign='center'; ctx.textBaseline='middle';
        ctx.fillText('↰', 0, 0);
      }
      ctx.restore();
    }

    // 入口エッジを方向に分類して信号を描く
    const inEdgesN = edges.filter(e => e.to===this
      && e.type!=='roundabout'
      && e.from.type!=='parking'
      && !e.from.isRaEntry && !e.from.isRaExit);

    // 斜め道路があるか判定
    const hasDiag = inEdgesN.some(e => {
      const dx=Math.abs(e.from.x-this.x), dy=Math.abs(e.from.y-this.y);
      return dx>2 && dy>2;
    });

    const seen = new Set();
    for(const e of inEdgesN){
      const dx = e.from.x - this.x;
      const dy = e.from.y - this.y;
      const dist = Math.hypot(dx,dy);
      if(dist < 1) continue;

      const roadW = e.lanes * LANE_W;
      const d = padRN + 4;

      let sx, sy, angle, isGreen;

      if(hasDiag){
        // 斜め対応: エッジの実際の角度で信号を配置
        // ux,uy = 交差点→from 方向の単位ベクトル
        const ux = dx/dist, uy = dy/dist;
        // 左法線（進行方向の左 = 左側通行での信号側）
        const nx = -uy, ny = ux;
        // 信号位置: 交差点外縁(d)先 + 左法線方向(roadW+4)
        sx = this.x + ux*d + nx*(roadW+4);
        sy = this.y + uy*d + ny*(roadW+4);
        // 信号の向き: 車が来る方向（from→交差点 = -ux,-uy）に面する
        angle = Math.atan2(-uy, -ux) + Math.PI/2;
        // 青赤判定: 縦寄り(|dy|>|dx|)→vG、横寄り→hG
        const isVert = Math.abs(dy) > Math.abs(dx);
        isGreen = isVert ? vG : hG;
      } else {
        // 通常（水平・垂直）: 従来の固定位置
        const isVert = Math.abs(dy) > Math.abs(dx);
        const key = isVert ? (dy>0 ? 'N' : 'S') : (dx>0 ? 'W' : 'E');
        if(seen.has(key)) continue;
        seen.add(key);
        isGreen = isVert ? vG : hG;
        if(key==='S'){
          sx = this.x + roadW + 4; sy = this.y - d; angle = Math.PI;
        } else if(key==='N'){
          sx = this.x - roadW - 4; sy = this.y + d; angle = 0;
        } else if(key==='E'){
          sx = this.x - d; sy = this.y - roadW - 4; angle = Math.PI/2;
        } else {
          sx = this.x + d; sy = this.y + roadW + 4; angle = -Math.PI/2;
        }
      }

      drawSig(sx, sy, angle, isGreen, isLeftTurnPhase && Math.abs(dy) > Math.abs(dx));
    }
  }
}

// ===== Edge =====
// ★ 全エッジは from→to の一方通行。
// main: 同方向2車線(片側2レーン)
// branch: 同方向1車線
// 反対方向の交通は別エッジとして独立定義する。
class Edge {
  constructor(from,to,type="branch"){
    this.from=from; this.to=to; this.type=type;
    // main: 2車線  oneway: 1車線(逆向きエッジなし)  branch: 1車線
    // asym: 広側2車線 / 狭側1車線（asymWide=trueなら2車線、falseなら1車線）
    this.lanes = (type==="main" || (type==="asym" && this.asymWide)) ? 2 : 1;
    if(type==="asym") this.lanes = 2; // 往路側（広）は2車線で初期化、復路側は後でセット
    this.length = Math.hypot(to.x-from.x, to.y-from.y);
    this.laneCars = Array.from({length:this.lanes}, ()=>[]);
    // signOverride: null=自動判定, Set={'straight','right','left'}=プレイヤー指定
    this.signOverride = null;
    this.signLaneOverride = new Map();
    this.blocked = false;
    // 非対称道路用フラグ
    this.asymWide = false;   // true=2車線側(上り)、false=1車線側(下り)
    this.closedLane = -1;    // 将来の1車線封鎖用: 0=車線1封鎖、1=車線2封鎖、-1=封鎖なし
    this.underConstruction = false; // 植栽帯→工事帯に切替
    // L字曲がり: bendPoint があれば from→bend→to の折れ線
    this.bendPoint = null; // {x,y} or null
    this.seg1Len = 0; // from→bend の距離
    this.seg2Len = 0; // bend→to の距離
    if(this.bendPoint) this._calcBend();
    // ラウンドアバウト弧長（設定後に computeRaLength() で計算）
    this.raArcLength = 0;
  }
  _calcBend(){
    const bp = this.bendPoint;
    this.seg1Len = Math.hypot(bp.x-this.from.x, bp.y-this.from.y);
    this.seg2Len = Math.hypot(this.to.x-bp.x, this.to.y-bp.y);
    this.length  = this.seg1Len + this.seg2Len;
  }
  setBend(bp){
    this.bendPoint = bp;
    this._calcBend();
  }
  // ラウンドアバウトエッジのベジェ弧長を近似計算（20分割）
  computeRaLength(){
    if(this.type !== 'roundabout' || !this.raNode) return;
    const rfrom=this.from, rto=this.to, raCenter=this.raNode;
    const inDx=rfrom.x-raCenter.x, inDy=rfrom.y-raCenter.y;
    const entryAngle=Math.atan2(inDy,inDx);
    const outDx=rto.x-raCenter.x, outDy=rto.y-raCenter.y;
    const exitAngle=Math.atan2(outDy,outDx);
    const r=raCenter.rbRingRadius||39, ctrl=r*0.8;
    const inTanX=-Math.sin(entryAngle), inTanY=Math.cos(entryAngle);
    const outTanX=Math.sin(exitAngle),  outTanY=-Math.cos(exitAngle);
    const p0x=rfrom.x,p0y=rfrom.y;
    const p1x=p0x+inTanX*ctrl, p1y=p0y+inTanY*ctrl;
    const p3x=rto.x, p3y=rto.y;
    const p2x=p3x+outTanX*ctrl, p2y=p3y+outTanY*ctrl;
    let len=0, px=p0x, py=p0y;
    const N=20;
    for(let i=1;i<=N;i++){
      const t=i/N, mt=1-t;
      const qx=mt*mt*mt*p0x+3*mt*mt*t*p1x+3*mt*t*t*p2x+t*t*t*p3x;
      const qy=mt*mt*mt*p0y+3*mt*mt*t*p1y+3*mt*t*t*p2y+t*t*t*p3y;
      len+=Math.hypot(qx-px,qy-py); px=qx; py=qy;
    }
    this.raArcLength = len > 1 ? len : this.length;
    this.length = this.raArcLength; // posの進み方を弧長ベースに統一
  }
}

// ===== Car =====
// ★ 左側通行の原則:
//   nx = (-vy/len, vx/len) はCanvas(Y下向き)上で進行方向の右側が正。
//   左側 = nx負方向 → offset = -(LANE_W/2 + lane * LANE_W)
//   lane0: 中央寄り(offset = -LANE_W/2)
//   lane1: 外側    (offset = -LANE_W/2 - LANE_W)
let carCounter=0;
class Car {
  constructor(route, img){
    this.id=carCounter++;
    this.route=route;   // [{edge, lane}, ...]
    this.routeIdx=0;
    this.edge=route[0].edge;
    this.lane=route[0].lane;
    this.pos=0.02;
    this.speed=0;
    this.maxSpeed=1+Math.random()*1.2;
    this.wait=0;
    this.img=img;
    this.alive=true;
    this.inJunction=false;   // 交差点内部にいるフラグ
    this.junctionNode=null;  // どの交差点にいるか
    this.edge.laneCars[this.lane].push(this);
  }

  // ===== 安全な消滅メソッド =====
  // alive=false にすると同時に laneCars[] から確実に削除する。
  // 直接 this.alive=false を書くとlaneCarsに残留するゴースト車が発生するため
  // 必ずこのメソッドを経由すること。
  die(){
    if(!this.alive) return; // 二重呼び出し防止
    // 現在登録されているエッジのlaneCarsから削除
    if(this.edge && this.edge.laneCars){
      const arr = this.edge.laneCars[this.lane];
      if(arr){
        const idx = arr.indexOf(this);
        if(idx !== -1) arr.splice(idx, 1);
      }
    }
    this.alive = false;
  }

  update(){
    if(!this.alive) return;
    const laneArr=this.edge.laneCars[this.lane];
    // 停止理由をリセット（毎フレーム再判定）
    this.stopReason = null;

    // ===== 車線変更ロジック =====
    // 禁止条件:
    //   ① 交差点手前 80px（進入直前）
    //   ② 交差点通過直後 80px（出口序盤）← 追加
    //   これで交差点前後の不自然な車線変更を防ぐ
    const edgeLen4lc = this.edge.length;
    const distToEnd  = (1 - this.pos) * edgeLen4lc;
    const distFromStart = this.pos * edgeLen4lc;

    const nearIntersection =
      // ① 入口手前: to が内部交差点 AND 残り80px以内
      (this.edge.to.type === "cross" && !this.edge.to.external && distToEnd < 80)
      ||
      // ② 出口直後: from が内部交差点 AND 交差点から80px以内
      (this.edge.from && this.edge.from.type === "cross"
        && !this.edge.from.external && distFromStart < 80)
      ||
      // ③ 踏切・立体交差ノードに接続するエッジは全域で車線変更禁止
      (this.edge.to.isCrossing || (this.edge.from && this.edge.from.isCrossing));

    if(this.edge.lanes >= 2 &&
       this.pos > 0.15 && this.pos < 0.80 &&
       !nearIntersection &&
       (!this.laneChangeCooldown || --this.laneChangeCooldown <= 0)){
      const ahead = laneArr.filter(c=>c!==this && c.alive && c.pos>this.pos).sort((a,b)=>a.pos-b.pos)[0];
      const frontGap = ahead ? (ahead.pos-this.pos)*edgeLen4lc : Infinity;
      // 前方が詰まっている場合のみ隣車線を検討（条件を厳しく）
      if(frontGap < SLOW_GAP * 1.2){
        const altLane = 1 - this.lane;
        const altArr  = this.edge.laneCars[altLane];
        const altAhead = altArr.filter(c=>c.alive && c.pos>this.pos).sort((a,b)=>a.pos-b.pos)[0];
        const altBehind= altArr.filter(c=>c.alive && c.pos<this.pos).sort((a,b)=>b.pos-a.pos)[0];
        const altFrontGap  = altAhead  ? (altAhead.pos -this.pos)*edgeLen4lc : Infinity;
        const altBehindGap = altBehind ? (this.pos-altBehind.pos)*edgeLen4lc : Infinity;
        // 隣車線が「明らかに」空いている場合のみ変更（条件を厳しく）
        if(altFrontGap > frontGap * 2.0 && altBehindGap > MIN_GAP * 2.0){
          laneArr.splice(laneArr.indexOf(this), 1);
          this.lane = altLane;
          this.edge.laneCars[this.lane].push(this);
          if(this.route[this.routeIdx]) this.route[this.routeIdx].lane = this.lane;
          this.laneChangeCooldown = 120; // クールダウンを 90→120f(2秒)に延長
        }
      }
    }

    // 前方車との車間で速度決定
    // ★ 車線変更後は this.lane が変わっているので laneArr を再取得
    // ★ alive=false の車（ゴースト）は必ず除外する
    const currentLaneArr = this.edge.laneCars[this.lane];
    let ahead=currentLaneArr.filter(c=>c!==this && c.alive && c.pos>this.pos).sort((a,b)=>a.pos-b.pos)[0];

    // アクセスノード越しの前方車検出
    // edge.to が isParkingAccess の場合、次エッジの車も距離換算して ahead に含める
    if(this.edge.to && this.edge.to.isParkingAccess){
      const distToAccess = (1 - this.pos) * this.edge.length;
      const nextStep = this.route[this.routeIdx + 1];
      if(nextStep){
        const nextEdge = nextStep.edge;
        const nextLane = Math.min(nextStep.lane, nextEdge.lanes - 1);
        const nextArr = nextEdge.laneCars[nextLane] || [];
        const nextFirst = nextArr.filter(c=>c.alive).sort((a,b)=>a.pos-b.pos)[0];
        if(nextFirst){
          // 次エッジの車を「仮想pos」に換算して現在エッジの ahead と比較
          const virtualGap = distToAccess + nextFirst.pos * nextEdge.length;
          const currentGap = ahead ? (ahead.pos - this.pos) * this.edge.length : Infinity;
          if(virtualGap < currentGap){
            // 仮想的な ahead として扱う（速度計算用に gap だけ使う）
            ahead = { _virtualGap: virtualGap, pos: this.pos + virtualGap / this.edge.length, _virtual: true };
          }
        }
      }
    }

    // 立体交差ノード越しの前方車検出（isCrossing=true && isOverpass=true）
    // 踏切ノードは交差点パッドがなく異エッジ間の車間が検出されないため手動で先読み
    if(this.edge.to && this.edge.to.isCrossing && this.edge.to.isOverpass){
      const distToNode = (1 - this.pos) * this.edge.length;
      if(distToNode < SLOW_GAP * 2){
        const nextStep = this.route[this.routeIdx + 1];
        if(nextStep){
          const nextEdge = nextStep.edge;
          const nextLane = Math.min(nextStep.lane, nextEdge.lanes - 1);
          const nextArr = nextEdge.laneCars[nextLane] || [];
          const nextFirst = nextArr.filter(c=>c.alive).sort((a,b)=>a.pos-b.pos)[0];
          if(nextFirst){
            const virtualGap = distToNode + nextFirst.pos * nextEdge.length;
            const currentGap = ahead ? (ahead.pos - this.pos) * this.edge.length : Infinity;
            if(virtualGap < currentGap){
              ahead = { _virtualGap: virtualGap, pos: this.pos + virtualGap / this.edge.length, _virtual: true };
            }
          }
        }
      }
    }

    // 道路種別の制限速度を上限として適用
    const roadLimit = SPEED_LIMIT[this.edge.type] || this.maxSpeed;
    let target = Math.min(this.maxSpeed, roadLimit);
    if(ahead){
      const gap = ahead._virtualGap !== undefined
        ? ahead._virtualGap
        : (ahead.pos - this.pos) * this.edge.length;
      if(gap<MIN_GAP){ target=0; this.wait++; this.stopReason='前方車に追従停止'; }
      else if(gap<SLOW_GAP){
        target=this.maxSpeed*(gap/SLOW_GAP);
        if(!this.stopReason) this.stopReason='前方車に減速中';
      }
    }

    // ===== bend ノード越しの先読み車間チェック =====
    if(!ahead || (ahead._virtualGap || (ahead.pos-this.pos)*this.edge.length) > SLOW_GAP){
      const nextNode = this.edge.to;
      if(nextNode.type === 'bend' || nextNode.isParkingAccess){
        const distToNext = (1 - this.pos) * this.edge.length;
        // アクセスノードは短いエッジが多いので先読み距離を広げる
        const lookDist = nextNode.isParkingAccess ? SLOW_GAP * 2.5 : SLOW_GAP * 1.5;
        const nextStep = this.route[this.routeIdx + 1];
        if(nextStep && distToNext < lookDist){
          const nextEdge = nextStep.edge;
          const nextLane = nextStep.lane < nextEdge.lanes ? nextStep.lane : 0;
          const nextArr = nextEdge.laneCars[nextLane] || [];
          const nextFirst = nextArr.filter(c=>c.alive).sort((a,b)=>a.pos-b.pos)[0];
          if(nextFirst){
            const gapToNext = distToNext + nextFirst.pos * nextEdge.length;
            if(gapToNext < MIN_GAP){
              target = 0; this.wait++; this.stopReason = 'コーナー先の車に追従停止';
            } else if(gapToNext < SLOW_GAP){
              target = Math.min(target, this.maxSpeed * (gapToNext / SLOW_GAP));
              if(!this.stopReason) this.stopReason = 'コーナー先の車に減速';
            }
          }
        }
      }
    }

    // 信号判定: 次のノード(to)が内部交差点なら信号を確認
    // "bend" タイプ（L字の曲がり点）・駐車場アクセスノードは交差点扱いしない
    const toNode=this.edge.to;

    // ===== bend コーナー徐行 =====
    // 次が bend ノードの場合、手前から速度を落とす（コーナー減速）
    if(toNode.type === 'bend'){
      const distToBend = (1 - this.pos) * this.edge.length;
      const BEND_SLOW_DIST = 40; // 40px 手前から減速
      const BEND_MAX_SPEED = SPEED_LIMIT.branch * 0.7; // コーナー通過速度上限
      if(distToBend < BEND_SLOW_DIST){
        target = Math.min(target, BEND_MAX_SPEED);
        if(!this.stopReason) this.stopReason = 'コーナー減速';
      }
    }

    // ===== 交差点残留車の全赤中クリア =====
    // 交差点内にいる車（inJunction=true）が全赤フェーズ中に出口方向へ抜ける
    // 出口エッジが詰まっていなければ通常速度で進行（信号無視ではなく正当な動作）
    if(this.inJunction && this.junctionNode && this.junctionNode.hasSignal
       && this.junctionNode.phase === 2){
      const outPos = this.pos;
      // 出口エッジ（現在のエッジ）の前方に詰まりがなければ速度を維持
      const outLaneArr = this.edge.laneCars[this.lane];
      const aheadOut = outLaneArr.filter(c=>c!==this&&c.alive&&c.pos>outPos)
                                  .sort((a,b)=>a.pos-b.pos)[0];
      const gapOut = aheadOut ? (aheadOut.pos-outPos)*this.edge.length : Infinity;
      if(gapOut > MIN_GAP){
        // 前が空いている → 全赤でも通常速度で抜ける
        target = Math.min(target, this.maxSpeed);
        if(!this.stopReason) this.stopReason = null; // 停止理由をクリア
      }
      // 交差点を十分抜けたらフラグ解除
      if(outPos > 0.5){
        this.inJunction  = false;
        this.junctionNode = null;
      }
    }

    if(toNode.type==="cross" && !toNode.external && !toNode.isParkingAccess){
      if(toNode.hasSignal){
        // 通常の信号判定
        // 交差点中心からの残り距離で判定（比率ではなく物理距離）
        const distToCenter = (1 - this.pos) * this.edge.length;
        // 停止線は交差点パッドの外縁(padRN)手前に描かれている
        // 停止すべき位置 = padRN + 停止線余裕(4px) 手前
        // 減速開始 = 停止位置 + SLOW_GAP
        const connEdgesStop = edges.filter(e2 => e2.from===toNode || e2.to===toNode);
        const padStop = connEdgesStop.length > 0
          ? Math.max(...connEdgesStop.map(e2 => e2.lanes * LANE_W))
          : LANE_W;
        const STOP_BEFORE = padStop + 4;   // 横断歩道手前で止まる距離
        const SLOW_START  = STOP_BEFORE + SLOW_GAP; // 減速開始距離

        if(distToCenter < SLOW_START){
          const dx=this.edge.to.x-this.edge.from.x;
          const dy=this.edge.to.y-this.edge.from.y;
          const isVert=Math.abs(dy)>Math.abs(dx);
          let canGo = false;
          if(toNode.phase===2){
            canGo = false;
          } else if(toNode.phase===3){
            if(isVert){
              const nextStep = this.route[this.routeIdx+1];
              if(nextStep){
                const dir = getDirectionType(this.edge, nextStep.edge);
                canGo = (dir==='left');
              }
            }
          } else {
            canGo = (isVert ? toNode.phase===0 : toNode.phase===1);
          }
          if(!canGo){
            if(distToCenter < STOP_BEFORE){
              // 停止線手前で完全停止
              target = 0; this.wait++;
              this.stopReason = toNode.phase===2 ? '全赤バッファ待ち'
                : toNode.phase===3 ? '左折専用フェーズ待ち' : '赤信号待ち';
            } else {
              // 停止線に向けて段階的に減速
              const t = (distToCenter - STOP_BEFORE) / SLOW_GAP;
              target = Math.min(target, this.maxSpeed * Math.max(0.05, t));
              this.stopReason = toNode.phase===2 ? '全赤バッファ待ち'
                : toNode.phase===3 ? '左折専用フェーズ待ち' : '赤信号待ち';
            }
          } else {
            // 青信号でも出口が詰まっていれば停止線で待つ（Box Junction）
            // デッドロック防止: wait>300 の場合は強制進入
            if(distToCenter < STOP_BEFORE && this.wait < 300){
              const nextSig = this.route[this.routeIdx + 1];
              if(nextSig){
                const outEdgeSig = nextSig.edge;
                const outLaneSig = nextSig.lane;
                if(outEdgeSig && outEdgeSig.laneCars){
                  const clearR = Math.min(0.35, (padStop*2+4)/(outEdgeSig.length||200));
                  const laneArrSig = outEdgeSig.laneCars[outLaneSig]||outEdgeSig.laneCars[0]||[];
                  const blk = laneArrSig.find(c=>c!==this&&c.alive&&c.pos<clearR&&c.wait>5);
                  if(blk){
                    target=0; this.wait++;
                    this.stopReason='青信号・出口詰まりで停止線待機';
                  }
                }
              }
            }
          }
        }
      } else if(toNode.isRaEntry && toNode.raNode){
        // 入口点(raEntry)に近づいている: 環状路内優先ルールを適用
        const raCenter = toNode.raNode;
        const distToEntry = (1 - this.pos) * this.edge.length;
        const rbDist = raCenter.rbHalfSize || 45;
        if(distToEntry < rbDist * 0.8){
          target = Math.min(target, this.maxSpeed * 0.35);
          if(!this.stopReason) this.stopReason = 'ラウンドアバウト流入徐行';
          // 環状路エッジ上(type=roundabout)に同じRAの車がいれば停止
          const ringCars = cars.filter(c =>
            c !== this && c.alive &&
            c.edge.type === 'roundabout' &&
            c.edge.raNode === raCenter
          );
          if(ringCars.length > 0){
            target = 0; this.wait++;
            this.stopReason = 'ラウンドアバウト内車両に譲り';
          }
        }
      } else {
        // 信号なし交差点: 「真の交差点」のみ徐行・yield を適用
        // 駐車場アクセスノード・RA外縁点は完全スキップ
        if(toNode.isParkingAccess || toNode.isRaEntry || toNode.isRaExit) {
          // 何もしない（徐行・yield 不要）
        } else {
        // ★ 物理距離ベースで判定（比率ではなく残り距離px）
        const distToNode = (1 - this.pos) * this.edge.length;
        const YIELD_DIST = 80; // 交差点まで80px以内で徐行開始
        const STOP_DIST  = 80; // 交差点まで80px以内でyield判定

        if(toNode.isRealCross && !toNode.isOverpass && distToNode < YIELD_DIST){
          // 出口方向が1つのみ（実質カーブ・直進点）はyield判定不要
          const outEdges = edges.filter(e => e.from===toNode && e.to !== this.edge.from);
          if(outEdges.length <= 1){
            target = Math.min(target, this.maxSpeed * 0.6);
            if(!this.stopReason) this.stopReason = 'カーブ通過中';
          } else {
          target = Math.min(target, this.maxSpeed * 0.22);
          if(!this.stopReason) this.stopReason = '信号なし交差点を徐行中';

          // ★ 角度ベースで「実際に交差する」方向の車のみを検出
          // 対向車線(180度対向)や同方向は除外し、横断・斜め方向のみ
          // 駐車場エッジ・アクセスエッジからくる車も除外
          const myDx = toNode.x - this.edge.from.x;
          const myDy = toNode.y - this.edge.from.y;
          const myLen = Math.hypot(myDx, myDy);
          const myUx = myDx / myLen, myUy = myDy / myLen;

          const crossingCars = cars.filter(c => {
            if(c === this || !c.alive) return false;
            if(c.edge.to !== toNode) return false;
            if(c.edge === this.edge) return false;
            // 駐車場エッジ・アクセスエッジからくる車は除外
            if(c.edge.from.type === 'parking' || c.edge.to.type === 'parking') return false;
            if(c.edge.from.isParkingAccess || c.edge.to.isParkingAccess) return false;
            const cDist = (1 - c.pos) * c.edge.length;
            if(cDist > STOP_DIST * 2) return false; // 遠すぎる車は無視

            // ★ 角度チェック: 入ってくる方向ベクトルの内積で判定
            const cDx = toNode.x - c.edge.from.x;
            const cDy = toNode.y - c.edge.from.y;
            const cLen = Math.hypot(cDx, cDy);
            if(cLen < 1) return false;
            const dot = (myUx * cDx + myUy * cDy) / cLen;
            return dot > -0.85 && dot < 0.85;
          });

          if(crossingCars.length > 0){
            const mustYield = crossingCars.some(c => {
              const myDist = distToNode;
              const cDist  = (1 - c.pos) * c.edge.length;
              if(cDist < myDist - 15) return true;
              if(Math.abs(myDist - cDist) <= 15 && c.id < this.id) return true;
              return false;
            });
            if(mustYield){
              target = 0; this.wait++;
              this.stopReason = '交差点で一時停止（譲り）';
            }
          }
          } // end outEdges > 1
        }
        } // end isParkingAccess else
      }
    }

    // ===== Box Junction 制御（交差点内せき止め防止）=====
    if(toNode.type === "cross" && !toNode.external && !toNode.isRaEntry
       && !toNode.isParkingAccess && !toNode.isCrossing){
      const nextRouteStep = this.route[this.routeIdx + 1];
      const distToBox = (1 - this.pos) * this.edge.length;

      // 交差点に接続するエッジの最大車線幅からパッド半径を計算
      const connEdgesBox = edges.filter(e2 => e2.from===toNode || e2.to===toNode);
      const padR = connEdgesBox.length > 0
        ? Math.max(...connEdgesBox.map(e2 => e2.lanes * LANE_W))
        : LANE_W;

      // ① 出口エッジの詰まりチェック
      // 「出口エッジの交差点を抜けるまでの区間」に停止中の車がいれば待機
      // デッドロック防止: 長時間待ち続けた車(wait>300)は強制進入を許可
      if(nextRouteStep && distToBox < padR + 8 && this.wait < 300){
        const outEdge = nextRouteStep.edge;
        const outLane = nextRouteStep.lane;
        if(outEdge && outEdge.laneCars){
          const BOX_CLEAR_PX = padR * 2 + 4;
          const clearRatio = Math.min(0.35, BOX_CLEAR_PX / (outEdge.length || 200));
          const laneArr2 = outEdge.laneCars[outLane] || outEdge.laneCars[0] || [];
          // 停止している車のみブロッカーとみなす（動いている車はOK）
          const blockingCar = laneArr2.find(c =>
            c !== this && c.alive && c.pos < clearRatio && c.wait > 5
          );
          if(blockingCar){
            target = 0;
            this.wait++;
            this.stopReason = '出口詰まり（Box Junction 待機）';
          }
        }
      }
    }

    // ===== 環状路エッジの速度制限 =====
    // SPEED_LIMIT['roundabout'] = 0.9 px/f で制限（上で適用済み）
    if(this.edge.type === 'roundabout'){
      if(!this.stopReason) this.stopReason = 'ラウンドアバウト走行中';
    }

    // 事故ゾーンチェック: 近くに事故があれば強制減速
    const _dp=this.getDrawPos();
    const carX=_dp.x, carY=_dp.y;
    for(const acc of accidents){
      if(Math.hypot(carX-acc.x, carY-acc.y) < ACCIDENT_SLOWZONE){
        target=Math.min(target, 0.2); // 徐行
        this.wait++;
        this.stopReason='事故現場付近で徐行';
        break;
      }
    }

    // ===== 踏切チェック =====
    const fromNodeIsCrossing = this.edge.from && this.edge.from.isCrossing && !this.edge.from.isOverpass;

    // 【踏切内走行中】: 全停止条件をスキップして強制通過
    if(fromNodeIsCrossing){
      // 踏切内では前方車・信号・その他の停止を無視して必ず抜ける
      target = Math.max(target, this.maxSpeed * 0.6); // 最低速度を保証
      this.stopReason = null;
      this.wait = 0;
      // 速度計算はここで完了 → 以降の停止チェックをスキップ
      const accel2 = target > this.speed ? 0.35 : 0.25;
      this.speed += (target - this.speed) * accel2;
      this.pos += this.speed / this.edge.length;
      this.pos = Math.min(this.pos, 1);
      if(this.speed > 0.3 && this.wait > 0) this.wait = 0;
      // pos>=1 の処理は通常フローに戻す必要があるためここでは return しない
      // → 以降の停止チェックを全部飛ばして速度更新済みフラグを立てる
      this._speedUpdated = true;
    } else {
      this._speedUpdated = false;
    }

    if(!this._speedUpdated){
      // 【踏切手前】: 出口混雑の先読み + 遮断チェック
      if(toNode.isCrossing && !toNode.isOverpass){
        const distToCrossing = (1 - this.pos) * this.edge.length;
        const CROSS_STOP_DIST = 30;
        const CROSS_SLOW_DIST = 80;

        // 出口エッジの混雑先読み（踏切を抜けた先が詰まっていないか）
        let exitJammed = false;
        const nextStep = this.route[this.routeIdx + 1];
        if(nextStep){
          const exitEdge = nextStep.edge;
          const exitLane = Math.min(nextStep.lane, exitEdge.lanes - 1);
          const exitCars = exitEdge.laneCars[exitLane] || [];
          const exitFirst = exitCars.filter(c => c.alive).sort((a,b) => a.pos - b.pos)[0];
          if(exitFirst && exitFirst.speed < 0.1 && exitFirst.pos * exitEdge.length < MIN_GAP * 2){
            exitJammed = true; // 出口が詰まっている（停車中の車）
          }
        }

        if(distToCrossing < CROSS_SLOW_DIST){
          // 遮断中 または 出口渋滞 → 手前で停止
          if(!toNode.crossingOpen || exitJammed){
            if(distToCrossing < CROSS_STOP_DIST){
              target = 0; this.wait++;
              this.stopReason = !toNode.crossingOpen ? '踏切待ち（遮断中）' : '踏切先渋滞・手前待機';
            } else {
              target = Math.min(target, this.maxSpeed * (distToCrossing / CROSS_SLOW_DIST));
              this.stopReason = !toNode.crossingOpen ? '踏切に減速' : '踏切先渋滞・減速';
            }
          }
        }
      }
    }

    if(!this._speedUpdated){
      if(this.edge.blocked){ target=0; this.wait++; this.stopReason='道路封鎖により停止'; }
    }

    // ===== 駐車場満車待機 =====
    // 目的の駐車場接続エッジ上にいて、かつ満車の場合に待機
    if(!this.waitingForParking){
      const destNode = this.route.length > 0 ? this.route[this.route.length-1].edge.to : null;
      if(destNode && destNode.type === 'parking' && this.edge.to === destNode){
        // このエッジは駐車場接続エッジ
        if(this.pos > 0.65){
          const freeSlot = destNode.slotUsed ? destNode.slotUsed.findIndex(u => !u) : -1;
          if(freeSlot < 0){
            // 住宅は待機せず即転進（渋滞を起こさない）
            if(destNode.houseType === 'sparse'){
              const currentNode = this.edge.from;
              const exits = nodes.filter(n => n.external && n.type !== 'parking');
              let newRoute = null;
              for(const ex of exits.sort(() => Math.random()-0.5)){
                newRoute = generateRouteBFS(currentNode, [ex]);
                if(newRoute && newRoute.length > 0) break;
              }
              if(newRoute && newRoute.length > 0){
                const curArr = this.edge.laneCars[this.lane];
                const ci = curArr.indexOf(this);
                if(ci !== -1) curArr.splice(ci, 1);
                this.route    = newRoute;
                this.routeIdx = 0;
                this.edge     = newRoute[0].edge;
                this.lane     = newRoute[0].lane;
                this.pos      = 0.02;
                this.edge.laneCars[this.lane].push(this);
                this.destLabel = '🏠 満車のため通過';
              } else {
                this.die(); return;
              }
            } else {
              // 通常の駐車場 → 待機開始
              this.waitingForParking = true;
              this.parkingWaitTimer  = 0;
              this.targetParking     = destNode;
              target = 0; this.wait++;
              this.stopReason = '🅿 駐車場満車 - 空き待ち';
            }
          }
        }
      }
    }

    // 待機中の処理
    if(this.waitingForParking && this.targetParking){
      this.parkingWaitTimer = (this.parkingWaitTimer || 0) + 1;
      // pos を 0.75 付近に固定（駐車場の手前で止まる）
      if(this.pos > 0.80) this.pos = 0.80;
      target = 0; this.wait++;
      this.stopReason = `🅿 駐車場満車 - 空き待ち (${Math.floor(this.parkingWaitTimer/60)}秒)`;

      const freeSlot = this.targetParking.slotUsed
        ? this.targetParking.slotUsed.findIndex(u => !u) : -1;

      if(freeSlot >= 0){
        // 空きが出た → 待機解除して進む
        this.waitingForParking = false;
        this.parkingWaitTimer  = 0;
        target = this.maxSpeed;
        this.stopReason = null;
      } else if(this.parkingWaitTimer > 600){
        // 10秒待っても空かない → 別の駐車場か出口へ転進
        this.waitingForParking = false;
        this.parkingWaitTimer  = 0;
        this.targetParking     = null;

        // 現在ノード(hand前の交差点)からBFSで別の駐車場を探す
        const currentNode = this.edge.from;
        const altParkings = nodes.filter(n =>
          n.type === 'parking' && n !== this.route[this.route.length-1].edge.to &&
          n.slotUsed && n.slotUsed.some(u => !u)
        );
        let newRoute = null;
        for(const ap of altParkings.sort(() => Math.random()-0.5)){
          newRoute = generateRouteBFS(currentNode, [ap]);
          if(newRoute && newRoute.length > 0) break;
        }
        if(!newRoute){
          // 別の駐車場もない → 外部出口に向かう
          const exits = nodes.filter(n => n.external && n.type !== 'parking');
          for(const ex of exits.sort(() => Math.random()-0.5)){
            newRoute = generateRouteBFS(currentNode, [ex]);
            if(newRoute && newRoute.length > 0) break;
          }
        }
        if(newRoute && newRoute.length > 0){
          // 現在エッジの laneCars から削除
          const curArr2 = this.edge.laneCars[this.lane];
          const ci = curArr2.indexOf(this);
          if(ci !== -1) curArr2.splice(ci, 1);
          // ルートを新ルートに置き換え
          this.route    = newRoute;
          this.routeIdx = 0;
          this.edge     = newRoute[0].edge;
          this.lane     = newRoute[0].lane;
          this.pos      = 0.02;
          this.edge.laneCars[this.lane].push(this);
          this.destLabel = altParkings.some(ap =>
            newRoute[newRoute.length-1].edge.to === ap)
            ? '🅿 別の駐車場' : '🚪 出口（満車のため転進）';
        } else {
          // どこにも行けない → 消える（laneCarsからも削除）
          this.die(); return;
        }
      }
    }

    // ===== 交差点内ターン速度制限 =====
    // crossingAnim中（アニメ終了まで）の右左折速度を制限
    // 直進のmain速度(2.2)を超えないよう右左折は必ずそれ以下にする
    if(this.crossingAnim){
      const turnDir = this.crossingAnim.turnDir;
      if(turnDir === 'left'){
        // 左折: main速度の50%（直進より明確に遅く）
        target = Math.min(target, SPEED_LIMIT.main * 0.50);
      } else if(turnDir === 'right'){
        // 右折: main速度の35%（左折より遅く・大回り）
        target = Math.min(target, SPEED_LIMIT.main * 0.35);
      }
      // 直進は制限なし
    }

    // 加速は速め(0.35)、減速は緩め(0.25) → 青信号後のもたつきを解消
    if(!this._speedUpdated){
      const accel = target > this.speed ? 0.35 : 0.25;
      this.speed += (target - this.speed) * accel;
      this.pos+=this.speed/this.edge.length;
      this.pos=Math.min(this.pos,1);
      if(this.speed > 0.3 && this.wait > 0) this.wait = 0;
    }

    if(this.pos>=1){
      // pos>=1: エッジ終端到達 → laneCarsから削除してルート次へ
      const curArr = this.edge.laneCars[this.lane];
      const idx=curArr.indexOf(this);
      if(idx!==-1) curArr.splice(idx,1);
      this.routeIdx++;
      if(this.routeIdx>=this.route.length){
        if(this.isPolice){
          // パトカーは現場到着後、事故が解消されるまで待機
          if(this.targetAcc && accidents.includes(this.targetAcc)){
            // 事故現場付近に留まる（pos=0.5で停止）
            this.targetAcc.policeArrived = true;
            this.speed = 0;
            this.pos = 0.5;
            return; // alive のまま
          }
          // 事故解消 → パトカー消滅（laneCarsは上で削除済み）
          this.alive = false;
          return;
        }
        // 目的地ノードが駐車場かチェック
        const arrivalNode = this.route[this.route.length-1].edge.to;
        if(arrivalNode && arrivalNode.type === "parking"){
          const freeSlot = arrivalNode.slotUsed
            ? arrivalNode.slotUsed.findIndex(used => !used)
            : -1;
          if(freeSlot >= 0 && arrivalNode.parkedCars.length < arrivalNode.capacity){
            arrivalNode.slotUsed[freeSlot] = true;
            // ガソリンスタンドは給油時間（短め: 5〜15秒相当）
            const stayFrames = arrivalNode.houseType === 'gasStation'
              ? 300 + Math.floor(Math.random() * 600)
              : 600 + Math.floor(Math.random() * 3000);
            // ガソリンスタンドの売上計算
            if(arrivalNode.houseType === 'gasStation'){
              const liters  = 30 + Math.floor(Math.random() * 31); // 30〜60L
              const price   = 165 + Math.floor(Math.random() * 21); // ¥165〜185/L
              const revenue = liters * price;
              arrivalNode.totalRevenue  = (arrivalNode.totalRevenue  || 0) + revenue;
              arrivalNode.totalVisitors = (arrivalNode.totalVisitors || 0) + 1;
              arrivalNode.totalLiters   = (arrivalNode.totalLiters   || 0) + liters;
            }
            // 駅前駐車場の利用者カウント
            if(arrivalNode.isStationParking2){
              arrivalNode.totalVisitors = (arrivalNode.totalVisitors || 0) + 1;
              // 車1台あたりの乗客数（1〜4人、平均2人想定）
              const passengers = Math.random() < 0.5 ? 2
                : Math.random() < 0.6 ? 1
                : Math.random() < 0.5 ? 3 : 4;
              arrivalNode.totalPassengers = (arrivalNode.totalPassengers || 0) + passengers;
            }
            arrivalNode.parkedCars.push({ timer: stayFrames, img: this.img, slot: freeSlot });
            score += Math.round(200 * scoreBonus);
          }
          this.waitingForParking = false;
          this.targetParking = null;
          this.alive = false; // laneCarsは上で削除済み
          return;
        }
        this.alive=false; // laneCarsは上で削除済み
        score += Math.round(200 * scoreBonus);
        return;
      }
      const next=this.route[this.routeIdx];
      const prevEdge2 = this.routeIdx>0 ? this.route[this.routeIdx-1].edge : null;
      const prevLane2 = this.routeIdx>0 ? this.route[this.routeIdx-1].lane : this.lane;
      this.edge=next.edge;
      this.lane=next.lane;
      this.pos=0.02;
      this.edge.laneCars[this.lane].push(this);

      // inJunction フラグ更新
      // 新しいエッジの from が内部交差点 → 交差点内に入った
      if(this.edge.from && this.edge.from.type==='cross'
         && !this.edge.from.external && this.edge.from.isRealCross
         && !this.edge.from.isParkingAccess){
        this.inJunction  = true;
        this.junctionNode = this.edge.from;
      } else {
        this.inJunction  = false;
        this.junctionNode = null;
      }

      // ===== 交差点ベジェ曲線トランジション (Step3) =====
      // 直進はアニメなし（通常走行に任せる）、左右折のみベジェ適用
      if(prevEdge2 && this.edge.from && this.edge.from.type==='cross'
         && !this.edge.from.external && this.edge.from.isRealCross
         && this.edge.type!=='roundabout' && prevEdge2.type!=='roundabout'){
        const node=this.edge.from;

        // 進行方向を判定（直進/左折/右折）
        const turnDir = getDirectionType(prevEdge2, this.edge);

        // 直進: ベジェアニメなし。入口車線を出口でも維持する
        if(turnDir === 'straight'){
          const clampedLane = Math.min(prevLane2, this.edge.lanes - 1);
          if(clampedLane !== this.lane){
            const arr = this.edge.laneCars[this.lane];
            const idx = arr.indexOf(this);
            if(idx !== -1) arr.splice(idx, 1);
            this.lane = clampedLane;
            this.edge.laneCars[this.lane].push(this);
          }
          this.crossingAnim = null;
        } else {

        // 入口方向ベクトル
        const inVx=prevEdge2.to.x-prevEdge2.from.x, inVy=prevEdge2.to.y-prevEdge2.from.y;
        const inLen=Math.hypot(inVx,inVy);
        const inUx=inLen>0?inVx/inLen:1, inUy=inLen>0?inVy/inLen:0;
        const inNx=-inUy, inNy=inUx; // 入口の左方向（左側通行）

        // 出口方向ベクトル
        const outVx=this.edge.to.x-this.edge.from.x, outVy=this.edge.to.y-this.edge.from.y;
        const outLen=Math.hypot(outVx,outVy);
        const outUx=outLen>0?outVx/outLen:1, outUy=outLen>0?outVy/outLen:0;
        const outNx=-outUy, outNy=outUx; // 出口の左方向

        // 交差点パッドの半径を取得（停止線位置）
        const connE=edges.filter(e=>e.from===node||e.to===node);
        const padR=connE.length>0?Math.max(...connE.map(e=>e.lanes*LANE_W)):LANE_W;

        // 入口オフセット（車線位置）
        const inOff=-(LANE_W/2+prevLane2*LANE_W);
        // p0 = 停止線付近（交差点中心から入口方向へ padR）
        const p0x=node.x - inUx*padR + inNx*inOff;
        const p0y=node.y - inUy*padR + inNy*inOff;

        // 出口オフセット（車線位置）
        const outOff=-(LANE_W/2+this.lane*LANE_W);
        // p3 = 交差点中心から出口方向へ padR（出口停止線付近）
        const p3x=node.x + outUx*padR + outNx*outOff;
        const p3y=node.y + outUy*padR + outNy*outOff;

        // 方向別の制御点長さとアニメ時間
        // 左折: 小回り → 制御点短く・時間短め
        // 右折: 大回り → 制御点長く・時間長め
        // 直進: そのまま通過 → 制御点ほぼなし
        let ctrlIn, ctrlOut, dur;
        const baseDist = Math.hypot(p3x-p0x, p3y-p0y);
        if(turnDir==='left'){
          ctrlIn  = padR * 0.5;
          ctrlOut = padR * 0.5;
          dur = 16;
        } else {
          // 右折: 大回り
          ctrlIn  = Math.max(padR * 1.4, baseDist * 0.55);
          ctrlOut = Math.max(padR * 1.4, baseDist * 0.55);
          dur = 22;
        }

        const p1x=p0x+inUx*ctrlIn,  p1y=p0y+inUy*ctrlIn;
        const p2x=p3x-outUx*ctrlOut, p2y=p3y-outUy*ctrlOut;
        this.crossingAnim={p0x,p0y,p1x,p1y,p2x,p2y,p3x,p3y,t:0,dur,turnDir};
        } // end else (left/right)
      } else {
        this.crossingAnim=null;
      }
    }
  }

  // 実際の描画座標を返す（クリック判定用）
  // Car.draw() と同じロジックで計算
  getDrawPos(){
    // 交差点ベジェ通過中
    if(this.crossingAnim){
      const a=this.crossingAnim, tRaw=a.t/a.dur;
      const t=tRaw*tRaw*(3-2*tRaw), mt=1-t;
      return {
        x: mt*mt*mt*a.p0x+3*mt*mt*t*a.p1x+3*mt*t*t*a.p2x+t*t*t*a.p3x,
        y: mt*mt*mt*a.p0y+3*mt*mt*t*a.p1y+3*mt*t*t*a.p2y+t*t*t*a.p3y
      };
    }
    const {from, to} = this.edge;

    // ラウンドアバウト環状路エッジ: ベジェ曲線上の座標
    if(this.edge.type === 'roundabout'){
      const rfrom = from, rto = to;
      const raCenter = this.edge.raNode;
      if(raCenter){
        const inDx = rfrom.x - raCenter.x, inDy = rfrom.y - raCenter.y;
        const entryAngle = Math.atan2(inDy, inDx);
        const outDx = rto.x - raCenter.x, outDy = rto.y - raCenter.y;
        const exitAngle = Math.atan2(outDy, outDx);
        const r = raCenter.rbRingRadius || 39;
        const ctrl = r * 0.8;
        const inTanX = -Math.sin(entryAngle), inTanY = Math.cos(entryAngle);
        const outTanX = Math.sin(exitAngle),  outTanY = -Math.cos(exitAngle);
        const p0x=rfrom.x, p0y=rfrom.y;
        const p1x=p0x+inTanX*ctrl, p1y=p0y+inTanY*ctrl;
        const p3x=rto.x, p3y=rto.y;
        const p2x=p3x+outTanX*ctrl, p2y=p3y+outTanY*ctrl;
        const t=this.pos, mt=1-t;
        return {
          x: mt*mt*mt*p0x+3*mt*mt*t*p1x+3*mt*t*t*p2x+t*t*t*p3x,
          y: mt*mt*mt*p0y+3*mt*mt*t*p1y+3*mt*t*t*p2y+t*t*t*p3y
        };
      }
    }

    // 通常直線: 車線オフセット込みの座標
    const vx = to.x-from.x, vy = to.y-from.y;
    const len = Math.hypot(vx, vy);
    if(len < 1) return {x: from.x, y: from.y};
    const nx = -vy/len, ny = vx/len;
    const offset = this.edge.type === 'oneway' ? 0 : -(LANE_W/2 + this.lane*LANE_W);
    return {
      x: from.x + vx*this.pos + nx*offset,
      y: from.y + vy*this.pos + ny*offset
    };
  }

  draw(){
    if(!this.alive) return;

    // 交差点ベジェ通過アニメーション: t を毎フレーム進める
    if(this.crossingAnim){
      this.crossingAnim.t++;
      if(this.crossingAnim.t >= this.crossingAnim.dur){
        this.crossingAnim=null;
      } else {
        const a=this.crossingAnim;
        // イーズイン・アウト補間 (smoothstep) で自然な加減速
        const tRaw=a.t/a.dur;
        const t=tRaw*tRaw*(3-2*tRaw); // smoothstep
        const mt=1-t;
        const bx=mt*mt*mt*a.p0x+3*mt*mt*t*a.p1x+3*mt*t*t*a.p2x+t*t*t*a.p3x;
        const by=mt*mt*mt*a.p0y+3*mt*mt*t*a.p1y+3*mt*t*t*a.p2y+t*t*t*a.p3y;
        // 接線は生の t で計算（smoothstep の微分は不要、向きだけ取れればよい）
        const tRaw2=Math.min(tRaw+0.01,1), mt2=1-tRaw2;
        const bx2=mt2*mt2*mt2*a.p0x+3*mt2*mt2*tRaw2*a.p1x+3*mt2*tRaw2*tRaw2*a.p2x+tRaw2*tRaw2*tRaw2*a.p3x;
        const by2=mt2*mt2*mt2*a.p0y+3*mt2*mt2*tRaw2*a.p1y+3*mt2*tRaw2*tRaw2*a.p2y+tRaw2*tRaw2*tRaw2*a.p3y;
        const ang=Math.atan2(by2-by, bx2-bx);
        ctx.save(); ctx.translate(bx,by); ctx.rotate(ang);
        if(this.img&&this.img.complete&&this.img.naturalWidth>0){
          ctx.drawImage(this.img,-10,-6,20,12);
        } else {
          ctx.fillStyle=this.isPolice?"#1a3a8f":"yellow";
          ctx.fillRect(-6,-4,12,8);
        }
        if(this.isPolice){
          const siren=Math.floor(timeCounter/8)%2===0;
          ctx.fillStyle=siren?"rgba(255,30,30,0.85)":"rgba(30,80,255,0.85)";
          ctx.beginPath(); ctx.arc(0,-7,3,0,Math.PI*2); ctx.fill();
        }
        if(selectedCar===this){ ctx.strokeStyle='rgba(255,220,0,0.95)'; ctx.lineWidth=2; ctx.strokeRect(-12,-8,24,16); }
        ctx.restore();
        return;
      }
    }

    // =========================================================
    // ラウンドアバウト3フェーズ描画
    // =========================================================
    // smoothstep: 滑らかなブレンド関数
    const smoothstep = t => t * t * (3 - 2 * t);

    // 共通: 車アイコンを (wx,wy) に angle 方向で描画
    const drawCar = (wx, wy, ang) => {
      ctx.save();
      ctx.translate(wx, wy);
      ctx.rotate(ang);
      if(this.img && this.img.complete && this.img.naturalWidth > 0){
        if(this.isBike){
          ctx.drawImage(this.img, -7, -4, 14, 8);
        } else {
          ctx.drawImage(this.img, -10, -6, 20, 12);
        }
      } else {
        ctx.fillStyle = this.isPolice ? "#1a3a8f" : "yellow";
        ctx.fillRect(-6, -4, 12, 8);
      }
      if(this.isPolice){
        const siren = Math.floor(timeCounter/8)%2===0;
        ctx.fillStyle = siren ? "rgba(255,30,30,0.85)" : "rgba(30,80,255,0.85)";
        ctx.beginPath(); ctx.arc(0,-7,3,0,Math.PI*2); ctx.fill();
      }
      if(selectedCar === this){
        ctx.strokeStyle='rgba(255,220,0,0.95)'; ctx.lineWidth=2;
        ctx.strokeRect(-12,-8,24,16);
      }
      ctx.restore();
    };

    // =========================================================
    // ラウンドアバウト円弧の共通計算
    // =========================================================
    // 正しい角度定義:
    //   entryArcAngle = entryAngle - π/2  ← RA中心から見た入口点の角度
    //   exitArcAngle  = exitAngle  - π/2  ← RA中心から見た出口点の角度
    //
    // sweepAngle: Canvas Y-down 座標系で「時計回り」= 正の方向
    //   sweep = (exitArc - entryArc) を 0〜2π に正規化（時計回り=正）
    //
    // ただし直進(180°旋回)の場合 sweep→2π(=360°=一周) になるため
    //   sweep > 315°(= 7π/4) の場合は sweep = π (半周)に補正
    // =========================================================
    // RA円弧の共通計算
    // 左側通行ラウンドアバウト = 反時計回り走行 (Canvas Y↓では arcAngle 減少)
    //   entryArc = entryAngle - π/2  ← RA中心から見た入口点の角度
    //   exitArc  = exitAngle  - π/2  ← RA中心から見た出口点の角度
    //   sweep = 負（反時計回り）に正規化
    //   arcDir = arcAngle + π/2  ← 反時計回りの接線方向
    // =========================================================
    const calcRaSweep = (entryAngle, exitAngle) => {
      const entryArc = entryAngle - Math.PI / 2;
      const exitArc  = exitAngle  - Math.PI / 2;
      // 反時計回り(負)に正規化
      let sweep = (exitArc - entryArc) % (Math.PI * 2);
      if(sweep > 0) sweep -= Math.PI * 2;   // 正→負(反時計回り)に変換
      if(Math.abs(sweep) < 0.01) sweep = -Math.PI * 2; // ほぼ0→一周
      return { entryArc, exitArc, sweep };
    };

    // =========================================================
    // ラウンドアバウト環状路エッジ描画 (edge.type === 'roundabout')
    //   入口点→出口点 をベジェ曲線で走行
    //   案B: 実際にRA外縁の入口点→出口点を走るので軌跡が正確
    // =========================================================
    if(this.edge.type === 'roundabout'){
      const {from: rfrom, to: rto} = this.edge;
      const raCenter = this.edge.raNode;

      // 入口方向・出口方向
      const inDx = rfrom.x - (raCenter ? raCenter.x : rfrom.x);
      const inDy = rfrom.y - (raCenter ? raCenter.y : rfrom.y);
      const entryAngle = Math.atan2(inDy, inDx); // 外側→中心方向

      const outDx = rto.x - (raCenter ? raCenter.x : rto.x);
      const outDy = rto.y - (raCenter ? raCenter.y : rto.y);
      const exitAngle = Math.atan2(outDy, outDx);  // 中心→出口方向

      // 3次ベジェ曲線の制御点
      // P0 = 入口点, P3 = 出口点
      // P1 = P0 + 入口接線方向（RA中心方向） * ctrl
      // P2 = P3 - 出口接線方向（RA中心から外方向）* ctrl
      const r = raCenter ? raCenter.rbRingRadius || 39 : 39;
      const ctrl = r * 0.8; // 制御点の距離

      // 入口接線 = entryAngle の 右90°(左側通行=反時計回り)
      const inTanX = -Math.sin(entryAngle);  // 入口接線 x（反時計回り）
      const inTanY =  Math.cos(entryAngle);  // 入口接線 y
      // 出口接線 = exitAngle の 左90°（出口へ向かって来る方向）
      const outTanX =  Math.sin(exitAngle);
      const outTanY = -Math.cos(exitAngle);

      const p0x = rfrom.x, p0y = rfrom.y;
      const p1x = p0x + inTanX*ctrl,  p1y = p0y + inTanY*ctrl;
      const p3x = rto.x,  p3y = rto.y;
      const p2x = p3x + outTanX*ctrl, p2y = p3y + outTanY*ctrl;

      // ベジェ曲線上の pos 位置
      const t = this.pos;
      const mt = 1 - t;
      const bx = mt*mt*mt*p0x + 3*mt*mt*t*p1x + 3*mt*t*t*p2x + t*t*t*p3x;
      const by = mt*mt*mt*p0y + 3*mt*mt*t*p1y + 3*mt*t*t*p2y + t*t*t*p3y;

      // 接線方向（1次微分で進行方向を計算）
      const dtx = 3*mt*mt*(p1x-p0x) + 6*mt*t*(p2x-p1x) + 3*t*t*(p3x-p2x);
      const dty = 3*mt*mt*(p1y-p0y) + 6*mt*t*(p2y-p1y) + 3*t*t*(p3y-p2y);
      const ang = Math.atan2(dty, dtx);

      drawCar(bx, by, ang);
      return;
    }

    // =========================================================
    // 通常直線描画
    // =========================================================
    const {from,to}=this.edge;
    const vx=to.x-from.x, vy=to.y-from.y;
    const len=Math.sqrt(vx*vx+vy*vy);
    const nx=-vy/len, ny=vx/len;
    const offset=this.edge.type === 'oneway' ? 0 : -(LANE_W/2 + this.lane*LANE_W);
    const cx=from.x+vx*this.pos+nx*offset;
    const cy=from.y+vy*this.pos+ny*offset;
    const angle=Math.atan2(vy,vx);
    drawCar(cx, cy, angle);
  }

}  // end class Car

FIXED_MAPS["crossing_b"] = {

        {x1:990,y1:306,x2:0,y2:306,dir:"h"},
      ],
      crossings:[cr216, cr504, cr882],
      crossingRoadW:2*LANE_W*2,
      trainPos:0, trainDir:-1, trainSpeed:0.00035,
      totalLength:990,

    // ===== 建物（2幹線の間: y=144〜504）=====
    const _gC=["#7ab040","#8ab848","#6aa030","#80b038"];
    const _cC=["#4a7ab0","#c84040","#40a848","#e0a030","#8848c0"];
    const _mkH=(hx,hy,i)=>{

      n.houseType='sparse';n.capacity=1;n.parkedCars=[];n.slotUsed=[false];

    let _i=0;

    function isSafe(hx,hy){
      const M=54; // 道路幅36px + マージン18px

      // 幹線帯（上下）
      if(hy < 144 || hy > 504) return false;

      // 線路帯 y=324±M
      if(hy >= 324-M && hy <= 324+M) return false;

      // 左oneway縦: x=216, y=108〜360（線路より上）
      if(hx >= 216-M && hx <= 216+M && hy >= 108 && hy <= 324-M) return false;

      // 左oneway横: y=360, x=216〜324（線路より下）
      if(hy >= 360-M && hy <= 360+M && hx >= 216-M && hx <= 324+M) return false;

      if(hx >= 216-M && hx <= 216+M && hy >= 324+M && hy <= 360+M) return false;

      // 左oneway縦（n8→n9）: x=324, y=360〜540
      if(hx >= 324-M && hx <= 324+M && hy >= 360-M) return false;

      // 中央縦 x=504
      if(hx >= 504-M && hx <= 504+M) return false;

      // 右oneway縦（n10→n11）: x=684, y=108〜216
      if(hx >= 684-M && hx <= 684+M && hy <= 216+M) return false;

      if(hy >= 216-M && hy <= 216+M && hx >= 684-M && hx <= 882+M) return false;

      // 右oneway縦（n12→n13）: x=882, y=216〜540
      if(hx >= 882-M && hx <= 882+M && hy >= 216-M) return false;

      return true;
    }

    // 自然な配置: ブロックごとに密度を変えてバラつきを出す
    // シード値固定の擬似乱数（再生成のたびに変わらないよう）
    let _seed = 42;
    function rnd(){ _seed=(_seed*1664525+1013904223)&0xffffffff; return ((_seed>>>0)/0xffffffff); }

    // 配置候補を18px格子で生成し、ブロック単位で間引く
    const candidates = [];
