// ===== 川描画 =====
function drawRivers(){
  for(const r of rivers){
    if(r.type==="h"){
      // ---- 水平川 ----
      const w = 1000, h = r.y2 - r.y1;
      if(riverImg.complete && riverImg.naturalWidth > 0){
        // 画像を横にタイル（そのまま描画、回転なし）
        const tw = 128;
        for(let x = 0; x < w; x += tw){
          ctx.drawImage(riverImg, x, r.y1, Math.min(tw, w - x), h);
        }
      } else {
        const grad = ctx.createLinearGradient(0, r.y1, 0, r.y2);
        grad.addColorStop(0,   "#4a9fc7");
        grad.addColorStop(0.3, "#2e86c1");
        grad.addColorStop(0.7, "#2e86c1");
        grad.addColorStop(1,   "#4a9fc7");
        ctx.fillStyle = grad;
        ctx.fillRect(0, r.y1, w, h);
      }
      // 横方向の波紋ライン
      ctx.strokeStyle = "rgba(255,255,255,0.20)";
      ctx.lineWidth = 1.5;
      const hStep = Math.max(10, h / 4);
      for(let y = r.y1 + hStep * 0.5; y < r.y2; y += hStep){
        ctx.beginPath();
        for(let x = 0; x <= 1000; x += 8){
          const wave = Math.sin((x * 0.05) + timeCounter * 0.04) * 2.5;
          x === 0 ? ctx.moveTo(x, y + wave) : ctx.lineTo(x, y + wave);
        }
        ctx.stroke();
      }

    } else {
      // ---- 縦川 ----
      // 回転は使わず、縦方向にタイルを積み上げるだけ
      const cw = r.x2 - r.x1, ch = 700;
      if(riverImg.complete && riverImg.naturalWidth > 0){
        // 縦にタイルを並べる（画像の高さ128pxを川幅に拡縮して積む）
        const th = 128;
        for(let y = 0; y < ch; y += th){
          ctx.drawImage(riverImg, r.x1, y, cw, Math.min(th, ch - y));
        }
      } else {
        const grad = ctx.createLinearGradient(r.x1, 0, r.x2, 0);
        grad.addColorStop(0,   "#4a9fc7");
        grad.addColorStop(0.3, "#2e86c1");
        grad.addColorStop(0.7, "#2e86c1");
        grad.addColorStop(1,   "#4a9fc7");
        ctx.fillStyle = grad;
        ctx.fillRect(r.x1, 0, cw, ch);
      }
      // 縦方向の波紋ライン
      ctx.strokeStyle = "rgba(255,255,255,0.20)";
      ctx.lineWidth = 1.5;
      const vStep = Math.max(10, cw / 4);
      for(let x = r.x1 + vStep * 0.5; x < r.x2; x += vStep){
        ctx.beginPath();
        for(let y = 0; y <= 700; y += 8){
          const wave = Math.sin((y * 0.05) + timeCounter * 0.04) * 2.5;
          y === 0 ? ctx.moveTo(x + wave, y) : ctx.lineTo(x + wave, y);
        }
        ctx.stroke();
      }
    }
  }
}

// ===== ガソリンスタンド描画 =====
// 敷地: 108×108px（中心座標 n.x, n.y）
// レイアウト: 手前(道路側)に給油エリア、奥にコンビニ本体+洗車機
function drawGasStation(n){
  const W=72, H=72, SH=5;
  ctx.save();
  // gsFacing: 'south'(下向き=デフォルト), 'north'(上向き), 'east'(右向き), 'west'(左向き)
  const facing = n.gsFacing || 'south';
  const rot = {south:0, north:Math.PI, east:-Math.PI/2, west:Math.PI/2}[facing] || 0;
  ctx.translate(n.x, n.y);
  ctx.rotate(rot);
  // 以降は中心(0,0)基準・南向き（給油エリアが下）で描画
  const lx=-W/2, ty=-H/2;
  // ===== 敷地ベース =====
  ctx.fillStyle='#c8c0a8';
  ctx.fillRect(lx, ty, W, H);

  // ===== 給油エリア（下半分=道路側）=====
  ctx.fillStyle='#7c7a72';
  ctx.fillRect(lx, ty+H*0.48, W, H*0.52);
  // 区画線
  ctx.strokeStyle='rgba(255,255,255,0.3)';
  ctx.lineWidth=0.6;
  ctx.setLineDash([4,3]);
  ctx.beginPath();
  ctx.moveTo(lx+W/2, ty+H*0.48); ctx.lineTo(lx+W/2, ty+H);
  ctx.stroke();
  ctx.setLineDash([]);

  // ===== ポンプ島2基（給油エリア内）=====
  const drawPumpIsland = (ix, iy) => {
    const iW=8, iH=26;
    ctx.fillStyle='#d0ccc4';
    ctx.beginPath(); ctx.roundRect(ix, iy, iW, iH, 1); ctx.fill();
    // 給油機上
    ctx.fillStyle='#e8e2d4'; ctx.beginPath(); ctx.roundRect(ix+1,iy+1,iW-2,9,1); ctx.fill();
    ctx.fillStyle='#c82020'; ctx.fillRect(ix+1,iy+1,iW-2,2);
    ctx.fillStyle='#a0a8a0'; ctx.beginPath(); ctx.roundRect(ix+1,iy+5,iW-2,4,1); ctx.fill();
    // 給油機下
    ctx.fillStyle='#e8e2d4'; ctx.beginPath(); ctx.roundRect(ix+1,iy+14,iW-2,9,1); ctx.fill();
    ctx.fillStyle='#c82020'; ctx.fillRect(ix+1,iy+14,iW-2,2);
    ctx.fillStyle='#a0a8a0'; ctx.beginPath(); ctx.roundRect(ix+1,iy+18,iW-2,4,1); ctx.fill();
    // ホース
    ctx.strokeStyle='#444'; ctx.lineWidth=0.8;
    ctx.beginPath(); ctx.moveTo(ix+iW,iy+8); ctx.quadraticCurveTo(ix+iW+5,iy+10,ix+iW+4,iy+14); ctx.stroke();
  };
  drawPumpIsland(lx+9,  ty+H*0.48+4);
  drawPumpIsland(lx+42, ty+H*0.48+4);

  // ===== コンビニ本体（奥=上側 左2/3）=====
  const bx=lx, by=ty;
  const bW=W*0.67, bH=H*0.48;
  // 影
  ctx.fillStyle='rgba(0,0,0,0.13)';
  ctx.fillRect(bx+SH,by+SH,bW,bH);
  // 東側面
  ctx.fillStyle='#6a4030';
  ctx.beginPath();
  ctx.moveTo(bx+bW,by); ctx.lineTo(bx+bW+SH,by-SH);
  ctx.lineTo(bx+bW+SH,by-SH+bH); ctx.lineTo(bx+bW,by+bH);
  ctx.closePath(); ctx.fill();
  // 南側面（給油エリア側）
  ctx.fillStyle='#7a5040';
  ctx.beginPath();
  ctx.moveTo(bx,by+bH); ctx.lineTo(bx+bW,by+bH);
  ctx.lineTo(bx+bW+SH,by+bH-SH); ctx.lineTo(bx+SH,by+bH-SH);
  ctx.closePath(); ctx.fill();
  // 屋根面
  ctx.fillStyle='#ecdcc8'; ctx.fillRect(bx,by,bW,bH);
  // 赤帯
  ctx.fillStyle='#c82020'; ctx.fillRect(bx,by,bW,5);
  ctx.fillStyle='#a01818'; ctx.fillRect(bx,by,bW,1.5);
  // 屋根ライン
  ctx.strokeStyle='#dcc8b4'; ctx.lineWidth=0.5;
  for(let rl=by+9; rl<by+bH; rl+=8){
    ctx.beginPath(); ctx.moveTo(bx,rl); ctx.lineTo(bx+bW,rl); ctx.stroke();
  }
  // 入口（給油エリア側に向いた入口）
  ctx.fillStyle='rgba(144,192,216,0.85)';
  ctx.fillRect(bx+bW/2-5, by+bH-5, 10, 5);
  // 室外機
  ctx.fillStyle='#c0c0b8';
  ctx.fillRect(bx+bW-13,by+3,5,4);
  ctx.fillRect(bx+bW-7, by+3,5,4);

  // ===== 洗車機棟（奥=上側 右1/3）=====
  const wx=lx+W*0.67, wy=ty;
  const wW=W*0.33, wH=H*0.48;
  // 影
  ctx.fillStyle='rgba(0,0,0,0.12)';
  ctx.fillRect(wx+SH*0.6,wy+SH*0.6,wW,wH);
  // 東側面
  ctx.fillStyle='#485868';
  ctx.beginPath();
  ctx.moveTo(wx+wW,wy); ctx.lineTo(wx+wW+SH*0.7,wy-SH*0.7);
  ctx.lineTo(wx+wW+SH*0.7,wy-SH*0.7+wH); ctx.lineTo(wx+wW,wy+wH);
  ctx.closePath(); ctx.fill();
  // 南側面
  ctx.fillStyle='#586878';
  ctx.beginPath();
  ctx.moveTo(wx,wy+wH); ctx.lineTo(wx+wW,wy+wH);
  ctx.lineTo(wx+wW+SH*0.7,wy+wH-SH*0.7); ctx.lineTo(wx+SH*0.7,wy+wH-SH*0.7);
  ctx.closePath(); ctx.fill();
  // 屋根面
  ctx.fillStyle='#8090b0'; ctx.fillRect(wx,wy,wW,wH);
  // レール
  ctx.strokeStyle='#6878a0'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(wx+3,wy); ctx.lineTo(wx+3,wy+wH); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(wx+wW-3,wy); ctx.lineTo(wx+wW-3,wy+wH); ctx.stroke();
  // ブラシバー
  ctx.fillStyle='#7888b0';
  ctx.fillRect(wx+2,wy+wH*0.35,wW-4,3);
  ctx.fillRect(wx+2,wy+wH*0.6, wW-4,3);
  // 洗車中の車
  ctx.fillStyle='rgba(160,168,192,0.8)';
  ctx.beginPath(); ctx.roundRect(wx+3,wy+wH*0.68,wW-6,wH*0.22,1); ctx.fill();
  // 洗車棟看板
  ctx.fillStyle='#3060a0'; ctx.fillRect(wx,wy,wW,4);
  ctx.fillStyle='#1a4080'; ctx.fillRect(wx,wy,wW,1.5);

  // ===== 敷地境界 =====
  ctx.strokeStyle='#a89060'; ctx.lineWidth=0.6;
  ctx.strokeRect(lx,ty,W,H);

  ctx.restore();
}

function drawExitNumbers(){
  for(const n of nodes){
    if(!n.external || n.exitNumber === undefined) continue;
    const r = 10;
    ctx.save();
    ctx.fillStyle = 'rgba(20,20,40,0.82)';
    ctx.strokeStyle = '#aaddff';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI*2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 10px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(n.exitNumber, n.x, n.y);
    ctx.restore();
  }
}

function drawTerrain(){
  if(terrainCanvas){
    ctx.drawImage(terrainCanvas, 0, 0);
  }
}

// ===== 渋滞ヒートマップ =====
let showHeatmap = false;
let showDebugGrid = false;

function toggleDebugGrid(){
  showDebugGrid = !showDebugGrid;
  const btn = document.getElementById('btnDebugGrid');
  btn.style.background = showDebugGrid ? '#1a3a1a' : '#333';
  btn.style.color      = showDebugGrid ? '#80ff80' : '#888';
  btn.style.border     = showDebugGrid ? '1px solid #40c040' : '1px solid #555';
}

function drawDebugGrid(){
  if(!showDebugGrid) return;
  ctx.save();

  // 全レベルをLANE_W=18の倍数に統一して近接二重線を解消
  // MINOR=18px, MID=18×5=90px, MAJOR=18×10=180px
  const MINOR = LANE_W;       // 18px（1車線）
  const MID   = LANE_W * 5;  // 90px
  const MAJOR = LANE_W * 10; // 180px

  // 18px細線（MID・MAJORの位置はスキップ）
  ctx.strokeStyle = 'rgba(0,255,80,0.55)';
  ctx.lineWidth = 0.5;
  for(let x=0; x<=1000; x+=MINOR){
    if(x % MID === 0) continue;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,700); ctx.stroke();
  }
  for(let y=0; y<=700; y+=MINOR){
    if(y % MID === 0) continue;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(1000,y); ctx.stroke();
  }

  // 90px中線（MAJORの位置はスキップ）
  ctx.strokeStyle = 'rgba(0,255,80,0.75)';
  ctx.lineWidth = 0.9;
  for(let x=0; x<=1000; x+=MID){
    if(x % MAJOR === 0) continue;
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,700); ctx.stroke();
  }
  for(let y=0; y<=700; y+=MID){
    if(y % MAJOR === 0) continue;
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(1000,y); ctx.stroke();
  }

  // 180px太線 + ラベル
  ctx.strokeStyle = 'rgba(0,255,80,0.95)';
  ctx.lineWidth = 1.2;
  ctx.fillStyle = 'rgba(0,255,80,1.0)';
  ctx.font = 'bold 10px monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  for(let x=0; x<=1000; x+=MAJOR){
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,700); ctx.stroke();
    ctx.fillText(`${x}`, x+2, 2);
  }
  for(let y=0; y<=700; y+=MAJOR){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(1000,y); ctx.stroke();
    ctx.fillText(`${y}`, 2, y+2);
  }

  // 駐車場ノード強調
  for(const n of nodes){
    if(n.type !== 'parking') continue;
    const dox = n.drawOffsetX || 0;
    const doy = n.drawOffsetY || 0;
    // ノード座標（赤十字）
    ctx.strokeStyle = 'rgba(255,80,80,0.9)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(n.x-8,n.y); ctx.lineTo(n.x+8,n.y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(n.x,n.y-8); ctx.lineTo(n.x,n.y+8); ctx.stroke();
    ctx.fillStyle = 'rgba(255,80,80,0.9)';
    ctx.font = 'bold 9px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`N(${n.x},${n.y})`, n.x+4, n.y-12);
    if(dox !== 0 || doy !== 0){
      ctx.strokeStyle = 'rgba(80,255,80,0.9)';
      ctx.beginPath(); ctx.arc(n.x+dox, n.y+doy, 5, 0, Math.PI*2); ctx.stroke();
      ctx.fillStyle = 'rgba(80,255,80,0.9)';
      ctx.fillText(`D(${n.x+dox},${n.y+doy})`, n.x+dox+6, n.y+doy-6);
    }
    // 駐車場の描画範囲を矩形で表示
    const ddx = n.x + dox, ddy = n.y + doy;
    let pw, ph;
    if(n.isStationParking2){ pw=60; ph=120; }
    else if(n.isLarge){ pw=120; ph=120; }
    else if(n.isVertical){ pw=60; ph=120; }
    else { pw=60; ph=60; }
    ctx.strokeStyle = 'rgba(255,200,0,0.7)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4,3]);
    ctx.strokeRect(ddx - pw/2, ddy - ph/2, pw, ph);
    ctx.setLineDash([]);
    // 四隅の座標
    ctx.fillStyle = 'rgba(255,200,0,0.9)';
    ctx.font = '8px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`L${ddx-pw/2}`, ddx-pw/2+1, ddy);
    ctx.fillText(`R${ddx+pw/2}`, ddx+pw/2-20, ddy);
    ctx.textAlign = 'center';
    ctx.fillText(`T${ddy-ph/2}`, ddx, ddy-ph/2+8);
    ctx.fillText(`B${ddy+ph/2}`, ddx, ddy+ph/2-2);
  }

  // マウス座標
  if(typeof _dbgMx !== 'undefined'){
    ctx.fillStyle = 'rgba(255,255,0,0.95)';
    ctx.font = 'bold 12px monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`cursor: ${_dbgMx}, ${_dbgMy}`, 8, 680);
  }
  ctx.restore();
}

// ===== 鉄道システム更新 =====
function updateRailways(){
  for(const rw of railways){
    // 駅停車チェック
    if(rw.stationStopY !== undefined || rw.stationStopX !== undefined){
      const tp = getRailwayTrainPos(rw);
      // 縦方向駅(stationStopY)または横方向駅(stationStopX)に対応
      const distToStation = rw.stationStopX !== undefined
        ? Math.abs(tp.x - rw.stationStopX)
        : Math.abs(tp.y - rw.stationStopY);
      const matchDir = rw.stationStopX !== undefined ? 'h' : 'v';

      if(rw.stationStopTimer > 0){
        // 停車中 → 進めない
        rw.stationStopTimer -= gameSpeed;
      } else if(distToStation < rw.stationStopDist && tp.dir === matchDir){
        // 駅に近づいた → 停車開始
        // 既に停車済みでないときだけ（1周に1回だけ停まる）
        if(!rw._stationVisited){
          rw.stationStopTimer = rw.stationStopDuration;
          rw._stationVisited = true;
        } else {
          rw.trainPos += rw.trainSpeed * gameSpeed;
        }
      } else {
        // 駅から離れたらvisitedリセット
        if(distToStation > rw.stationStopDist * 2) rw._stationVisited = false;
        rw.trainPos += rw.trainSpeed * gameSpeed;
      }
    } else {
      rw.trainPos += rw.trainSpeed * gameSpeed;
    }

    if(rw.trainPos > 1){ rw.trainPos = 0; }

    // 電車の現在のCanvas座標を計算
    const trainXY = getRailwayTrainPos(rw);

    // 踏切状態の更新
    for(const crossNode of rw.crossings){
      if(crossNode.isOverpass) continue; // 立体交差は踏切制御不要
      const cx = crossNode.x, cy = crossNode.y;
      const dist = Math.hypot(trainXY.x - cx, trainXY.y - cy);

      if(dist < CROSSING_CLOSE_DIST){
        crossNode.crossingOpen = false;
        crossNode.crossingTimer = CROSSING_OPEN_DELAY;
      } else if(crossNode.crossingTimer > 0){
        crossNode.crossingTimer--;
        if(crossNode.crossingTimer <= 0){
          crossNode.crossingOpen = true;
        }
      }
    }
  }
}

// 線路上の電車座標を取得（trainPos 0〜1 → {x,y,dir}）
function getRailwayTrainPos(rw){
  const totalLen = rw.totalLength;
  let dist = rw.trainPos * totalLen;
  for(const seg of rw.segments){
    if(seg.corner) continue; // コーナーマーカーはスキップ
    const segLen = Math.hypot(seg.x2-seg.x1, seg.y2-seg.y1);
    if(dist <= segLen){
      const t = dist / segLen;
      return { x: seg.x1 + (seg.x2-seg.x1)*t, y: seg.y1 + (seg.y2-seg.y1)*t, dir: seg.dir };
    }
    dist -= segLen;
  }
  const last = rw.segments.filter(s=>!s.corner).slice(-1)[0];
  return { x: last.x2, y: last.y2, dir: last.dir };
}

// ===== 鉄道描画 =====
// topLayer=false: 線路タイル・駅（道路の下）
// topLayer=true:  踏切・電車（道路の上）
function drawRailways(topLayer){
  for(const rw of railways){
    if(!topLayer){
      // 1. 線路タイル（道路の下）
      for(const seg of rw.segments){
        if(seg.corner){
          const tileW=20,tileH=20;
          if(railSWImg.complete&&railSWImg.naturalWidth>0)
            ctx.drawImage(railSWImg,seg.x1-tileW/2,seg.y1-tileH/2,tileW,tileH);
          else{ ctx.fillStyle='#b0a080'; ctx.fillRect(seg.x1-tileW/2,seg.y1-tileH/2,tileW,tileH); }
        } else if(seg.dir==='h'){
          const tileW=64,tileH=20;
          const xMin=Math.min(seg.x1,seg.x2), xMax=Math.max(seg.x1,seg.x2);
          const y=seg.y1-tileH/2;
          if(railHImg.complete&&railHImg.naturalWidth>0){
            for(let x=xMin;x<xMax;x+=tileW)
              ctx.drawImage(railHImg,x,y,Math.min(tileW,xMax-x),tileH);
          } else { ctx.fillStyle='#b0a080'; ctx.fillRect(xMin,y,xMax-xMin,tileH); }
        } else {
          const tileW=20,tileH=64;
          const yMin=Math.min(seg.y1,seg.y2), yMax=Math.max(seg.y1,seg.y2);
          const x=seg.x1-tileW/2;
          if(railVImg.complete&&railVImg.naturalWidth>0){
            for(let y=yMin;y<yMax;y+=tileH)
              ctx.drawImage(railVImg,x,y,tileW,Math.min(tileH,yMax-y));
          } else { ctx.fillStyle='#b0a080'; ctx.fillRect(x,yMin,tileW,yMax-yMin); }
        }
      }
      // 2. 駅（コード描画・ホーム＋屋根のみ）
      const st = rw.station;
      if(st && st.homeX !== undefined){
        // ホーム面（アスファルト色）
        ctx.fillStyle = '#ddd8ce';
        ctx.strokeStyle = '#b8b2a8';
        ctx.lineWidth = 1;
        ctx.fillRect(st.homeX, st.homeY, st.homeW, st.homeH);
        ctx.strokeRect(st.homeX, st.homeY, st.homeW, st.homeH);
        // 縁石（線路側）
        ctx.fillStyle = '#a8a39a';
        ctx.fillRect(st.homeX, st.homeY, 3, st.homeH);
        // 点字ブロック（黄線）
        ctx.strokeStyle = '#d4a820';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4,4]);
        ctx.beginPath();
        ctx.moveTo(st.homeX + 6, st.homeY);
        ctx.lineTo(st.homeX + 6, st.homeY + st.homeH);
        ctx.stroke();
        ctx.setLineDash([]);
        // 屋根（瓦タイル風）
        ctx.fillStyle = '#6e7f96';
        ctx.strokeStyle = '#5a6a80';
        ctx.lineWidth = 1;
        ctx.fillRect(st.roofX, st.roofY, st.roofW, st.roofH);
        ctx.strokeRect(st.roofX, st.roofY, st.roofW, st.roofH);
        // 瓦の横ライン
        ctx.strokeStyle = '#5a6a80';
        ctx.lineWidth = 0.6;
        for(let ry = st.roofY + 8; ry < st.roofY + st.roofH; ry += 8){
          ctx.beginPath();
          ctx.moveTo(st.roofX, ry);
          ctx.lineTo(st.roofX + st.roofW, ry);
          ctx.stroke();
        }
        // 棟（縦中央線）
        ctx.strokeStyle = '#4a5a70';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(st.roofX + st.roofW/2, st.roofY);
        ctx.lineTo(st.roofX + st.roofW/2, st.roofY + st.roofH);
        ctx.stroke();
      }
    } else {
      // 3. 踏切は後でまとめて描く（下のセクションで処理）
    }
  }

  // 3b. 踏切をすべてのrailwayから収集して一度だけ描画
  if(topLayer){
    // 全railwayから踏切ノードを重複なく収集
    const allCrossings = new Set();
    for(const rw of railways){
      for(const cn of rw.crossings) allCrossings.add(cn);
    }

    for(const crossNode of allCrossings){
      const connE = edges.filter(e => e.from===crossNode || e.to===crossNode);
      const roadW = connE.length > 0
        ? Math.max(...connE.map(e => e.lanes * LANE_W)) * 2
        : 2 * LANE_W * 2;

      const tileW = 64, tileH = 20;
      const startX = crossNode.x - roadW / 2;
      const startY = crossNode.y - tileH / 2;

      // 立体交差: 踏切タイル・ポール・バーをすべてスキップ、道路外縁に壁を描画
      if(crossNode.isOverpass){
        const vertEdges  = connE.filter(e => Math.abs(e.to.x - e.from.x) < 5);
        const horizEdges = connE.filter(e => Math.abs(e.to.y - e.from.y) < 5);
        const isVertRoad = vertEdges.length >= horizEdges.length;
        // 道路幅を縦・横エッジから正確に計算
        const roadEdges = isVertRoad ? vertEdges : horizEdges;
        const rW = roadEdges.length > 0
          ? Math.max(...roadEdges.map(e => e.lanes * LANE_W)) * 2
          : roadW;
        ctx.fillStyle = '#606060';
        if(isVertRoad){
          // 縦道路が横線路をまたぐ → 左右に壁
          ctx.fillRect(crossNode.x - rW/2 - 4, crossNode.y - 10, 4, 20);
          ctx.fillRect(crossNode.x + rW/2,     crossNode.y - 10, 4, 20);
          ctx.fillStyle = '#484848';
          ctx.fillRect(crossNode.x - rW/2 - 4, crossNode.y - 10, 4, 2);
          ctx.fillRect(crossNode.x - rW/2 - 4, crossNode.y + 8,  4, 2);
          ctx.fillRect(crossNode.x + rW/2,     crossNode.y - 10, 4, 2);
          ctx.fillRect(crossNode.x + rW/2,     crossNode.y + 8,  4, 2);
        } else {
          // 横道路が縦線路をまたぐ → 上下に壁
          ctx.fillRect(crossNode.x - 10, crossNode.y - rW/2 - 4, 20, 4);
          ctx.fillRect(crossNode.x - 10, crossNode.y + rW/2,     20, 4);
          ctx.fillStyle = '#484848';
          ctx.fillRect(crossNode.x - 10, crossNode.y - rW/2 - 4, 2, 4);
          ctx.fillRect(crossNode.x + 8,  crossNode.y - rW/2 - 4, 2, 4);
          ctx.fillRect(crossNode.x - 10, crossNode.y + rW/2,     2, 4);
          ctx.fillRect(crossNode.x + 8,  crossNode.y + rW/2,     2, 4);
        }
        continue;
      }

      // 複線対応
      const drawYList = [startY];
      if(crossNode.dualTrack && crossNode.dualTrackY !== undefined){
        drawYList.push(crossNode.dualTrackY - tileH / 2);
      }

      for(const dy of drawYList){
        if(fumikiriImg.complete && fumikiriImg.naturalWidth > 0){
          for(let x = startX; x < startX + roadW; x += tileW){
            const drawW = Math.min(tileW, startX + roadW - x);
            ctx.drawImage(fumikiriImg, 0, 0, drawW, tileH, x, dy, drawW, tileH);
          }
        } else {
          ctx.fillStyle = '#9a9590';
          ctx.fillRect(startX, dy, roadW, tileH);
        }
      }

      // ポール
      const trackTopY = crossNode.dualTrack
        ? crossNode.dualTrackY - tileH / 2
        : crossNode.y - tileH / 2;
      const trackBotY = crossNode.y + tileH / 2;
      const trackSpan = trackBotY - trackTopY;
      const poleH = trackSpan + 12;
      const poleCenterY = (trackTopY + trackBotY) / 2;
      const poleW = 5;
      ctx.save();
      const drawPole = (px) => {
        for(let i = 0; i < 4; i++){
          ctx.fillStyle = i % 2 === 0 ? '#cc2020' : '#eeeeee';
          ctx.fillRect(px, poleCenterY - poleH/2 + i*(poleH/4), poleW, poleH/4);
        }
      };
      drawPole(startX - poleW - 2);
      drawPole(startX + roadW + 2);

      // 警告灯
      const blink = Math.floor(timeCounter/15)%2===0;
      ctx.fillStyle = blink ? 'rgba(255,30,30,0.95)' : 'rgba(180,0,0,0.55)';
      ctx.beginPath(); ctx.arc(startX - poleW/2 - 1, poleCenterY - poleH/2 - 4, 5, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(startX + roadW + poleW/2 + 3, poleCenterY - poleH/2 - 4, 5, 0, Math.PI*2); ctx.fill();
      ctx.restore();

      // 遮断バー
      if(!crossNode.crossingOpen){
        ctx.save();
        ctx.strokeStyle = '#ff2020';
        ctx.lineWidth = 4;
        ctx.setLineDash([8, 6]);
        ctx.beginPath();
        ctx.moveTo(startX - poleW - 2, poleCenterY - poleH/2 + 4);
        ctx.lineTo(startX + roadW + poleW + 2, poleCenterY - poleH/2 + 4);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(startX + roadW + poleW + 2, poleCenterY + poleH/2 - 4);
        ctx.lineTo(startX - poleW - 2, poleCenterY + poleH/2 - 4);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();
      }
    }
  } // end if(topLayer) for crossing drawing

  // 4. 電車描画
  // - 通常踏切: topLayer=true（踏切の上）
  // - 立体交差通過中: topLayer=false（線路レイヤー＝道路の下）
  function drawTrain(rw){
    const tp=getRailwayTrainPos(rw);
    const seg0 = rw.segments.filter(s=>!s.corner)[0];
    const goingLeft = seg0 && seg0.x2 < seg0.x1;
    if(tp.dir==='h'){
      if(trainHImg.complete&&trainHImg.naturalWidth>0){
        if(goingLeft){
          ctx.save(); ctx.scale(-1,1);
          ctx.drawImage(trainHImg,-(tp.x+40),tp.y-9,80,18);
          ctx.restore();
        } else {
          ctx.drawImage(trainHImg,tp.x-40,tp.y-9,80,18);
        }
      }
    } else {
      if(trainVImg.complete&&trainVImg.naturalWidth>0)
        ctx.drawImage(trainVImg,tp.x-9,tp.y-40,18,80);
    }
  }

  if(!topLayer){
    // 立体交差の踏切ノード付近を通過中の電車を先に描く（道路の下になる）
    for(const rw of railways){
      const tp=getRailwayTrainPos(rw);
      const nearOverpass = rw.crossings.some(cn =>
        cn.isOverpass && Math.hypot(tp.x-cn.x, tp.y-cn.y) < 50
      );
      if(nearOverpass) drawTrain(rw);
    }
  }

  if(topLayer){
    for(const rw of railways){
      const tp=getRailwayTrainPos(rw);
      const nearOverpass = rw.crossings.some(cn =>
        cn.isOverpass && Math.hypot(tp.x-cn.x, tp.y-cn.y) < 50
      );
      if(!nearOverpass) drawTrain(rw);
    }
  }
}

// 踏切の車への影響（Car.update から参照）


// ===== ビル描画（俯瞰・擬似3D）=====
// 敷地: 54×54px（3×3マス）
// 南側面・東側面で立体感を表現
function drawBuilding(n){
  const W=54, H=54, SH=10; // SH=側面高さ(px)
  const lx=n.x-W/2, ty=n.y-H/2;
  const colors = [
    {roof:'#686860',wall:'#909088',side:'#505048',sideE:'#383832',win:'#7ab0c8',winR:'rgba(255,255,255,0.35)',eq:'#807870'},
    {roof:'#b8b090',wall:'#ccc8a8',side:'#807860',sideE:'#5a5448',win:'#90c0d0',winR:'rgba(255,255,255,0.4)',eq:'#908870'},
    {roof:'#506880',wall:'#6888a0',side:'#405060',sideE:'#303848',win:'#a0d8f0',winR:'rgba(255,255,255,0.5)',eq:'#607080'},
    {roof:'#885060',wall:'#a86878',side:'#604050',sideE:'#483040',win:'#d0a0b8',winR:'rgba(255,255,255,0.35)',eq:'#907080'},
  ];
  const col = colors[(n.buildingColor||0)%4];
  ctx.save();

  // 影
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.fillRect(lx+SH+2, ty+SH+2, W, H);

  // 東側面（右・最暗）
  ctx.fillStyle=col.sideE;
  ctx.beginPath();
  ctx.moveTo(lx+W, ty);
  ctx.lineTo(lx+W+SH, ty-SH);
  ctx.lineTo(lx+W+SH, ty-SH+H);
  ctx.lineTo(lx+W, ty+H);
  ctx.closePath(); ctx.fill();
  // 東側面 窓
  ctx.fillStyle=col.win+'55';
  for(let i=1;i<4;i++) ctx.fillRect(lx+W+1, ty+i*13-5, SH-1, 7);

  // 南側面（下・中間）
  ctx.fillStyle=col.side;
  ctx.beginPath();
  ctx.moveTo(lx, ty+H);
  ctx.lineTo(lx+W, ty+H);
  ctx.lineTo(lx+W+SH, ty+H-SH);
  ctx.lineTo(lx+SH, ty+H-SH);
  ctx.closePath(); ctx.fill();
  // 南側面 窓
  ctx.fillStyle=col.win+'66';
  for(let i=0;i<3;i++) ctx.fillRect(lx+5+i*16, ty+H-SH+2, 12, SH-4);

  // 屋上
  ctx.fillStyle=col.roof;
  ctx.fillRect(lx,ty,W,H);
  ctx.strokeStyle=col.wall; ctx.lineWidth=2.5; ctx.strokeRect(lx,ty,W,H);
  ctx.fillStyle=col.roof+'dd'; ctx.fillRect(lx+4,ty+4,W-8,H-8);

  // 窓グリッド（3×3）
  for(let r=0;r<3;r++) for(let cc=0;cc<3;cc++){
    const wx=lx+7+cc*16, wy=ty+7+r*16;
    ctx.fillStyle=col.win; ctx.fillRect(wx,wy,12,10);
    ctx.fillStyle=col.winR; ctx.fillRect(wx+1,wy+1,7,3);
    ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=0.4; ctx.strokeRect(wx,wy,12,10);
  }

  // 屋上設備
  ctx.fillStyle=col.eq;
  ctx.fillRect(lx+W-18,ty+H-14,13,9); ctx.fillRect(lx+W-34,ty+H-11,10,7);
  // 給水塔
  ctx.beginPath(); ctx.arc(lx+W-38,ty+H-18,4,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath(); ctx.arc(lx+W-38,ty+H-18,2,0,Math.PI*2); ctx.fill();

  // 敷地境界
  ctx.strokeStyle='#a89868'; ctx.lineWidth=0.5; ctx.strokeRect(lx,ty,W,H);
  ctx.restore();
}

// ===== マンション横長描画 =====
// 敷地: 108×54px（6×3マス）
function drawMansionH(n){
  const W=108, H=54, SH=10;
  const lx=n.x-W/2, ty=n.y-H/2;
  const colors=[
    {roof:'#8878a0',wall:'#9888b0',side:'#685878',sideE:'#484058',win:'#b0d0e8',div:'#785888'},
    {roof:'#789870',wall:'#88a880',side:'#587858',sideE:'#385040',win:'#a0d090',div:'#588058'},
    {roof:'#906870',wall:'#a87880',side:'#685058',sideE:'#484048',win:'#d0a0a8',div:'#886070'},
  ];
  const col=colors[(n.buildingColor||0)%3];
  ctx.save();

  // 影
  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(lx+SH+2,ty+SH+2,W,H);

  // 東側面
  ctx.fillStyle=col.sideE;
  ctx.beginPath();
  ctx.moveTo(lx+W,ty); ctx.lineTo(lx+W+SH,ty-SH);
  ctx.lineTo(lx+W+SH,ty-SH+H); ctx.lineTo(lx+W,ty+H);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle=col.win+'55';
  for(let i=1;i<3;i++) ctx.fillRect(lx+W+1,ty+i*18-6,SH-1,8);

  // 南側面
  ctx.fillStyle=col.side;
  ctx.beginPath();
  ctx.moveTo(lx,ty+H); ctx.lineTo(lx+W,ty+H);
  ctx.lineTo(lx+W+SH,ty+H-SH); ctx.lineTo(lx+SH,ty+H-SH);
  ctx.closePath(); ctx.fill();
  // バルコニー突出
  const units=6; const uw=(W-10)/units;
  ctx.fillStyle=col.side+'cc';
  for(let u=0;u<units;u++) ctx.fillRect(lx+5+u*uw,ty+H-SH+1,uw-3,SH-2);
  ctx.fillStyle=col.win+'88';
  for(let u=0;u<units;u++) ctx.fillRect(lx+7+u*uw,ty+H-SH+3,uw-7,SH-5);

  // 屋上
  ctx.fillStyle=col.roof; ctx.fillRect(lx,ty,W,H);
  ctx.strokeStyle=col.wall; ctx.lineWidth=2; ctx.strokeRect(lx,ty,W,H);
  ctx.fillStyle=col.roof+'dd'; ctx.fillRect(lx+3,ty+3,W-6,H-6);

  // バルコニー窓（6戸×2フロア）
  const floors=2;
  for(let f=0;f<floors;f++){
    const fy=ty+5+f*(H-10)/floors;
    for(let u=0;u<units;u++){
      const ux=lx+5+u*uw;
      ctx.fillStyle='rgba(180,170,200,0.5)'; ctx.fillRect(ux,fy,uw-4,3);
      ctx.fillStyle=col.win; ctx.fillRect(ux+2,fy+4,uw-8,9);
      ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(ux+3,fy+5,Math.floor((uw-8)*0.6),3);
    }
  }
  // 仕切り
  ctx.strokeStyle=col.div; ctx.lineWidth=0.5;
  for(let u=1;u<units;u++){
    ctx.beginPath(); ctx.moveTo(lx+5+u*uw,ty); ctx.lineTo(lx+5+u*uw,ty+H); ctx.stroke();
  }

  ctx.strokeStyle='#a89868'; ctx.lineWidth=0.5; ctx.strokeRect(lx,ty,W,H);
  ctx.restore();
}

// ===== マンション縦長描画 =====
// 敷地: 54×108px（3×6マス）
function drawMansionV(n){
  const W=54, H=108, SH=10;
  const lx=n.x-W/2, ty=n.y-H/2;
  const colors=[
    {roof:'#789870',wall:'#88a880',side:'#587858',sideE:'#385040',win:'#a0d090',div:'#588058'},
    {roof:'#8878a0',wall:'#9888b0',side:'#685878',sideE:'#484058',win:'#b0d0e8',div:'#785888'},
  ];
  const col=colors[(n.buildingColor||0)%2];
  ctx.save();

  ctx.fillStyle='rgba(0,0,0,0.25)'; ctx.fillRect(lx+SH+2,ty+SH+2,W,H);

  // 東側面
  ctx.fillStyle=col.sideE;
  ctx.beginPath();
  ctx.moveTo(lx+W,ty); ctx.lineTo(lx+W+SH,ty-SH);
  ctx.lineTo(lx+W+SH,ty-SH+H); ctx.lineTo(lx+W,ty+H);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle=col.win+'55';
  for(let i=1;i<7;i++) ctx.fillRect(lx+W+1,ty+i*15-6,SH-1,8);

  // 南側面
  ctx.fillStyle=col.side;
  ctx.beginPath();
  ctx.moveTo(lx,ty+H); ctx.lineTo(lx+W,ty+H);
  ctx.lineTo(lx+W+SH,ty+H-SH); ctx.lineTo(lx+SH,ty+H-SH);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle=col.win+'66';
  for(let i=0;i<2;i++) ctx.fillRect(lx+5+i*22,ty+H-SH+2,18,SH-4);

  // 屋上
  ctx.fillStyle=col.roof; ctx.fillRect(lx,ty,W,H);
  ctx.strokeStyle=col.wall; ctx.lineWidth=2; ctx.strokeRect(lx,ty,W,H);
  ctx.fillStyle=col.roof+'dd'; ctx.fillRect(lx+3,ty+3,W-6,H-6);

  // バルコニー（2列×6フロア）
  const units=2, uw=(W-8)/units, floors=6, fh=(H-8)/floors;
  for(let f=0;f<floors;f++){
    const fy=ty+4+f*fh;
    for(let u=0;u<units;u++){
      const ux=lx+4+u*uw;
      ctx.fillStyle='rgba(180,170,200,0.45)'; ctx.fillRect(ux,fy,uw-3,3);
      ctx.fillStyle=col.win; ctx.fillRect(ux+2,fy+4,uw-7,fh-8);
      ctx.fillStyle='rgba(255,255,255,0.2)'; ctx.fillRect(ux+3,fy+5,Math.floor((uw-7)*0.6),3);
    }
    if(f>0){ ctx.strokeStyle=col.div; ctx.lineWidth=0.4;
      ctx.beginPath(); ctx.moveTo(lx+3,fy); ctx.lineTo(lx+W-3,fy); ctx.stroke(); }
  }
  // 中央廊下
  ctx.fillStyle=col.div+'aa'; ctx.fillRect(lx+W/2-3,ty+4,5,H-8);

  // 1F駐車場エリア（下1フロア分を暗く）
  ctx.fillStyle='rgba(0,0,0,0.18)'; ctx.fillRect(lx+3,ty+H-fh,W-6,fh-3);
  ctx.fillStyle='rgba(100,110,100,0.6)';
  ctx.fillRect(lx+5,ty+H-fh+3,W/2-8,fh-8);
  ctx.fillRect(lx+W/2+3,ty+H-fh+3,W/2-8,fh-8);

  ctx.strokeStyle='#a89868'; ctx.lineWidth=0.5; ctx.strokeRect(lx,ty,W,H);
  ctx.restore();
}

// ===== 庭あり住宅（上空俯瞰）描画関数 =====
// 敷地: 36×36px（2×2マス）= グリッド最小単位の4マス分
// 屋根: 22×18px, 駐車: 20×10px（50%確率）, 庭木: 半径3〜4px
function drawHouseSparse(n){
  const S = 36;
  const lx = n.x - S/2;
  const ty = n.y - S/2;
  const roofColors = [
    {main:'#c0392b', dark:'#7d1f14', line:'#a02418'},
    {main:'#5d7a8a', dark:'#2a4050', line:'#3d5a6a'},
    {main:'#8B6914', dark:'#4a3008', line:'#5a3f0a'},
    {main:'#7a7a7a', dark:'#3a3a3a', line:'#5a5a5a'},
  ];
  const rc = roofColors[(n.houseRoofColor||0) % 4];
  // 敷地36×36内パターン（屋根22×18, 駐車20×10）
  const patterns = [
    // A: 屋根右上・駐車左下・庭木左上
    {bx:13, by:2,  bw:22, bh:18, park:{x:1,  y:25, w:20, h:10}, trees:[{x:5,y:6,r:4}]},
    // B: 屋根左上・駐車右下・庭木右上
    {bx:1,  by:2,  bw:22, bh:18, park:{x:15, y:25, w:20, h:10}, trees:[{x:30,y:6,r:4}]},
    // C: 屋根中央・駐車なし・庭木両下
    {bx:7,  by:2,  bw:22, bh:18, park:null,                      trees:[{x:4,y:28,r:4},{x:30,y:28,r:3}]},
    // D: 屋根右下・駐車左上・庭木右上
    {bx:13, by:16, bw:22, bh:18, park:{x:1,  y:2,  w:20, h:10}, trees:[{x:30,y:4,r:3}]},
    // E: 屋根左下・駐車右上・庭木左上
    {bx:1,  by:16, bw:22, bh:18, park:{x:15, y:2,  w:20, h:10}, trees:[{x:5,y:4,r:3}]},
  ];
  const pat = patterns[(n.housePattern||0) % 5];
  ctx.save();
  // 1. 芝生
  ctx.fillStyle = n.houseGardenColor || '#7ab040';
  ctx.fillRect(lx, ty, S, S);
  // 2. 駐車スペース（20×10px）
  if(pat.park){
    const px=lx+pat.park.x, py=ty+pat.park.y;
    ctx.fillStyle='#c8c2b8'; ctx.fillRect(px,py,20,10);
    ctx.strokeStyle='#a8a298'; ctx.lineWidth=0.4; ctx.strokeRect(px,py,20,10);
    // 実際に駐車中の車を描画（parkedCarsがあればそちらを優先、なければhasCar）
    const parked = n.parkedCars && n.parkedCars.length > 0;
    const showCar = parked || n.hasCar;
    const carCol = parked && n.parkedCars[0].img ? null : (n.parkedCars&&n.parkedCars[0]?.color||n.carColor||'#4a7ab0');
    if(showCar){
      if(parked && n.parkedCars[0].img && n.parkedCars[0].img.complete){
        ctx.drawImage(n.parkedCars[0].img, px+1, py+1, 18, 8);
      } else {
        ctx.fillStyle = carCol || '#4a7ab0';
        ctx.fillRect(px+1,py+1,18,8);
        ctx.strokeStyle='rgba(0,0,0,0.2)'; ctx.lineWidth=0.3; ctx.strokeRect(px+1,py+1,18,8);
      }
      ctx.fillStyle='rgba(200,230,255,0.75)'; ctx.fillRect(px+2,py+2,13,3);
    }
  }
  // 3. 屋根（22×18px）
  const bx=lx+pat.bx, by2=ty+pat.by, bw=pat.bw, bh=pat.bh;
  ctx.fillStyle=rc.main; ctx.fillRect(bx,by2,bw,bh);
  ctx.fillStyle=rc.dark; ctx.fillRect(bx,by2,bw,2); // 棟帯
  ctx.strokeStyle=rc.dark; ctx.lineWidth=0.8;
  ctx.beginPath(); ctx.moveTo(bx+bw/2,by2); ctx.lineTo(bx+bw/2,by2+bh); ctx.stroke(); // 棟
  ctx.strokeStyle=rc.line; ctx.lineWidth=0.5;
  for(let ry=by2+5; ry<by2+bh; ry+=4){
    ctx.beginPath(); ctx.moveTo(bx+1,ry); ctx.lineTo(bx+bw-1,ry); ctx.stroke();
  }
  ctx.strokeStyle=rc.dark; ctx.lineWidth=0.4; ctx.strokeRect(bx,by2,bw,bh);
  // 4. 庭木
  for(const t of pat.trees){
    ctx.fillStyle='#2d7225'; ctx.beginPath(); ctx.arc(lx+t.x,ty+t.y,t.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#4a9e3a'; ctx.beginPath(); ctx.arc(lx+t.x-1,ty+t.y-1,t.r-1,0,Math.PI*2); ctx.fill();
  }
  // 5. 敷地境界
  ctx.strokeStyle='#a89868'; ctx.lineWidth=0.4; ctx.strokeRect(lx,ty,S,S);
  ctx.restore();
}

function isCrossingBlocked(x, y){
  for(const rw of railways){
    for(const cn of rw.crossings){
      if(cn.isOverpass) continue; // 立体交差は遮断しない
      if(!cn.crossingOpen){
        // 踏切ノード付近にいる車は停止
        if(Math.hypot(x-cn.x, y-cn.y) < 40) return true;
      }
    }
  }
  return false;
}


function toggleHeatmap(){
  showHeatmap = !showHeatmap;
  const btn = document.getElementById('btnHeatmap');
  btn.style.background = showHeatmap ? '#5a2a00' : '#333';
  btn.style.color = showHeatmap ? '#ffb060' : '#ccc';
  btn.style.border = showHeatmap ? '1px solid #ff8020' : '1px solid #555';
}

function drawHeatmap(){
  if(!showHeatmap || cars.length === 0) return;
  // 各エッジの密度（車台数/エッジ長）をヒートマップで描画
  ctx.save();
  for(const e of edges){
    if(e.type === 'roundabout') continue;
    const totalCars = e.laneCars.reduce((s,arr)=>s+arr.length,0);
    if(totalCars === 0) continue;
    const density = Math.min(1, totalCars / Math.max(1, e.length / 40));
    // 密度に応じて色を決定: 低→黄、高→赤
    const r = Math.round(255);
    const g = Math.round(255 * (1 - density));
    const b = 0;
    const roadW = e.lanes * LANE_W;
    const dx = e.to.x - e.from.x, dy = e.to.y - e.from.y;
    const len = Math.hypot(dx, dy);
    if(len < 1) continue;
    const angle = Math.atan2(dy, dx);
    ctx.save();
    ctx.globalAlpha = 0.38 * density + 0.1;
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.translate(e.from.x, e.from.y);
    ctx.rotate(angle);
    ctx.fillRect(0, -roadW, len, roadW);
    ctx.restore();
  }
  ctx.restore();
}

// ===== メインループ =====
// 事故発生タイマー（平均120秒に1回 = 7200フレーム）
let nextAccidentIn = 3600 + Math.floor(Math.random()*3600);
// ゴースト車サニタイザーカウンター（60フレームに1回実行）
let ghostSanitizerTimer = 0;

// 全 laneCars から alive=false の残留車を強制パージする
function purgeGhostCars(){
  for(const e of edges){
    if(!e.laneCars) continue;
    for(let li=0; li<e.laneCars.length; li++){
      const arr = e.laneCars[li];
      for(let ci=arr.length-1; ci>=0; ci--){
        if(!arr[ci].alive) arr.splice(ci,1);
      }
    }
  }
}

function loop(){
  // 一時停止中は描画のみ
  if(!gamePaused){
    for(let _spd=0; _spd<gameSpeed; _spd++){
      updateTime();
      nodes.forEach(n=>n.update());
      nextAccidentIn--;
      if(nextAccidentIn<=0 && cars.length>3){
        triggerAccident();
        nextAccidentIn=3600+Math.floor(Math.random()*3600);
      }
      updateAccidents();
      for(const c of cars) c.update();
      for(let i=cars.length-1;i>=0;i--) if(!cars[i].alive) cars.splice(i,1);
    }
    // 60フレームに1回ゴースト車を強制パージ
    ghostSanitizerTimer++;
    if(ghostSanitizerTimer >= 60){
      ghostSanitizerTimer = 0;
      purgeGhostCars();
    }
    // 鉄道システム更新
    if(railways.length > 0) updateRailways();
  }
  ctx.clearRect(0,0,1000,700);
  drawTerrain();
  drawRivers();
  // 線路タイル・駅は道路より下に描画
  if(railways.length > 0) drawRailways(false);
  edges.filter(e=>e.type!=="main" && e.type!=="asym").forEach(e=>drawRoad(e));
  edges.filter(e=>e.type==="asym").forEach(e=>drawRoad(e));
  edges.filter(e=>e.type==="main").forEach(e=>drawRoad(e));
  drawIntersectionPads();
  // 踏切・電車は道路より上に描画
  if(railways.length > 0) drawRailways(true);
  drawHeatmap();
  drawDirectionSigns();
  let jam=0;
  for(const c of cars){ c.draw(); if(c.wait>60) jam++; }
  drawAccidents();
  drawReverseHighlight();
  nodes.forEach(n=>n.draw());
  drawExitNumbers();
  drawDebugGrid();

  // ===== 夜間演出 =====
  if(nightAlpha > 0.01){
    ctx.save();

    // 案①: 暗色オーバーレイ（青みがかった暗さ）
    ctx.fillStyle = `rgba(5, 8, 25, ${nightAlpha})`;
    ctx.fillRect(0, 0, 1000, 700);

    // 案②: 信号機のある交差点周辺に光のハロー
    if(nightAlpha > 0.1){
      for(const n of nodes){
        if(!n.hasSignal || !n.isRealCross || n.external) continue;
        const r = 55 + 15 * nightAlpha; // 夜が深いほど光が際立つ
        const alpha = nightAlpha * 0.35;
        const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r);
        grd.addColorStop(0, `rgba(255, 200, 100, ${alpha})`);
        grd.addColorStop(0.4, `rgba(255, 180, 60, ${alpha * 0.4})`);
        grd.addColorStop(1,   `rgba(0, 0, 0, 0)`);
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
        ctx.fill();
      }

      // ガソリンスタンドも明るく（24時間営業）
      for(const n of nodes){
        if(n.houseType !== 'gasStation') continue;
        const r = 50;
        const alpha = nightAlpha * 0.28;
        const grd = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, r);
        grd.addColorStop(0, `rgba(240, 220, 140, ${alpha})`);
        grd.addColorStop(1, `rgba(0, 0, 0, 0)`);
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.restore();
  }
  // 一時停止インジケーター
  if(gamePaused){
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.35)';
    ctx.fillRect(0,0,1000,700);
    ctx.fillStyle='rgba(255,255,255,0.9)';
    ctx.font='bold 48px sans-serif';
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('⏸ PAUSED',500,350);
    ctx.restore();
  }
  document.getElementById("jam").textContent=jam;
  updateScore(jam);
  requestAnimationFrame(loop);
}

// ===== 画像ロード =====
function waitForImages(imgs,cb){
  let rem=imgs.length; if(rem===0){cb();return;}
  let done=false;
  const tick=()=>{ if(--rem<=0&&!done){done=true;cb();} };
  for(const img of imgs){ if(img.complete) tick(); else{ img.onload=tick; img.onerror=tick; } }
}
const allImgs=[roadImg,onewayImg,asymImg,asymClosedImg,parkImg,parkingImg,parkHImg,parkingMidImg,parkingBkImg,riverImg,...groundImgs,sigGreenImg,sigRedImg,kousatenImg,roundaboutImg,...Object.values(signImgs),policeImg,...carImgs,...bikeImgs,...houseImgs,...companyImgs,railHImg,railVImg,railSWImg,stationImg,fumikiriImg,trainHImg,trainVImg];
waitForImages(allImgs,()=>{ generateCity(); loop(); console.log("✅ v22 起動"); });
setTimeout(()=>{ if(!timeCounter){ generateCity(); loop(); console.warn("⚠️ フォールバック"); } },5000);
</script>
