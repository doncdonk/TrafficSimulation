    // ===== 上外側（y=0〜72）: ビル・マンション =====
    // 幹線上 y=108 から上36px = y<=72 が安全
    // 右oneway x=684縦がy=108まで → x=630〜738は上外側でも注意
    // building中心y=27(54px高さ), mansionH中心y=27, mansionV中心y=54(108px)→はみ出るのでbuildingのみ
    [
      // 左エリア（x=0〜160）
      [36,  36, 'building', 0],
      [108, 36, 'building', 1],
      // 中左（x=252〜468）
      [270, 27, 'mansionH', 0],
      [396, 27, 'mansionH', 1],
      [324, 54, 'building', 2],
      // 中右（x=540〜630）
      [558, 27, 'mansionH', 2],
      [558, 54, 'building', 0],  // 下段
      // 右エリア（x=720〜954） ※x=684縦onewayを避ける
      [756, 36, 'building', 1],
      [846, 36, 'mansionH', 3],
      [936, 36, 'building', 2],
    ].forEach(([hx,hy,type,color])=>{
      // 右oneway縦(x=684)上部を避ける
      if(hx >= 630 && hx <= 738) return;
      const n=_mkB(hx,hy,type,color);
      connectParkingToNearestEdge(n);
    });

    // ===== 下外側（y=576〜700）: ビル・マンション =====
    // 幹線下 y=540 から下36px = y>=576 が安全
    // n9(324,540)・n5(504,540)・n13(882,540) 周辺は交差点なので避ける
    // 下外側建物: 幹線下y=540、道路幅36px → 建物上端はy=576以降が安全
    // building(54px高): 中心y=603以上（上端y=576）
    // mansionH(54px高): 中心y=603以上
    // mansionV(108px高): 中心y=630以上（上端y=576）
    [
      // 左エリア
      [54,  603, 'building', 0],
      [126, 630, 'mansionV', 1],
      [54,  657, 'building', 2],
      // 中左（x=162〜270）
      [198, 603, 'mansionH', 0],
      [198, 666, 'building', 1],
      // 中央左（x=378〜468）※n9(324)から離す
      [414, 603, 'building', 3],
      [414, 657, 'mansionH', 2],
      // 中央右（x=540〜630）※n5(504)から離す
      [594, 630, 'mansionV', 0],
      [594, 666, 'building', 1],
      // 右エリア（x=720〜828）※n13(882)から離す
      [738, 603, 'mansionH', 3],
      [738, 657, 'building', 0],
      [810, 603, 'building', 2],
      // 最右（x=936〜）
      [936, 603, 'building', 1],
      [936, 657, 'mansionH', 3],
    ].forEach(([hx,hy,type,color])=>{
      const n=_mkB(hx,hy,type,color);
      connectParkingToNearestEdge(n);
    });

  }
};

// エッジを「A → アクセスノード → B」に分割し、アクセスノードから駐車場へ branch エッジを追加
function connectParkingToNearestEdge(pNode){
  const px = pNode.x, py = pNode.y;
  let bestEdge = null, bestT = 0, bestDist = Infinity;

  for(const e of edges){
    // 既に駐車場に接続しているエッジはスキップ
    if(e.from === pNode || e.to === pNode) continue;
    // 外部ノードそのものから伸びる短いエッジはスキップ
    // ただし外部ノードに接続しているエッジでも中間点への接続は許可
    if(e.from.external && e.to.external) continue;
    // parking/bend ノードへのエッジはスキップ
    if(e.to.type === 'parking' || e.from.type === 'parking') continue;
    if(e.to.type === 'bend'    || e.from.type === 'bend')    continue;
    // 環状路エッジはスキップ
    if(e.type === 'roundabout') continue;

    const dx = e.to.x - e.from.x, dy = e.to.y - e.from.y;
    const len = Math.hypot(dx, dy);
    if(len < 60) continue;

    // 垂足パラメータ t (0〜1)
    const t = Math.max(0, Math.min(1,
      ((px - e.from.x)*dx + (py - e.from.y)*dy) / (len*len)
    ));
    // 端点に近すぎる場合はスキップ（交差点付近を避ける）
    if(t < 0.15 || t > 0.85) continue;

    const fx = e.from.x + dx*t, fy = e.from.y + dy*t;
    const dist = Math.hypot(px - fx, py - fy);

    if(dist < bestDist){
      bestDist = dist;
      bestEdge = e;
      bestT = t;
    }
  }

  if(!bestEdge || bestDist > 250) return false; // 近くに道路なし

  // 住宅ノード（houseType='sparse'）は近すぎる接続のみ許可
  if(pNode.houseType === 'sparse' && bestDist > 60) return false;

  const e = bestEdge;
  const dx = e.to.x - e.from.x, dy = e.to.y - e.from.y;
  const len = Math.hypot(dx, dy);

  // アクセスノード（垂足）
  const ax = Math.round(e.from.x + dx*bestT);
  const ay = Math.round(e.from.y + dy*bestT);
  const accessNode = new Node(ax, ay, 'cross', false, null);
  accessNode.hasSignal   = false;
  accessNode.isRealCross = false;
  accessNode.isParkingAccess = true; // マーカー（描画スキップ用）
  nodes.push(accessNode);

  // 対向エッジを探す（往復エッジを同時に分割）
  const pairEdge = edges.find(e2 =>
    e2.from === e.to && e2.to === e.from && e2.type === e.type
  );

  // 元エッジを A→access に短縮
  const origTo = e.to;
  e.to     = accessNode;
  e.length = Math.hypot(accessNode.x-e.from.x, accessNode.y-e.from.y);
  e.laneCars = Array.from({length:e.lanes},()=>[]);

  // access→B の新エッジ（元エッジの車線数・非対称フラグを引き継ぐ）
  const newEdgeAB = new Edge(accessNode, origTo, e.type);
  newEdgeAB.lanes    = e.lanes;
  newEdgeAB.asymWide = e.asymWide;
  newEdgeAB.laneCars = Array.from({length: e.lanes}, () => []);
  edges.push(newEdgeAB);

  // 対向エッジも分割
  if(pairEdge){
    const origFrom = pairEdge.from; // = e.to = origTo
    pairEdge.from  = accessNode;
    pairEdge.length = Math.hypot(pairEdge.to.x-accessNode.x, pairEdge.to.y-accessNode.y);
    pairEdge.laneCars = Array.from({length:pairEdge.lanes},()=>[]);
    const newEdgeBA = new Edge(origFrom, accessNode, pairEdge.type);
    newEdgeBA.lanes    = pairEdge.lanes;
    newEdgeBA.asymWide = pairEdge.asymWide;
    newEdgeBA.laneCars = Array.from({length: pairEdge.lanes}, () => []);
    edges.push(newEdgeBA);
  }

  // アクセスノード ↔ 駐車場
  edges.push(new Edge(accessNode, pNode, 'branch'));
  edges.push(new Edge(pNode, accessNode, 'branch'));

  return true;
}

// ===== 都市生成 =====
// 設計:
//  1. 幹線(arterial): 水平2〜3本 + 垂直2〜3本をランダムに配置
//     → 交点を自動計算しノード化 → 多様な構造パターン
//  2. 支線(branch): 主要道路の「途中」からT字路として枝分かれ
//     → エッジを中間ノードで分割し、そこから垂直方向に伸ばす
//  全エッジは一方通行ペア(A→B と B→A)。

function generateCity(){
  nodes.length=0; edges.length=0; cars.length=0;
  accidents.length=0; policeCars.length=0; score=0; budget=0; scoreBonus=1.0; bonusStreak=0; accidentCount=0;
  selectedCar=null; closeCarProfile();
  railways.length=0; // 鉄道データリセット

  // ================================================================
  // ヘルパー
  // ================================================================
  function mkNode(x,y,type="cross",ext=false,img=null){
    const n=new Node(x,y,type,ext,img); nodes.push(n); return n;
  }

  // 重複チェックなしで直接エッジを追加するヘルパー（固定マップ用）
  function addEdgeDirect(a, b, type){
    edges.push(new Edge(a, b, type));
  }

  // 非対称道路追加ヘルパー
  // addAsymEdge(a, b, flip=false):
  //   flip=false: a→b=2車線(上り広), b→a=1車線(下り狭)
  //   flip=true:  a→b=1車線(下り狭), b→a=2車線(上り広)
  function addAsymEdge(a, b, flip=false){
    const wideFrom  = flip ? b : a;
    const wideTo    = flip ? a : b;
    const narrowFrom= flip ? a : b;
    const narrowTo  = flip ? b : a;

    const wideEdge   = new Edge(wideFrom, wideTo, "asym");
    wideEdge.asymWide = true;
    wideEdge.lanes    = 2;
    wideEdge.laneCars = [[], []];

    const narrowEdge  = new Edge(narrowFrom, narrowTo, "asym");
    narrowEdge.asymWide = false;
    narrowEdge.lanes    = 1;
    narrowEdge.laneCars = [[]];

    edges.push(wideEdge);
    edges.push(narrowEdge);
  }

  // ================================================================
  // 固定マップ分岐
  // ================================================================
  if(currentMapId && FIXED_MAPS[currentMapId]){
    const mapDef = FIXED_MAPS[currentMapId];
    mapDef.build(mkNode, addEdgeDirect, addAsymEdge);

    // isRealCross は generateCity末尾で統一計算

    // 初期封鎖を適用（マップ定義の _blockPairs）
    if(mapDef._blockPairs){
      for(const {a, b} of mapDef._blockPairs){
        for(const e of edges){
          if((e.from===a && e.to===b) || (e.from===b && e.to===a)){
            e.blocked = true;
          }
        }
      }
    }

    // 地形テクスチャを生成（以降のランダム生成と共通処理）
    // → generateCity の残りを実行せず、地形のみ生成
    {
      const W = 1000, H = 700, TILE = 128;
      terrainCanvas = document.createElement("canvas");
      terrainCanvas.width = W; terrainCanvas.height = H;
      const tCtx = terrainCanvas.getContext("2d");
      const sx = Math.random()*500, sy = Math.random()*500;
      function noiseV(x,y){
        const x0=x+sx, y0=y+sy;
        let v=0;
        v+=Math.sin(x0*0.008+y0*0.005)*0.40;
        v+=Math.sin(x0*0.022+y0*0.019+1.3)*0.25;
        v+=Math.sin(x0*0.055+y0*0.048+2.7)*0.15;
        v+=Math.sin((x0+y0)*0.015+0.8)*0.12;
        v+=Math.sin(x0*0.11+y0*0.09+4.1)*0.08;
        return (v+1)*0.5;
      }
      function tileIdx(t){ return t<0.30?2:t<0.55?1:0; }
      const tilesReady = groundImgs.every(i=>i.complete&&i.naturalWidth>0);
      if(tilesReady){
        for(let cy2=0;cy2<H;cy2+=TILE) for(let cx2=0;cx2<W;cx2+=TILE){
          const t=noiseV(cx2+TILE/2,cy2+TILE/2);
          tCtx.drawImage(groundImgs[tileIdx(t)],cx2,cy2,TILE,TILE);
        }
      } else {
        tCtx.fillStyle="#5a7a40"; tCtx.fillRect(0,0,W,H);
      }
    }
    return;
  }

  // 点pから線分(a,b)への距離
  function ptSegDist(p,a,b){
    const dx=b.x-a.x,dy=b.y-a.y,l2=dx*dx+dy*dy;
    if(l2===0) return Math.hypot(p.x-a.x,p.y-a.y);
    const t=Math.max(0,Math.min(1,((p.x-a.x)*dx+(p.y-a.y)*dy)/l2));
    return Math.hypot(p.x-a.x-dx*t, p.y-a.y-dy*t);
  }

  // エッジ追加の厳密チェック
  // ① 最小長  ② 重複  ③ 交差（segmentsCross）  ④ T字接触防止  ⑤ 近接平行
  function canAdd(a,b,minLen=50){
    if(Math.hypot(b.x-a.x,b.y-a.y)<minLen) return false;
    // ② 重複チェック
    if(edges.some(e=>(e.from===a&&e.to===b)||(e.from===b&&e.to===a))) return false;
    const vx=b.x-a.x,vy=b.y-a.y,vl=Math.hypot(vx,vy);
    for(const e of edges){
      // ③ 厳密な交差チェック（X字・T字の中間交差を全て検出）
      if(segmentsCross(a,b,e.from,e.to)) return false;

      // ④ T字接触防止:
      //    新エッジの端点 a,b が既存エッジ e の「中間部分」に近い場合はNG
      //    （端点=ノードが道路の途中に刺さるのを防ぐ）
      //    ただし a,b が e.from または e.to そのものである場合はOK（接続点）
      if(a!==e.from && a!==e.to){
        if(ptSegDist(a,e.from,e.to) < 12) return false;
      }
      if(b!==e.from && b!==e.to){
        if(ptSegDist(b,e.from,e.to) < 12) return false;
      }

      // ⑤ 近接平行チェック（重複道路防止）
      const ex=e.to.x-e.from.x,ey=e.to.y-e.from.y,el=Math.hypot(ex,ey);
      if(el<1) continue;
      if(Math.abs((vx*ex+vy*ey)/(vl*el))<0.90) continue;
      const near=[0.25,0.5,0.75].some(t=>{
        const px=a.x+vx*t, py=a.y+vy*t;
        return ptSegDist({x:px,y:py},e.from,e.to)<38;
      });
      if(near) return false;
    }
    return true;
  }

  function addPair(a,b,type){
    if(!canAdd(a,b)) return false;
    edges.push(new Edge(a,b,type));
    edges.push(new Edge(b,a,type));
    return true;
  }

  // 2線分の交点を計算（平行・非交差時はnull）
  function segIntersection(p1,p2,p3,p4){
    const d1x=p2.x-p1.x, d1y=p2.y-p1.y;
    const d2x=p4.x-p3.x, d2y=p4.y-p3.y;
    const cross=d1x*d2y-d1y*d2x;
    if(Math.abs(cross)<0.001) return null;
    const t=((p3.x-p1.x)*d2y-(p3.y-p1.y)*d2x)/cross;
    const u=((p3.x-p1.x)*d1y-(p3.y-p1.y)*d1x)/cross;
    if(t<0.05||t>0.95||u<0.05||u>0.95) return null; // 端点付近は除外
    return {x:p1.x+d1x*t, y:p1.y+d1y*t};
  }

  // ================================================================
  // 1. 幹線(arterial) — 水平線・垂直線をランダム配置して交点ノード生成
  // ================================================================

  // 水平線: 2〜3本、y座標をランダムに選択
  const numH=2+Math.floor(Math.random()*2);  // 2〜3本
  const numV=2+Math.floor(Math.random()*2);  // 2〜3本

  // y座標: 150〜560の範囲で均等分割＋ランダムジッター
  function randLines(count, lo, hi){
    const step=(hi-lo)/(count+1);
    return Array.from({length:count},(_,i)=>
      Math.round(lo+step*(i+1)+(Math.random()-0.5)*step*0.4)
    );
  }
  const hYs=randLines(numH,130,570);  // 水平線のy座標
  const vXs=randLines(numV,180,820);  // 垂直線のx座標

  // 各水平・垂直線を「無限長の直線」として定義し、後で交点でノード化
  // 水平線: y=hY, x: 0→1000
  // 垂直線: x=vX, y: 0→700

  // ----------------------------------------------------------------
  // 外部ノード生成パターンをランダムに決定
  //  パターンA（40%）: 全幹線に外部ノードあり（従来通り）
  //  パターンB（35%）: 一部の幹線端のみ外部ノード（間引き）
  //  パターンC（25%）: 外部ノードが非常に少ない（内側の都市のみ）
  // ----------------------------------------------------------------
  const extPattern = Math.random();
  // 各端点に外部ノードを作るか決める関数
  function shouldMakeExt(patternRoll){
    if(patternRoll < 0.40) return true;          // パターンA: 全部作る
    if(patternRoll < 0.75) return Math.random() < 0.55; // パターンB: 55%で作る
    return Math.random() < 0.25;                 // パターンC: 25%で作る
  }

  // 外部ノードを幹線の端点として作成（パターンに応じて間引き）
  const hExtL=hYs.map(y=> shouldMakeExt(extPattern) ? mkNode(0,   y,"cross",true) : null);
  const hExtR=hYs.map(y=> shouldMakeExt(extPattern) ? mkNode(1000,y,"cross",true) : null);
  const vExtT=vXs.map(x=> shouldMakeExt(extPattern) ? mkNode(x,  0,"cross",true) : null);
  const vExtB=vXs.map(x=> shouldMakeExt(extPattern) ? mkNode(x,700,"cross",true) : null);

  // 交点ノードマトリクス: crossPt[hi][vi] = {x,y} の交差点ノード
  const crossPt=hYs.map((hy,hi)=>
    vXs.map((vx,vi)=>mkNode(vx,hy,"cross"))
  );

  // 水平幹線を各行で左端→交点→…→右端とエッジで繋ぐ（外部ノードがnullなら端点まで延ばさない）
  for(let hi=0;hi<numH;hi++){
    const row=[hExtL[hi], ...crossPt[hi], hExtR[hi]].filter(n=>n!==null);
    for(let i=0;i<row.length-1;i++) addPair(row[i],row[i+1],"main");
  }
  // 垂直幹線を各列で上端→交点→…→下端とエッジで繋ぐ
  for(let vi=0;vi<numV;vi++){
    const col=[vExtT[vi], ...crossPt.map(r=>r[vi]), vExtB[vi]].filter(n=>n!==null);
    for(let i=0;i<col.length-1;i++) addPair(col[i],col[i+1],"main");
  }

  // ================================================================
  // 2. 支線(branch) — 2種類の生成方法
  //
  //  [A] 道路の途中からT字路: 主要道路エッジを中間ノードで分割し、
  //      そこから垂直方向に支線を伸ばす
  //  [B] 既存交差点から斜め方向に伸ばし、別の交差点へ接続
  // ================================================================

  // [A] 道路途中からT字路支線
  // 既存mainエッジのうち十分長いものを選び、中間に分岐点を作る
  function splitEdgeAndBranch(){
    // 現時点のmainエッジのスナップショット（分割中にedgesが変化するため）
    const mainEdges=edges.filter(e=>e.type==="main"&&e.length>180);
    // ランダムに数本選んで試みる
    const targets=[...mainEdges].sort(()=>Math.random()-0.5).slice(0,4);

    for(const e of targets){
      if(Math.random()<0.4) continue; // 60%の確率で試みる

      // 中間点を25〜75%の範囲でランダム選択
      const t=0.3+Math.random()*0.4;
      const mx=e.from.x+(e.to.x-e.from.x)*t;
      const my=e.from.y+(e.to.y-e.from.y)*t;

      // 近すぎる既存ノードがあればスキップ
      if(nodes.some(n=>n.type==="cross"&&Math.hypot(n.x-mx,n.y-my)<80)) continue;

      // エッジの方向ベクトル
      const vx=e.to.x-e.from.x, vy=e.to.y-e.from.y;
      const len=Math.hypot(vx,vy);
      // 垂直方向（左右どちらか）
      const side=Math.random()<0.5?1:-1;
      const nx=-vy/len*side, ny=vx/len*side;
      const bLen=100+Math.random()*80;
      const tx=Math.max(30,Math.min(970, mx+nx*bLen));
      const ty=Math.max(30,Math.min(670, my+ny*bLen));

      // 分岐点ノードを作成
      const mid=mkNode(mx,my,"cross");

      // 元のエッジを分割: from→mid と mid→to
      // 元エッジを削除して2分割
      const iFrom=edges.indexOf(e);
      const ePair=edges.find(ep=>ep.from===e.to&&ep.to===e.from);
      if(iFrom===-1) { nodes.splice(nodes.indexOf(mid),1); continue; }
      edges.splice(iFrom,1);
      if(ePair) edges.splice(edges.indexOf(ePair),1);

      // 分割エッジ追加（canAdd不要: 元エッジの部分なので交差なし）
      edges.push(new Edge(e.from,mid,"main"));
      edges.push(new Edge(mid,e.from,"main"));
      edges.push(new Edge(mid,e.to,"main"));
      edges.push(new Edge(e.to,mid,"main"));

      // 支線末端ノードを作成して追加
      const term=mkNode(tx,ty,"cross");
      if(canAdd(mid,term,60)){
        edges.push(new Edge(mid,term,"branch"));
        edges.push(new Edge(term,mid,"branch"));
        // 末端からさらに近隣交差点へ接続できれば通り抜けに
        const allC=nodes.filter(n=>n.type==="cross"&&!n.external&&n!==mid&&n!==term);
        const nb=allC
          .filter(m=>Math.hypot(m.x-tx,m.y-ty)<200)
          .sort((a,b)=>Math.hypot(a.x-tx,a.y-ty)-Math.hypot(b.x-tx,b.y-ty))[0];
        if(nb&&canAdd(term,nb,50)) addPair(term,nb,"branch");
      } else {
        nodes.splice(nodes.indexOf(term),1);
      }
    }
  }
  splitEdgeAndBranch();

  // ================================================================
  // 2c. L字（直角曲がり）道路の生成
  // ================================================================
  // branch/oneway エッジを「独立した新エッジ2本」に置き換えて真のL字を形成。
  // 元エッジ: from ---直進--- bend(直角点) ---90度折れ--- to
  // ノードは移動せず、新しい中間ノード(bend node)を追加する。
  // これにより他エッジへの影響をゼロにする。
  {
    const processed = new Set();
    const toProcess = edges.filter(e=>(e.type==="branch")&&!e.from.external&&!e.to.external);
    for(const e of toProcess){
      if(processed.has(e)) continue;
      // 逆方向の対となるエッジを探す
      const pair = edges.find(e2=>e2.from===e.to&&e2.to===e.from&&e2.type===e.type);
      if(!pair || processed.has(pair)) continue;
      if(Math.random()>0.50) continue;

      const dx=e.to.x-e.from.x, dy=e.to.y-e.from.y;
      const len=Math.hypot(dx,dy);
      if(len<100) continue;
      const ux=dx/len, uy=dy/len;
      const nx=-uy, ny=ux;

      // bend ノードの位置: fromから進行方向 40〜55% の地点
      const splitT = 0.40 + Math.random()*0.15;
      const bendX = Math.round(e.from.x + ux*len*splitT);
      const bendY = Math.round(e.from.y + uy*len*splitT);

      // to は元の位置のまま。bend→to は自動的に斜め方向になるが、
      // それではL字にならない。bend→toが垂直になるよう to を移動するが
      // to ノードが他エッジと共有されている場合は新ノードを作る。
      const toShared = edges.some(e2=>
        e2!==e && e2!==pair &&
        (e2.from===e.to||e2.to===e.to)
      );

      // 垂直距離: bend から to までの元の残り長さ × 垂直成分
      const side = Math.random()<0.5?1:-1;
      const remLen = len*(1-splitT);
      const newToX = Math.round(bendX + nx*side*remLen);
      const newToY = Math.round(bendY + ny*side*remLen);
      if(newToX<20||newToX>980||newToY<20||newToY>680) continue;
      if(bendX<20||bendX>980||bendY<20||bendY>680) continue;

      // 中間ノード(bend)と新しい終端ノード(newTo)を作成
      const bendNode = new Node(bendX, bendY, "bend", false, null);
      bendNode.hasSignal = false;
      bendNode.external = false; // bendは交差点ではない（単なる曲がり点）
      // newTo は元のtoノードを再利用するか新規作成
      let newToNode;
      if(toShared){
        newToNode = new Node(newToX, newToY, "cross", false, null);
        newToNode.hasSignal = false;
        newToNode.external = true; // 末端
      } else {
        // to ノードの座標を更新
        e.to.x = newToX; e.to.y = newToY;
        newToNode = e.to;
      }
      nodes.push(bendNode);
      if(toShared) nodes.push(newToNode);

      // 元エッジを from→bend に短縮
      e.to = bendNode;
      e.length = Math.hypot(bendNode.x-e.from.x, bendNode.y-e.from.y);
      e.laneCars = Array.from({length:e.lanes},()=>[]);

      // bend→newTo の新エッジ追加
      const seg2 = new Edge(bendNode, newToNode, e.type);
      edges.push(seg2);

      // pair（逆方向）も同様に
      pair.from = newToNode; pair.to = bendNode;
      pair.length = Math.hypot(bendNode.x-newToNode.x, bendNode.y-newToNode.y);
      pair.laneCars = Array.from({length:pair.lanes},()=>[]);

      const seg2r = new Edge(bendNode, e.from, e.type);
      edges.push(seg2r);

      processed.add(e); processed.add(pair);
    }
  }

  // ================================================================
  // 2d. main 道路の L字カーブ生成
  // ================================================================
  // 内部交差点間の main エッジを一部 L字カーブに変換する
  // 対象: 両端が内部交差点（外部ノードなし）の main エッジ
  {
    const processed2 = new Set();
    const mainCandidates = edges.filter(e =>
      e.type === "main" &&
      !e.from.external && !e.to.external &&
      !e.from.isRoundabout && !e.to.isRoundabout &&
      e.length > 140
    );
    for(const e of mainCandidates){
      if(processed2.has(e)) continue;
      const pair = edges.find(e2 => e2.from===e.to && e2.to===e.from && e2.type==="main");
      if(!pair || processed2.has(pair)) continue;
      if(Math.random() > 0.15) continue; // 15% の確率

      const dx=e.to.x-e.from.x, dy=e.to.y-e.from.y;
      const len=Math.hypot(dx,dy);
      const ux=dx/len, uy=dy/len;
      const nx=-uy, ny=ux;

      const splitT = 0.35 + Math.random()*0.3; // 35〜65% の地点
      const bendX = Math.round(e.from.x + ux*len*splitT);
      const bendY = Math.round(e.from.y + uy*len*splitT);
      if(bendX<40||bendX>960||bendY<40||bendY>660) continue;

      const side = Math.random()<0.5?1:-1;
      const remLen = len*(1-splitT);
      const newToX = Math.round(bendX + nx*side*remLen);
      const newToY = Math.round(bendY + ny*side*remLen);
      if(newToX<40||newToX>960||newToY<40||newToY>660) continue;

      // 新 To ノードが他の交差点に近すぎる場合はスキップ
      if(nodes.some(n => n !== e.to && Math.hypot(n.x-newToX,n.y-newToY) < 50)) continue;

      const bendNode = new Node(bendX, bendY, "bend", false, null);
      bendNode.hasSignal = false;
      bendNode.external = false;

      // To ノードの座標を更新（他エッジと共有されていなければ移動）
      const toSharedM = edges.some(e2 =>
        e2!==e && e2!==pair && (e2.from===e.to || e2.to===e.to)
      );
      if(toSharedM) continue; // 共有交差点の分割はサイン欠落を招くためスキップ
      let newToNodeM;
      {
        e.to.x = newToX; e.to.y = newToY;
        newToNodeM = e.to;
      }
      nodes.push(bendNode);

      // エッジを分割
      e.to = bendNode;
      e.length = Math.hypot(bendNode.x-e.from.x, bendNode.y-e.from.y);
      e.laneCars = Array.from({length:e.lanes},()=>[]);

      edges.push(new Edge(bendNode, newToNodeM, "main"));

      pair.from = newToNodeM; pair.to = bendNode;
      pair.length = Math.hypot(bendNode.x-newToNodeM.x, bendNode.y-newToNodeM.y);
      pair.laneCars = Array.from({length:pair.lanes},()=>[]);

      edges.push(new Edge(bendNode, e.from, "main"));

      processed2.add(e); processed2.add(pair);
    }
  }

  // [B] 既存交差点から支線を伸ばす（splitEdgeAndBranch後に再取得して新ノードも含める）
  const allCross=nodes.filter(n=>n.type==="cross"&&!n.external);

  function existingAngles(node){
    return edges.filter(e=>e.from===node)
      .map(e=>Math.atan2(e.to.y-node.y,e.to.x-node.x));
  }
  function angleFarEnough(angle,existing){
    return existing.every(a=>{
      let d=Math.abs(angle-a)%(2*Math.PI);
      if(d>Math.PI) d=2*Math.PI-d;
      return d>Math.PI/12; // 15度以上離れていれば可
    });
  }

  for(const n of allCross){
    if(edges.some(e=>e.from===n&&e.type==="branch")) continue;
    if(Math.random()<0.5) continue; // 50%で試みる
    const exAngles=existingAngles(n);
    const bLen=100+Math.random()*100;
    const angles=Array.from({length:16},(_,i)=>i*(Math.PI/8)).sort(()=>Math.random()-0.5);

    for(const angle of angles){
      if(!angleFarEnough(angle,exAngles)) continue;
      const tx=Math.max(30,Math.min(970, n.x+Math.cos(angle)*bLen));
      const ty=Math.max(30,Math.min(670, n.y+Math.sin(angle)*bLen));

      // 近くに既存交差点があればそこへ接続（通り抜け）
      const snap=allCross.find(m=>m!==n&&Math.hypot(m.x-tx,m.y-ty)<80);
      if(snap){ if(addPair(n,snap,"branch")) break; continue; }

      const term=mkNode(tx,ty,"cross");
      if(canAdd(n,term,80)){
        edges.push(new Edge(n,term,"branch"));
        edges.push(new Edge(term,n,"branch"));
        // 末端からも別交差点へ繋げるか試みる
        const nb=allCross
          .filter(m=>m!==n&&Math.hypot(m.x-tx,m.y-ty)<200)
          .sort((a,b)=>Math.hypot(a.x-tx,a.y-ty)-Math.hypot(b.x-tx,b.y-ty))[0];
        if(nb&&canAdd(term,nb,50)) addPair(term,nb,"branch");
        break;
      } else {
        nodes.splice(nodes.indexOf(term),1);
      }
    }
  }

  // ================================================================
  // [C] 支線の一部をonewayに変換（約30%）
  // onewayは逆向きエッジを持たない真の一方通行。
  // 対象: branch型エッジのペアのうち、ランダムに片方を削除してonewayにする
  {
    // branchエッジをペア単位で取得（A→B と B→A の組）
    const branchPairs=new Set();
    const toRemove=[];
    for(const e of edges){
      if(e.type!=="branch") continue;
      const key=[e.from,e.to].map(n=>nodes.indexOf(n)).sort().join("-");
      if(branchPairs.has(key)) continue;
      branchPairs.add(key);
      // 外部ノードが絡むエッジはoneway不可（進入・退出が壊れる）
      if(e.from.external||e.to.external) continue;
      if(Math.random()<0.30){
        // このペアをonewayに: 逆向きエッジを削除して残りをonewayに変更
        const rev=edges.find(r=>r.from===e.to&&r.to===e.from&&r.type==="branch");
        if(rev){
          toRemove.push(rev);
          e.type="oneway";
        }
      }
    }
    for(const r of toRemove) edges.splice(edges.indexOf(r),1);
  }

  // ================================================================
  // [D] 外部ノードへの追加接続
  // ----------------------------------------------------------------
  // 外部ノードごとに、以下の3タイプをバランスよく追加接続する。
  //  - "main"  (2車線双方向): 35%
  //  - "branch"(1車線双方向): 35%
  //  - "oneway"(1車線一方向): 30%
  //
  // ★ バグ修正ポイント:
  //   外部ノード(x=0, x=1000, y=0, y=700)から内部交差点への線分は
  //   必ず既存幹線エッジと交差するため、通常の canAdd() では全て弾かれる。
  //   → 外部ノード専用の canAddExt() を使用:
  //      重複チェックのみ行い、交差・近接平行チェックは省略する。
  //      ただし同一方向に既にエッジがある場合（並走）はスキップ。
  {
    // 外部ノード専用チェック
    // 外部→内部の線分は幹線を「通過」するため通常のlinesIntersectでは全て弾かれる。
    // ただし幹線の端点(外部ノード)と共有接続する交差はOKとし、
    // それ以外の「真の交差」（支線や他の幹線との中間クロス）は弾く。
    function canAddExt(a, b, minLen=50){
      if(Math.hypot(b.x-a.x,b.y-a.y) < minLen) return false;
      if(edges.some(e=>(e.from===a&&e.to===b)||(e.from===b&&e.to===a))) return false;
      const vx=b.x-a.x, vy=b.y-a.y, vl=Math.hypot(vx,vy);
      for(const e of edges){
        // 外部ノードを共有している幹線との交差はOK（端点接続のため）
        // ただし支線・onewayとの交差はNG
        const shareNode = (a===e.from||a===e.to||b===e.from||b===e.to);
        if(!shareNode){
          // 真の交差チェック（segmentsCross使用）
          if(segmentsCross(a,b,e.from,e.to)) return false;
          // T字接触防止: bが既存エッジの中間に刺さるのを防ぐ
          if(b!==e.from && b!==e.to && ptSegDist(b,e.from,e.to)<12) return false;
        }
        // 近接平行チェック（並走防止）
        const ex=e.to.x-e.from.x, ey=e.to.y-e.from.y, el=Math.hypot(ex,ey);
        if(el<1) continue;
        if(Math.abs((vx*ex+vy*ey)/(vl*el)) < 0.90) continue;
        const near=[0.4,0.6].some(t=>{
          const px=a.x+vx*t, py=a.y+vy*t;
          return ptSegDist({x:px,y:py},e.from,e.to)<30;
        });
        if(near) return false;
      }
      return true;
    }

    function addPairExt(a, b, type){
      if(!canAddExt(a,b)) return false;
      edges.push(new Edge(a,b,type));
      edges.push(new Edge(b,a,type));
      return true;
    }

    const extList = nodes.filter(n => n.external && n.type === "cross");
    const intList = nodes.filter(n => n.type === "cross" && !n.external);

    for(const ext of extList){
      if(Math.random() < 0.40) continue; // 60%の外部ノードで試みる

      // 接続タイプをランダムに決定
      const roll = Math.random();
      const connType = roll < 0.35 ? "main" : roll < 0.70 ? "branch" : "oneway";

      // 既にmainで繋がっている交差点を除いた候補を距離順で並べる
      const cands = intList
        .filter(n => {
          const d = Math.hypot(n.x-ext.x, n.y-ext.y);
          return d > 60 && d < 450;
        })
        .filter(n => {
          // 既に何らかのエッジで繋がっているペアはスキップ
          return !edges.some(e =>
            (e.from===ext && e.to===n) || (e.from===n && e.to===ext)
          );
        })
        .sort((a,b) => Math.hypot(a.x-ext.x,a.y-ext.y) - Math.hypot(b.x-ext.x,b.y-ext.y));

      for(const cand of cands){
        if(connType === "oneway"){
          if(!canAddExt(ext, cand, 50)) continue;
          if(Math.random() < 0.5){
            edges.push(new Edge(ext,  cand, "oneway")); // 進入
          } else {
            edges.push(new Edge(cand, ext,  "oneway")); // 退出
          }
          break;
        } else {
          if(addPairExt(ext, cand, connType)) break;
        }
      }
    }
  }

  // ================================================================
  // 3. 建物配置 → 川生成後に実行（川の上禁止チェックのため後回し）
  // ================================================================
  // placeBuildingsAfterRivers() を川生成後に呼ぶ

  // ================================================================
  // 3b. 駐車場の配置
  // ================================================================
  // 配置ルール:
  //  - 全エッジ(main含む)から候補を選ぶが、道路幅を正確に考慮した距離でオフセット
  //  - 駐車場中心(30px半径)が全既存エッジから確実に離れているか検証してから配置
  //  - 既存ノード・他の駐車場とも十分な間隔を確保
  {
    const parkingCount = 3 + Math.floor(Math.random()*4); // 3〜6 箇所
    const placedParking = [];
    const MIN_PARKING_DIST = 90; // 駐車場同士・既存ノードとの最小距離
    const PARKING_RADIUS = 35;   // 駐車場の表示半径（60px画像の半分+余白）

    // 全エッジから候補を取る（mainも含める）
    const candEdges = [...edges].sort(()=>Math.random()-0.5);

    for(const e of candEdges){
      if(placedParking.length >= parkingCount) break;
      if(e.from.external || e.to.external) continue; // 外部ノード接続エッジは除外

      const vx = e.to.x-e.from.x, vy = e.to.y-e.from.y;
      const len = Math.hypot(vx,vy);
      if(len < 80) continue;

      const t = 0.25 + Math.random()*0.5;  // 中間部分から選ぶ
      const nx = -vy/len, ny = vx/len;     // エッジの法線（左右方向）

      // 道路幅の半分 + 駐車場半径 + 余白 = 確実に道路に重ならない距離
      const roadHalfW = e.lanes * LANE_W / 2;
      const safeOffset = roadHalfW + PARKING_RADIUS + 12; // 余白12px

      for(const side of [1, -1]){
        const px = e.from.x + vx*t + nx*side*safeOffset;
        const py = e.from.y + vy*t + ny*side*safeOffset;

        // 画面外チェック
        if(px < 40 || px > 960 || py < 40 || py > 660) continue;

        // 全エッジとの距離チェック（道路幅+駐車場半径+余白より近ければNG）
        const onRoad = edges.some(e2 => {
          const evx=e2.to.x-e2.from.x, evy=e2.to.y-e2.from.y, el=Math.hypot(evx,evy);
          if(el<1) return false;
          const et=Math.max(0,Math.min(1,((px-e2.from.x)*evx+(py-e2.from.y)*evy)/(el*el)));
          const dist=Math.hypot(px-(e2.from.x+evx*et), py-(e2.from.y+evy*et));
          return dist < e2.lanes*LANE_W/2 + PARKING_RADIUS + 8;
        });
        if(onRoad) continue;

        // 既存ノード（全タイプ）との距離チェック
        const tooClose = nodes.some(n => Math.hypot(n.x-px,n.y-py) < MIN_PARKING_DIST);
        if(tooClose) continue;

        // 配置確定
        const pNode = new Node(px, py, "parking", true, parkingImg);
        nodes.push(pNode);
        placedParking.push(pNode);

        // 最も近い道路エッジに沿道直接接続（エッジを分割してアクセスノードを作成）
        connectParkingToNearestEdge(pNode);
        break; // このエッジでは1つ配置したら次のエッジへ
      }
    }
  }

  // ================================================================
  // 4. 外部ノード孤立チェック
  // ================================================================
  const extNodes=nodes.filter(n=>n.external);
  const intNodes=nodes.filter(n=>n.type==="cross"&&!n.external);
  for(const ext of extNodes){
    const hasOut=edges.some(e=>e.from===ext);
    const hasIn =edges.some(e=>e.to===ext);
    if(!hasOut||!hasIn){
      // 距離順に候補を試し、交差しない最初のノードへ接続
      const sorted=intNodes.slice()
        .sort((a,b)=>Math.hypot(a.x-ext.x,a.y-ext.y)-Math.hypot(b.x-ext.x,b.y-ext.y));
      for(const nearest of sorted){
        // crossesAnyEdge で交差チェック（外部ノード接続は交差許容のため canAddExt 相当）
        const share=(a,b)=>edges.some(e=>(e.from===a&&e.to===b)||(e.from===b&&e.to===a));
        if(!hasOut && !share(ext,nearest)){
          // 共有端点以外との交差がなければ追加
          let ok=true;
          for(const e of edges){
            if(e.from===ext||e.to===ext||e.from===nearest||e.to===nearest) continue;
            if(segmentsCross(ext,nearest,e.from,e.to)){ok=false;break;}
          }
          if(ok) edges.push(new Edge(ext,nearest,"branch"));
        }
        if(!hasIn && !share(nearest,ext)){
          let ok=true;
          for(const e of edges){
            if(e.from===ext||e.to===ext||e.from===nearest||e.to===nearest) continue;
            if(segmentsCross(nearest,ext,e.from,e.to)){ok=false;break;}
          }
          if(ok) edges.push(new Edge(nearest,ext,"branch"));
        }
        if(edges.some(e=>e.from===ext) && edges.some(e=>e.to===ext)) break;
      }
    }
  }

  // ================================================================
  // 4a. 信号機の初期配置（内部交差点の40%のみ信号あり）
  // ================================================================
  {
    const intCross = nodes.filter(n => n.type==="cross" && !n.external);
    for(const n of intCross){
      n.hasSignal = Math.random() < 0.40;
    }
  }

  // ================================================================
  // 4b. 生成後クロス検証 — 安全網
  // ----------------------------------------------------------------
  // 全エッジペアを走査して交差しているエッジを検出・削除する。
  // どのパス（splitEdge / [B] / [D] / 孤立補完）で追加されたエッジでも
  // 交差が残っていれば除去される。
  // 幹線同士の「設計上の交差点」は共有ノードで接続されているため除外される。
  {
    let removed;
    let pass = 0;
    do {
      removed = 0;
      pass++;
      // 削除候補を収集（削除中に配列を変えないようスナップショット）
      const snap = [...edges];
      const toDelete = new Set();
      for(let i = 0; i < snap.length; i++){
        if(toDelete.has(snap[i])) continue;
        for(let j = i+1; j < snap.length; j++){
          if(toDelete.has(snap[j])) continue;
          const e1 = snap[i], e2 = snap[j];
          if(!segmentsCross(e1.from,e1.to,e2.from,e2.to)) continue;
          // 交差しているペアを発見 → branch/oneway 側を削除（幹線は残す）
          // 両方 main の場合は後から追加された方（インデックスが大きい方）を削除
          if(e1.type==="main" && e2.type==="main"){
            toDelete.add(snap[j]); // j側を削除
          } else if(e2.type==="main"){
            toDelete.add(e1); // main でない e1 を削除
          } else {
            toDelete.add(e2); // main でない e2 を削除（または両方 branch→ j側）
          }
        }
      }
      // 削除
      for(const e of toDelete){
        const idx = edges.indexOf(e);
        if(idx !== -1){ edges.splice(idx,1); removed++; }
      }
    } while(removed > 0 && pass < 10); // 最大10パスまで繰り返す
    if(pass > 1) console.log(`[CrossFix] ${pass}パスで交差エッジを除去`);
  }

  // ================================================================
  // 5. 川の生成
  // ================================================================
  // hYs（水平幹線のy座標）の隣接ペア間、および
  // vXs（垂直幹線のx座標）の隣接ペア間を調べ、
  // 「川として適切な条件」を満たす場合に確率で川を生成する。
  //
  // 川として適切な条件:
  //  ① 2本の平行幹線の間隔が 80〜280px（広すぎず狭すぎず）
  //  ② その帯状領域の内部に交差点ノードが存在しない
  //     （道路が通っていない空白地帯）
  //  ③ 確率 60% で出現

  rivers.length = 0; // リセット

  const ROAD_HALF = 20; // 道路端からの余白（川は道路に被らない）
  const RIVER_MIN = 80, RIVER_MAX = 280;

  // 水平幹線ペア → 横向き川
  for(let i=0; i<hYs.length-1; i++){
    const y1 = hYs[i]   + ROAD_HALF;
    const y2 = hYs[i+1] - ROAD_HALF;
    const gap = y2 - y1;
    if(gap < RIVER_MIN || gap > RIVER_MAX) continue;
    // 帯の内部に交差点が入り込んでいないか
    const blocked = nodes.some(n =>
      n.type === "cross" && !n.external &&
      n.y > hYs[i] + ROAD_HALF && n.y < hYs[i+1] - ROAD_HALF
    );
    if(blocked) continue;
    if(Math.random() < 0.85){
      rivers.push({ type:"h", y1, y2 });
    }
  }

  // 垂直幹線ペア → 縦向き川
  for(let i=0; i<vXs.length-1; i++){
    const x1 = vXs[i]   + ROAD_HALF;
    const x2 = vXs[i+1] - ROAD_HALF;
    const gap = x2 - x1;
    if(gap < RIVER_MIN || gap > RIVER_MAX) continue;
    const blocked = nodes.some(n =>
      n.type === "cross" && !n.external &&
      n.x > vXs[i] + ROAD_HALF && n.x < vXs[i+1] - ROAD_HALF
    );
    if(blocked) continue;
    if(Math.random() < 0.85){
      rivers.push({ type:"v", x1, x2 });
    }
  }

  // isRealCross は generateCity末尾で統一計算

  // ================================================================
  // 5b. 建物・公園・会社（川生成後に配置 → 川の上禁止チェックが有効）
  // ================================================================
  {
    const BLDG_HALF = 26;
    function bldgClearOfRoads(bx, by){
      for(const e2 of edges){
        const evx=e2.to.x-e2.from.x, evy=e2.to.y-e2.from.y;
        const el=Math.hypot(evx,evy);
        if(el<1) continue;
        const et=Math.max(0,Math.min(1,((bx-e2.from.x)*evx+(by-e2.from.y)*evy)/(el*el)));
        const dist=Math.hypot(bx-(e2.from.x+evx*et), by-(e2.from.y+evy*et));
        if(dist < e2.lanes*LANE_W + BLDG_HALF) return false;
      }
      return true;
    }
    function isOnRiver(bx, by){
      return rivers.some(r => {
        if(r.type==="h") return by > r.y1-10 && by < r.y2+10;
        if(r.type==="v") return bx > r.x1-10 && bx < r.x2+10;
        return false;
      });
    }

    // 道路沿いに建物を規則的に並べる（住宅地ブロック）
    // 各エッジに対して両側に複数候補を試みる
    // bend ノードがある場合は2セグメントそれぞれに配置する
    const drawnPairs=new Set();
    const SPACING = 44; // 建物の間隔(px)

    // 1本のセグメント(from→to)沿いに建物を配置するヘルパー
    function placeBuildingsAlongSegment(fx, fy, tx, ty, laneCount){
      const vx=tx-fx, vy=ty-fy;
      const len=Math.sqrt(vx*vx+vy*vy);
      if(len < 60) return;
      const ux=vx/len, uy=vy/len;
      const nx=-uy, ny=ux;
      const roadOff = laneCount*LANE_W + BLDG_HALF + 6;
      for(const side of [1,-1]){
        const startT = 12;
        for(let d=startT; d<len-startT; d+=SPACING){
          const bx = fx + ux*d + nx*side*roadOff;
          const by = fy + uy*d + ny*side*roadOff;
          if(bx<15||bx>985||by<15||by>685) continue;
          if(isOnRiver(bx,by)) continue;
          if(!bldgClearOfRoads(bx,by)) continue;
          const tooClose = nodes.some(n=>
            (n.type==="house"||n.type==="park"||n.type==="company"||n.type==="roundabout") &&
            Math.hypot(n.x-bx,n.y-by) < BLDG_HALF*1.8
          );
          if(tooClose) continue;
          const roll=Math.random();
          let type, img;
          if(roll<0.70){      type="house";   img=houseImgs[Math.floor(Math.random()*houseImgs.length)]; }
          else if(roll<0.88){ type="company"; img=companyImgs[Math.floor(Math.random()*companyImgs.length)]; }
          else{               type="park";    img=parkImg; }
          nodes.push(new Node(bx,by,type,false,img));
        }
      }
    }

    for(const e of edges){
      if(e.from.external || e.to.external) continue;
      const key=[e.from,e.to].map(n=>`${Math.round(n.x)},${Math.round(n.y)}`).sort().join("|");
      if(drawnPairs.has(key)) continue;
      drawnPairs.add(key);

      if(e.bendPoint){
        // L字エッジ: セグメント1(from→bend)とセグメント2(bend→to)に分けて配置
        placeBuildingsAlongSegment(
          e.from.x, e.from.y, e.bendPoint.x, e.bendPoint.y, e.lanes);
        placeBuildingsAlongSegment(
          e.bendPoint.x, e.bendPoint.y, e.to.x, e.to.y, e.lanes);
      } else {
        placeBuildingsAlongSegment(
          e.from.x, e.from.y, e.to.x, e.to.y, e.lanes);
      }
    }
  }

  // ================================================================
  // 6. 地形テクスチャ生成（sin合成ノイズ + タイル画像）
  // ================================================================
  // sin合成ノイズでセルごとに地形タイプを決定し、
  // ground_1(草地) / ground_2(砂地) / ground_3(土) の128×128pxタイルを貼る。
  // 画像未ロード時は従来の色塗りにフォールバック。
  // オフスクリーンCanvasに一括描画し、毎フレームは drawImage 1回のみ。
  {
    const W = 1000, H = 700;
    const TILE = 128; // タイル1枚のサイズ
    terrainCanvas = document.createElement("canvas");
    terrainCanvas.width  = W;
    terrainCanvas.height = H;
    const tCtx = terrainCanvas.getContext("2d");

    // ランダムシード値（リロードごとに異なる地形）
    const sx = Math.random() * 500;
    const sy = Math.random() * 500;

    // sin合成ノイズ（5オクターブ）→ 0〜1
    function noiseVal(x, y){
      const x0 = x + sx, y0 = y + sy;
      let v = 0;
      v += Math.sin(x0 * 0.008 + y0 * 0.005) * 0.40;
      v += Math.sin(x0 * 0.022 + y0 * 0.019 + 1.3) * 0.25;
      v += Math.sin(x0 * 0.055 + y0 * 0.048 + 2.7) * 0.15;
      v += Math.sin((x0 + y0) * 0.015 + 0.8) * 0.12;
      v += Math.sin(x0 * 0.11  + y0 * 0.09  + 4.1) * 0.08;
      return (v + 1) * 0.5; // 0〜1
    }

    // ノイズ値 → 地形タイプインデックス
    // 0: 草地(ground_1)  1: 砂地(ground_2)  2: 土(ground_3)
    // 自然な地形らしく: 草地が多め、砂地・土が点在
    function tileIndex(t){
      if(t < 0.30) return 2; // 土     (0〜0.30)
      if(t < 0.55) return 1; // 砂地   (0.30〜0.55)
      return 0;              // 草地   (0.55〜1.0)
    }

    // フォールバック用カラー（地形タイプ別）
    const fallbackColors = [
      [75, 120, 65],   // 草地: 緑
      [145, 120, 75],  // 砂地: 黄褐色
      [110, 85, 60],   // 土: 茶色
    ];

    // 画像が全て読み込まれているか確認
    const tilesReady = groundImgs.every(img => img.complete && img.naturalWidth > 0);

    if(tilesReady){
      // ===== タイル画像モード =====
      // セルごとにノイズ値を計算してタイルを選択し貼り付ける
      // セル中心座標でノイズをサンプリング（タイル境界のムラを防ぐ）
      for(let cy = 0; cy < H; cy += TILE){
        for(let cx = 0; cx < W; cx += TILE){
          // セル中心でノイズをサンプリング
          const t = noiseVal(cx + TILE/2, cy + TILE/2);
          const idx = tileIndex(t);
          const img = groundImgs[idx];
          // セルが画面端で128px未満になる場合も対応（clipで超過部分を切る）
          tCtx.save();
          tCtx.beginPath();
          tCtx.rect(cx, cy, Math.min(TILE, W-cx), Math.min(TILE, H-cy));
          tCtx.clip();
          tCtx.drawImage(img, cx, cy, TILE, TILE);
          tCtx.restore();
        }
      }

      // タイル境界を自然に見せるため、境界付近にソフトブレンドを施す
      // 隣接セルの地形タイプが異なる境界にのみ、細いグラデーション帯を描く
      tCtx.globalAlpha = 0.35;
      for(let cy = 0; cy < H; cy += TILE){
        for(let cx = 0; cx < W; cx += TILE){
          const t  = noiseVal(cx + TILE/2, cy + TILE/2);
          const tR = noiseVal(cx + TILE*1.5, cy + TILE/2);
          const tB = noiseVal(cx + TILE/2, cy + TILE*1.5);
          const idxC = tileIndex(t);
          // 右隣と異なるタイプなら右端にブレンド帯
          if(cx + TILE < W && tileIndex(tR) !== idxC){
            const g = tCtx.createLinearGradient(cx+TILE-16, 0, cx+TILE+16, 0);
            const [r1,g1,b1] = fallbackColors[idxC];
            const [r2,g2,b2] = fallbackColors[tileIndex(tR)];
            g.addColorStop(0, `rgba(${r1},${g1},${b1},0)`);
            g.addColorStop(0.5, `rgba(${Math.round((r1+r2)/2)},${Math.round((g1+g2)/2)},${Math.round((b1+b2)/2)},0.6)`);
            g.addColorStop(1, `rgba(${r2},${g2},${b2},0)`);
            tCtx.fillStyle = g;
            tCtx.fillRect(cx+TILE-16, cy, 32, TILE);
          }
          // 下隣と異なるタイプなら下端にブレンド帯
          if(cy + TILE < H && tileIndex(tB) !== idxC){
            const g = tCtx.createLinearGradient(0, cy+TILE-16, 0, cy+TILE+16);
            const [r1,g1,b1] = fallbackColors[idxC];
            const [r2,g2,b2] = fallbackColors[tileIndex(tB)];
            g.addColorStop(0, `rgba(${r1},${g1},${b1},0)`);
            g.addColorStop(0.5, `rgba(${Math.round((r1+r2)/2)},${Math.round((g1+g2)/2)},${Math.round((b1+b2)/2)},0.6)`);
            g.addColorStop(1, `rgba(${r2},${g2},${b2},0)`);
            tCtx.fillStyle = g;
            tCtx.fillRect(cx, cy+TILE-16, TILE, 32);
          }
        }
      }
      tCtx.globalAlpha = 1.0;

    } else {
      // ===== フォールバック: 従来の色塗りモード =====
      const imageData = tCtx.createImageData(W, H);
      const data = imageData.data;
      for(let y = 0; y < H; y++){
        for(let x = 0; x < W; x++){
          const t = noiseVal(x, y);
          const [r, g, b] = fallbackColors[tileIndex(t)];
          const i = (y * W + x) * 4;
          data[i]=r; data[i+1]=g; data[i+2]=b; data[i+3]=255;
        }
      }
      tCtx.putImageData(imageData, 0, 0);
    }
  }

  // ================================================================
  // isRealCross 最終計算（全connectParkingToNearestEdge完了後）
  // accessNodeによるエッジ分割を反映するため、ここで計算する
  // ================================================================
  for(const n of nodes){
    if(n.type !== "cross"){ n.isRealCross = false; continue; }
    if(n.isParkingAccess || n.isRaEntry || n.isRaExit || n.isRoundabout || n.external || n.isCrossing){
      n.isRealCross = false; continue;
    }
    // parking本体からのエッジは除外、isParkingAccessは除外しない
    const inEdges = edges.filter(e2 =>
      e2.to === n &&
      e2.from.type !== 'parking' &&
      e2.type !== 'roundabout'
    );
    n.isRealCross = inEdges.length >= 2;
  }
}


// ===== スコア更新 =====
function updateScore(jamCount){
  // 渋滞ゼロなら連続ボーナス蓄積、渋滞があればリセット
  if(jamCount === 0){
    bonusStreak++;
    // 60フレーム（約1秒）ごとにボーナス倍率UP（最大8.0）
    if(bonusStreak % 60 === 0) scoreBonus = Math.min(8.0, scoreBonus + 0.2);
  } else {
    bonusStreak = 0;
    scoreBonus  = Math.max(1.0, scoreBonus - 0.02);
    // 渋滞中ペナルティ: 渋滞1台につき毎フレーム-0.2点
    score = Math.max(0, score - jamCount * 0.2);
  }
  // 事故中は追加ペナルティ
  if(accidents.length > 0){
    score = Math.max(0, score - accidents.length * 1);
  }
  // ランク判定
  let rank="D", cls="rank-D";
  if(score>80000){rank="S";cls="rank-S";}
  else if(score>35000){rank="A";cls="rank-A";}
  else if(score>12000){rank="B";cls="rank-B";}
  else if(score>3000) {rank="C";cls="rank-C";}
  const rv=document.getElementById("rankVal");
  rv.textContent=rank; rv.className=cls;
  budget = score; // 予算はスコアと同値
  document.getElementById("scoreVal").textContent=Math.floor(score).toLocaleString();
  document.getElementById("budgetVal").textContent=Math.floor(budget).toLocaleString()+'pt';
  document.getElementById("bonusVal").textContent=`BONUS ×${scoreBonus.toFixed(1)}`;
  document.getElementById("accVal").textContent=accidentCount;

  // ===== 出口番号の割り当て =====
  // external=trueのノードをx座標→y座標順に並べて番号を振る
  const exitNodes = nodes.filter(n => n.external && n.type === "cross");
  exitNodes.sort((a,b) => a.x===b.x ? a.y-b.y : a.x-b.x);
  exitNodes.forEach((n,i) => { n.exitNumber = i+1; });
}

// ===== 事故発生 =====
function triggerAccident(){
  // 走行中の車があるエッジからランダムに選ぶ
  const activeEdges=edges.filter(e=>e.laneCars.some(lc=>lc.length>0));
  if(activeEdges.length===0) return;
  const e=activeEdges[Math.floor(Math.random()*activeEdges.length)];
  const t=0.3+Math.random()*0.4;
  const ax=e.from.x+(e.to.x-e.from.x)*t;
  const ay=e.from.y+(e.to.y-e.from.y)*t;
  // 同じ場所に重複しないようにチェック
  if(accidents.some(a=>Math.hypot(a.x-ax,a.y-ay)<60)) return;
  const acc = {x:ax,y:ay,edge:e,timer:ACCIDENT_DURATION,maxTimer:ACCIDENT_DURATION,blink:0,policeArrived:false};
  accidents.push(acc);
  accidentCount++;
  score=Math.max(0,score-500);

  // パトカーを事故現場へ派遣
  dispatchPolice(acc);
}

// ===== パトカー派遣 =====
function dispatchPolice(acc){
  // 外部ノードの中でルートが見つかるものから派遣
  const extNodes = nodes.filter(n => n.external && n.type === "cross");
  if(extNodes.length === 0) return;

  // 事故に最も近い cross ノードを目的地にする
  const intNodes = nodes.filter(n => n.type==="cross" && !n.external);
  if(intNodes.length === 0) return;
  const dest = intNodes.sort((a,b) =>
    Math.hypot(a.x-acc.x,a.y-acc.y) - Math.hypot(b.x-acc.x,b.y-acc.y)
  )[0];

  // シャッフルした外部ノードからBFSでルートを探す
  const shuffled = [...extNodes].sort(() => Math.random()-0.5);
  for(const start of shuffled){
    const route = generateRouteBFS(start, [dest]);
    if(route && route.length > 0){
      const policeCar = new Car(route, policeImg);
      policeCar.isPolice = true;
      policeCar.targetAcc = acc;
      policeCar.maxSpeed = 2.5; // パトカーは少し速い
      cars.push(policeCar);
      policeCars.push({car: policeCar, acc});
      return;
    }
  }
}

// ===== 事故更新 =====
function updateAccidents(){
  for(let i=accidents.length-1;i>=0;i--){
    const a=accidents[i];
    a.timer--;
    a.blink++;
    if(a.timer<=0){
      accidents.splice(i,1);
      // 対応するパトカーを消す（タイムアウト解消）
      for(const pc of policeCars){
        if(pc.acc===a) pc.car.die();
      }
    }
  }
  // 死亡パトカーをリストから除去
  for(let i=policeCars.length-1;i>=0;i--){
    if(!policeCars[i].car.alive) policeCars.splice(i,1);
  }
}

// ===== 事故描画 =====
function drawAccidents(){
  for(const a of accidents){
    const progress=a.timer/a.maxTimer; // 1.0→0.0
    // 残り時間が少ないほど点滅速度UP
    const blinkRate=Math.max(4,Math.floor(progress*20));
    const visible=(Math.floor(a.blink/blinkRate)%2===0);
    if(!visible) continue;

    ctx.save();
    ctx.translate(a.x,a.y);

    // 事故の影響圏を半透明赤で表示
    const alpha=0.15+0.15*Math.sin(a.blink*0.1);
    ctx.beginPath();
    ctx.arc(0,0,ACCIDENT_SLOWZONE,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,60,0,${alpha})`;
    ctx.fill();

    // 事故アイコン（炎+警告）
    const sz=22+Math.sin(a.blink*0.15)*3; // 脈動
    ctx.font=`${sz}px serif`;
    ctx.textAlign="center";
    ctx.textBaseline="middle";
    ctx.fillText("💥",0,0);
    // パトカー到着済み表示
    if(a.policeArrived){
      ctx.font="14px serif";
      ctx.fillText("🚔",-18,-18);
    }

    // 残り時間バー
    const barW=40, barH=5;
    ctx.fillStyle="rgba(0,0,0,0.6)";
    ctx.fillRect(-barW/2,14,barW,barH);
    ctx.fillStyle=progress>0.5?"#f0a000":"#ff3030";
    ctx.fillRect(-barW/2,14,barW*progress,barH);

    ctx.restore();
  }
}


// ================================================================
// ===== ラウンドアバウト設置・解除（案B: エッジ構造変更）=====
// ================================================================
function installRoundabout(node){
  if(node.isRoundabout) return;

  // rbHalfSize / rbRingRadius を先に確定
  // drawIntersectionPads より前に設定が必要
  const connEdges0 = edges.filter(e => e.from===node || e.to===node);
  const maxW0 = connEdges0.length > 0
    ? Math.max(...connEdges0.map(e => e.lanes * LANE_W))
    : LANE_W * 2;
  const padSize0 = maxW0 * 2;
  const rbSize = Math.max(padSize0 * 1.7, 90);
  node.rbHalfSize   = rbSize / 2;
  node.rbRingRadius = rbSize * 0.32;
  node.isRoundabout = true;
  node.hasSignal    = false;

  const r = node.rbRingRadius;

  // 既存の接続エッジを取得（スナップショット）
  const inEdges  = edges.filter(e => e.to   === node); // A → node
  const outEdges = edges.filter(e => e.from === node); // node → B

  // 入口点・出口点ノードを生成
  // 入口点: node から「入口エッジの方向」に r だけ離れた点
  // 出口点: node から「出口エッジの方向」に r だけ離れた点
  node.raEntryNodes = []; // {raNode, fromNode, origEdgeType, angle}
  node.raExitNodes  = []; // {raNode, toNode,   origEdgeType, angle}

  // 入口ノード作成（入口エッジごと）
  for(const e of inEdges){
    const dx = node.x - e.from.x, dy = node.y - e.from.y;
    const len = Math.hypot(dx, dy);
    if(len < 1) continue;
    const ux = dx/len, uy = dy/len; // node 方向の単位ベクトル
    // 入口点 = node から入口方向の逆（外側）に r だけ
    const ex = node.x - ux * r;
    const ey = node.y - uy * r;
    const entryNode = new Node(ex, ey, 'cross', false, null);
    entryNode.isRaEntry = true;
    entryNode.raNode    = node;
    entryNode.isRealCross = false;
    entryNode.hasSignal   = false;
    nodes.push(entryNode);

    // 元エッジを A → entryNode に置換（RA中心への不要な進入を防ぐ）
    e.to = entryNode;
    e.length = Math.hypot(entryNode.x-e.from.x, entryNode.y-e.from.y);
    e.laneCars = Array.from({length:e.lanes},()=>[]);

    node.raEntryNodes.push({ node: entryNode, from: e.from, type: e.type, ux, uy });
  }

  // 出口ノード作成（出口エッジごと）
  for(const e of outEdges){
    const dx = e.to.x - node.x, dy = e.to.y - node.y;
    const len = Math.hypot(dx, dy);
    if(len < 1) continue;
    const ux = dx/len, uy = dy/len; // 出口方向の単位ベクトル
    // 出口点 = node から出口方向に r だけ
    const ex = node.x + ux * r;
    const ey = node.y + uy * r;
    const exitNode = new Node(ex, ey, 'cross', false, null);
    exitNode.isRaExit = true;
    exitNode.raNode   = node;
    exitNode.isRealCross = false;
    exitNode.hasSignal   = false;
    nodes.push(exitNode);

    // 元エッジを exitNode → B に置換
    e.from = exitNode;
    e.length = Math.hypot(e.to.x-exitNode.x, e.to.y-exitNode.y);
    e.laneCars = Array.from({length:e.lanes},()=>[]);

    node.raExitNodes.push({ node: exitNode, to: e.to, type: e.type, ux, uy });
  }

  // 環状路エッジを生成: 全入口点 → 全出口点（同方向除く）
  node.raRingEdges = [];
  for(const en of node.raEntryNodes){
    for(const ex of node.raExitNodes){
      // 同方向チェック: 入口方向と出口方向がほぼ同じなら除外
      const dot = en.ux*ex.ux + en.uy*ex.uy;
      if(dot > 0.8) continue; // 同方向（そのまま直進）は環状路不要
      const re = new Edge(en.node, ex.node, 'roundabout');
      re.raNode = node; // この環状路エッジが属するRAノード
      edges.push(re);
      node.raRingEdges.push(re);
      re.computeRaLength(); // ベジェ弧長を計算してlengthに反映
    }
  }

  // 走行中の車で旧エッジ(to/from=node)を使っているものを終了
  for(const c of cars){
    if(!c.alive) continue;
    if(c.edge.to === node || c.edge.from === node){
      c.die(); // 構造変更で経路が壊れるので消す
    }
  }
}

function removeRoundabout(node){
  if(!node.isRoundabout) return;

  // 環状路エッジを削除
  if(node.raRingEdges){
    for(const e of node.raRingEdges){
      const idx = edges.indexOf(e);
      if(idx >= 0) edges.splice(idx, 1);
    }
  }

  // 入口エッジを A → node に戻す
  if(node.raEntryNodes){
    for(const en of node.raEntryNodes){
      // en.node (入口点) を to にしているエッジを探す
      for(const e of edges){
        if(e.to === en.node){
          e.to = node;
          e.length = Math.hypot(node.x-e.from.x, node.y-e.from.y);
          e.laneCars = Array.from({length:e.lanes},()=>[]);
        }
      }
      // 入口点ノードを削除
      const ni = nodes.indexOf(en.node);
      if(ni >= 0) nodes.splice(ni, 1);
    }
  }

  // 出口エッジを node → B に戻す
  if(node.raExitNodes){
    for(const ex of node.raExitNodes){
      for(const e of edges){
        if(e.from === ex.node){
          e.from = node;
          e.length = Math.hypot(e.to.x-node.x, e.to.y-node.y);
          e.laneCars = Array.from({length:e.lanes},()=>[]);
        }
      }
      const ni = nodes.indexOf(ex.node);
      if(ni >= 0) nodes.splice(ni, 1);
    }
  }

  // フラグリセット
  node.isRoundabout  = false;
  node.rbHalfSize    = null;
  node.rbRingRadius  = null;
  node.raEntryNodes  = null;
  node.raExitNodes   = null;
  node.raRingEdges   = null;

  // 走行中の車の経路をリセット
  for(const c of cars){
    if(!c.alive) continue;
    const usesRA = c.route.some(r => r.edge.raNode === node);
    if(usesRA) c.die();
  }
}

// ===== 緊急対応（クリックで事故を即時解消）=====
function clearAccident(){
  if(accidents.length===0){ alert("現在、事故は発生していません。"); return; }
  if(score<300){ alert("スコアが不足しています（300点必要）。"); return; }
  score-=300;
  const removed=accidents.splice(0,1)[0];
  // 対応パトカーも消す
  if(removed){
    for(const pc of policeCars){
      if(pc.acc===removed) pc.car.die();
    }
  }
}

// ===== Canvas クリックハンドラ =====
let _dbgMx = 0, _dbgMy = 0;
canvas.addEventListener("mousemove", ev=>{
  const r = canvas.getBoundingClientRect();
  _dbgMx = Math.round((ev.clientX - r.left) * canvas.width  / r.width);
  _dbgMy = Math.round((ev.clientY - r.top)  * canvas.height / r.height);
});

canvas.addEventListener("click", ev=>{
  const r=canvas.getBoundingClientRect();
  const scaleX = canvas.width  / r.width;
  const scaleY = canvas.height / r.height;
  const mx=(ev.clientX-r.left)*scaleX, my=(ev.clientY-r.top)*scaleY;

  // --- 信号設置/撤去モード: 交差点クリック ---
  if(operationMode==='install' || operationMode==='remove'){
    const node = nodes.find(n =>
      n.type==="cross" && !n.external && !n.isCrossing &&
      Math.abs(n.x-mx)<20 && Math.abs(n.y-my)<20
    );
    if(node){
      if(operationMode==='install'){
        if(node.hasSignal){ showToast('既に信号があります'); return; }
        if(budget < COST_INSTALL){ flashBudget(); return; }
        node.hasSignal=true;
        budget-=COST_INSTALL; score-=COST_INSTALL;
        showToast('🚦 信号を設置しました (-'+COST_INSTALL+'pt)');
      } else {
        if(!node.hasSignal){ showToast('信号がありません'); return; }
        if(budget < COST_REMOVE){ flashBudget(); return; }
        node.hasSignal=false;
        budget-=COST_REMOVE; score-=COST_REMOVE;
        showToast('🗑 信号を撤去しました (-'+COST_REMOVE+'pt)');
      }
      updateBudgetButtons();
    }
    return;
  }

  // --- ラウンドアバウト設置モード ---
  if(operationMode==='roundabout'){
    const node = nodes.find(n =>
      n.type==="cross" && !n.external && !n.isCrossing &&
      Math.abs(n.x-mx)<28 && Math.abs(n.y-my)<28
    );
    if(node){
      if(budget<COST_ROUNDABOUT){ flashBudget(); return; }
      if(!node.isRoundabout){
        installRoundabout(node);
      } else {
        removeRoundabout(node);
      }
      budget-=COST_ROUNDABOUT; score-=COST_ROUNDABOUT;
      showToast(node.isRoundabout
        ? '🔄 環状交差点を設置しました (-'+COST_ROUNDABOUT+'pt)'
        : '🔄 環状交差点を解除しました (-'+COST_ROUNDABOUT+'pt)');
      updateBudgetButtons();
    }
    return;
  }

  // --- 一方通行反転モード: エッジクリック ---
  if(operationMode==='reverse'){
    let bestEdge=null, bestDist=18;
    for(const e of edges){
      if(e.type!=='oneway') continue;
      const ex=e.to.x-e.from.x, ey=e.to.y-e.from.y, el=Math.hypot(ex,ey);
      if(el<1) continue;
      const t=Math.max(0,Math.min(1,((mx-e.from.x)*ex+(my-e.from.y)*ey)/(el*el)));
      const dist=Math.hypot(mx-(e.from.x+ex*t), my-(e.from.y+ey*t));
      if(dist<bestDist){ bestDist=dist; bestEdge=e; }
    }
    if(bestEdge){
      if(reverseHighlight===bestEdge){
        reverseOneway(bestEdge);
      } else {
        reverseHighlight=bestEdge;
        showToast('もう一度クリックで反転確定 (-'+COST_REVERSE+'pt)');
      }
    }
    return;
  }

  // --- サイン変更モード: 交差点手前のエッジをクリック ---
  if(operationMode==='signEdit'){
    // 交差点クリック → サイン設定パネルを表示
    // isParkingAccess・RA外縁・ラウンドアバウト は除外
    let bestNode=null, bestDist=28;
    for(const n of nodes){
      if(n.type !== "cross" || n.external) continue;
      if(n.isParkingAccess || n.isRaEntry || n.isRaExit) continue;
      if(n.isRoundabout) continue;
      const d = Math.hypot(mx-n.x, my-n.y);
      if(d < bestDist){ bestDist=d; bestNode=n; }
    }
    if(!bestNode){ signEditEdge=null; return; }
    signEditEdge = null; // エッジ選択は廃止
    openSignPanel(bestNode, ev.pageX, ev.pageY);
    return;
  }

  // --- 道路封鎖モード ---
  if(operationMode==='block' || operationMode==='unblock'){
    let bestEdge=null, bestDist=18;
    for(const e of edges){
      if(operationMode==='unblock' && !e.blocked) continue;
      const ex=e.to.x-e.from.x, ey=e.to.y-e.from.y, el=Math.hypot(ex,ey);
      if(el<1) continue;
      const t=Math.max(0,Math.min(1,((mx-e.from.x)*ex+(my-e.from.y)*ey)/(el*el)));
      const d=Math.hypot(mx-(e.from.x+ex*t),my-(e.from.y+ey*t));
      if(d<bestDist){ bestDist=d; bestEdge=e; }
    }
    if(bestEdge){
      // main 道路: 対となる逆方向エッジも同時に操作する
      // 逆方向ペア = from/to が入れ替わっている同一区間のエッジ
      const pairEdge = edges.find(e2 =>
        e2 !== bestEdge &&
        e2.from === bestEdge.to && e2.to === bestEdge.from
      );
      const targets = [bestEdge];
      if(pairEdge) targets.push(pairEdge);

      if(operationMode==='block'){
        if(budget<COST_BLOCK){ flashBudget(); return; }
        targets.forEach(e => {
          e.blocked = true;
          for(const c of cars) if(c.edge===e && !c.isPolice) c.wait=500;
        });
        budget-=COST_BLOCK; score-=COST_BLOCK;
        const laneMsg = pairEdge ? '（上下線）' : '';
        showToast('🚧 道路を封鎖しました'+laneMsg+' (-'+COST_BLOCK+'pt)');
      } else {
        if(budget<COST_UNBLOCK){ flashBudget(); return; }
        targets.forEach(e => { e.blocked = false; });
        budget-=COST_UNBLOCK; score-=COST_UNBLOCK;
        const laneMsg = pairEdge ? '（上下線）' : '';
        showToast('🔓 封鎖を解除しました'+laneMsg+' (-'+COST_UNBLOCK+'pt)');
      }
      updateBudgetButtons();
    }
    return;
  }

  // --- 立体交差モード: 踏切ノードをクリックでトグル ---
  if(operationMode==='overpass'){
    const crossingNode = nodes.find(n =>
      n.isCrossing && Math.hypot(n.x-mx, n.y-my) < 24
    );
    if(crossingNode){
      if(budget < COST_OVERPASS){ flashBudget(); return; }
      crossingNode.isOverpass = !crossingNode.isOverpass;
      budget -= COST_OVERPASS; score -= COST_OVERPASS;
      showToast(crossingNode.isOverpass
        ? '🌉 立体交差に変更しました (-'+COST_OVERPASS+'pt)'
        : '🚦 踏切に戻しました (-'+COST_OVERPASS+'pt)');
      updateBudgetButtons();
    }
    return;
  }

  // --- 非対称反転モード: asymエッジをクリックで広狭を入れ替え ---
  if(operationMode==='asymFlip'){
    let bestEdge=null, bestDist=18;
    for(const e of edges){
      if(e.type !== 'asym') continue;
      const ex=e.to.x-e.from.x, ey=e.to.y-e.from.y, el=Math.hypot(ex,ey);
      if(el<1) continue;
      const t=Math.max(0,Math.min(1,((mx-e.from.x)*ex+(my-e.from.y)*ey)/(el*el)));
      const d=Math.hypot(mx-(e.from.x+ex*t),my-(e.from.y+ey*t));
      if(d<bestDist){ bestDist=d; bestEdge=e; }
    }
    if(bestEdge){
      if(budget < COST_ASYM_FLIP){ flashBudget(); return; }
      // 対となるエッジを探す（同区間の逆向きasymエッジ）
      const pairEdge = edges.find(e2 =>
        e2.type==='asym' && e2 !== bestEdge &&
        e2.from === bestEdge.to && e2.to === bestEdge.from
      );
      // 広狭を入れ替える
      const flipEdge = (e) => {
        e.asymWide = !e.asymWide;
        const newLanes = e.asymWide ? 2 : 1;
        if(e.lanes !== newLanes){
          e.lanes = newLanes;
          // laneCarsを再構築
          const oldCars = e.laneCars.flat();
          e.laneCars = Array.from({length:newLanes}, ()=>[]);
          // 既存の車を車線0に移動してlaneCarsに再登録
          oldCars.forEach(c => {
            if(c.alive){
              c.lane = 0;
              e.laneCars[0].push(c);
            }
          });
          // ルート内のこのエッジを参照しているstepのlaneもクランプ
          for(const c of cars){
            if(!c.alive) continue;
            for(const step of c.route){
              if(step.edge === e){
                step.lane = Math.min(step.lane, newLanes - 1);
              }
            }
            // 現在走行中のエッジも確認
            if(c.edge === e){
              c.lane = Math.min(c.lane, newLanes - 1);
            }
          }
        }
      };
      flipEdge(bestEdge);
      if(pairEdge) flipEdge(pairEdge);
      budget -= COST_ASYM_FLIP; score -= COST_ASYM_FLIP;
      showToast('↔ 非対称道路を反転しました (-'+COST_ASYM_FLIP+'pt)');
      updateBudgetButtons();
    }
    return;
  }

  // --- 工事帯切替モード ---
  if(operationMode==='construction'){
    let bestEdge=null, bestDist=18;
    for(const e of edges){
      if(e.type !== 'asym') continue;
      const ex=e.to.x-e.from.x, ey=e.to.y-e.from.y, el=Math.hypot(ex,ey);
      if(el<1) continue;
      const t=Math.max(0,Math.min(1,((mx-e.from.x)*ex+(my-e.from.y)*ey)/(el*el)));
      const d=Math.hypot(mx-(e.from.x+ex*t),my-(e.from.y+ey*t));
      if(d<bestDist){ bestDist=d; bestEdge=e; }
    }
    if(bestEdge){
      if(budget < COST_CONSTRUCTION){ flashBudget(); return; }
      const pairEdge = edges.find(e2 =>
        e2.type==='asym' && e2 !== bestEdge &&
        e2.from === bestEdge.to && e2.to === bestEdge.from
      );
      const newState = !bestEdge.underConstruction;
      bestEdge.underConstruction = newState;
      if(pairEdge) pairEdge.underConstruction = newState;
      budget -= COST_CONSTRUCTION; score -= COST_CONSTRUCTION;
      showToast(newState
        ? '🚧 工事帯に変更しました (-'+COST_CONSTRUCTION+'pt)'
        : '🌿 植栽帯に戻しました (-'+COST_CONSTRUCTION+'pt)');
      updateBudgetButtons();
    }
    return;
  }

  if(operationMode==='removeCar'){
    let bestCar=null, bestDist=20;
    for(const c of cars){
      if(!c.alive||c.isPolice) continue;
      const {from,to}=c.edge;
      const cx=from.x+(to.x-from.x)*c.pos, cy=from.y+(to.y-from.y)*c.pos;
      const d=Math.hypot(mx-cx,my-cy);
      if(d<bestDist){ bestDist=d; bestCar=c; }
    }
    if(bestCar){
      if(budget<COST_REMOVE_CAR){ flashBudget(); return; }
      bestCar.die(); // laneCarsから削除して消滅
      budget-=COST_REMOVE_CAR; score-=COST_REMOVE_CAR;
      showToast('🚗 車両を撤去しました (-'+COST_REMOVE_CAR+'pt)');
      updateBudgetButtons();
    }
    return;
  }

  // --- 通常モード ---

  // 車クリック: どのモードでもプロフィール表示可能
  // getDrawPos() で実際の描画座標（車線オフセット・RA曲線含む）を使用
  {
    let clickedCar=null, bestCarDist=18; // 判定半径 18px
    for(const c of cars){
      if(!c.alive) continue;
      const pos = c.getDrawPos();
      const d=Math.hypot(mx-pos.x, my-pos.y);
      if(d<bestCarDist){ bestCarDist=d; clickedCar=c; }
    }
    if(clickedCar){
      if(selectedCar===clickedCar){
        closeCarProfile();
      } else {
        showCarProfile(clickedCar, ev.clientX, ev.clientY);
      }
      return;
    }

    // 駐車中の車クリック（駐車場ノードのparkedCars）
    // getParkingSlotPositions() で実際のスロット座標を取得して判定
    let bestParked = null, bestParkedDist = 16;
    for(const n of nodes){
      if(n.type !== 'parking' || !n.parkedCars || n.parkedCars.length === 0) continue;
      const slots = getParkingSlotPositions(n);
      for(const sl of slots){
        const d = Math.hypot(mx - sl.wx, my - sl.wy);
        const hitR = Math.max(sl.cw, sl.ch) * 0.6 + 4; // 車サイズ+余白
        if(d < hitR && d < bestParkedDist){
          bestParkedDist = d;
          bestParked = {node: n, car: sl.car};
        }
      }
    }
    if(bestParked){
      showParkedCarProfile(bestParked.node, bestParked.car, ev.clientX, ev.clientY);
      return;
    }
  } // parked car block end

  // 事故アイコンクリック
  for(let i=accidents.length-1;i>=0;i--){
    const a=accidents[i];
    if(Math.hypot(mx-a.x,my-a.y)<30){
      if(score>=300){
        score-=300; budget-=300;
        accidents.splice(i,1);
        for(const pc of policeCars){ if(pc.acc===a) pc.car.die(); }
        document.getElementById("scoreVal").textContent=Math.floor(score).toLocaleString();
        showToast('🚨 事故を処理しました');
      } else { flashBudget(); }
      return;
    }
  }

    // ガソリンスタンドのクリック
    for(const n of nodes){
      if(n.houseType !== 'gasStation') continue;
      if(Math.abs(n.x - mx) < 36 && Math.abs(n.y - my) < 36){
        showGasStationProfile(n, ev.clientX, ev.clientY);
        return;
      }
    }

    // 駅のクリック
    for(const rw of railways){
      const st = rw.station;
      if(!st || st.homeX === undefined) continue;
      const cx = st.roofX + st.roofW / 2;
      const cy = st.homeY + st.homeH / 2;
      if(Math.abs(mx - cx) < st.roofW / 2 + 8 && Math.abs(my - cy) < st.homeH / 2 + 8){
        showStationProfile(rw, ev.clientX, ev.clientY);
        return;
      }
    }

  // 交差点クリック（信号タイミング設定パネルを表示）
  selectedNode=null;
  closeSignalPanel();
  for(const n of nodes){
    if(n.type!=="cross"||n.external||!n.hasSignal) continue;
    if(Math.abs(n.x-mx)<20&&Math.abs(n.y-my)<20){
      selectedNode=n;
      openSignalPanel(n, ev.pageX, ev.pageY);
      break;
    }
  }

  // 出口ノードのクリック: 出口情報を表示
  if(!operationMode){
    const exitNode = nodes.find(n =>
      n.external && n.exitNumber !== undefined &&
      Math.hypot(n.x-mx, n.y-my) < 16
    );
    if(exitNode){
      // この出口に向かっている車の数を数える
      const heading = cars.filter(c => {
        if(!c.alive) return false;
        const dest = c.route.length > 0 ? c.route[c.route.length-1].edge.to : null;
        return dest === exitNode;
      }).length;
      showToast(`🚪 出口${exitNode.exitNumber}  向かっている車: ${heading}台`);
    }
  }
}); // canvas click end

// 一方通行ハイライト描画
function drawReverseHighlight(){
  if(!reverseHighlight) return;
  const e=reverseHighlight;
  const dx=e.to.x-e.from.x, dy=e.to.y-e.from.y;
  const angle=Math.atan2(dy,dx);
  const dist=Math.hypot(dx,dy);
  ctx.save();
  ctx.translate(e.from.x,e.from.y);
  ctx.rotate(angle);
  const roadW = e.lanes * LANE_W;
  const yTop = e.type === 'oneway' ? -roadW/2 : -roadW;
  ctx.strokeStyle='rgba(255,220,0,0.85)';
  ctx.lineWidth=4;
  ctx.setLineDash([8,4]);
  ctx.strokeRect(0, yTop, dist, roadW);
  ctx.setLineDash([]);
  ctx.fillStyle='rgba(255,220,0,0.9)';
  ctx.font='bold 14px sans-serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  const step=70;
  for(let x=step/2;x<dist;x+=step) ctx.fillText('◀',x, yTop + roadW/2);
  ctx.restore();
}
// ===== 予算・操作システム =====
const COST_INSTALL = 500;
const COST_REMOVE  = 300;
const COST_REVERSE = 800;
const COST_SIGN       = 400;  // 進行方向サイン変更
const COST_REMOVE_CAR = 200;  // 車両撤去
const COST_BLOCK      = 2000; // 道路封鎖
const COST_UNBLOCK    = 500;  // 封鎖解除
const COST_ROUNDABOUT = 1500; // ラウンドアバウト設置
const COST_OVERPASS   = 1200; // 立体交差設置
const COST_ASYM_FLIP  =  600; // 非対称道路反転
const COST_CONSTRUCTION = 400; // 工事帯切替


// ===== 進行方向サイン変更ポップアップ =====
// クリックされたエッジの交差点手前に変更UIを表示する
const SIGN_COMBOS = [
  { key:'straight',     dirs:['straight'],              label:'直進のみ' },
  { key:'right',        dirs:['right'],                 label:'右折のみ' },
  { key:'left',         dirs:['left'],                  label:'左折のみ' },
  { key:'st_right',     dirs:['straight','right'],      label:'直進・右折' },
  { key:'st_left',      dirs:['straight','left'],       label:'直進・左折' },
  { key:'right_left',   dirs:['right','left'],          label:'右折・左折' },
  { key:'st_right_left',dirs:['straight','right','left'],label:'全方向' },
  { key:'auto',         dirs:null,                      label:'自動（リセット）' },
];

function showSignEditPopup(targetEdge, autoDirs, laneIndex=null){
  const laneLabel = laneIndex !== null ? ` (車線${laneIndex+1})` : "";
  // 既存ポップアップ削除
  const old = document.getElementById('signPopup');
  if(old) old.remove();

  // ポップアップ要素生成
  const pop = document.createElement('div');
  pop.id = 'signPopup';
  pop.style.cssText = `
    position:fixed; z-index:10000; background:#1a1a2a; border:1px solid #4a8aff;
    border-radius:8px; padding:10px; font-size:13px; color:white;
    box-shadow:0 4px 16px rgba(0,0,0,0.7); min-width:160px;
  `;

  // エッジの交差点手前位置をCanvas座標→画面座標に変換
  const r = canvas.getBoundingClientRect();
  const toNode = targetEdge.to;
  const dx = toNode.x - targetEdge.from.x;
  const dy = toNode.y - targetEdge.from.y;
  const dist = Math.hypot(dx,dy);
  const ux = dx/dist, uy = dy/dist;
  const connOut = edges.filter(e2=>e2.from===toNode||e2.to===toNode);
  const trimTo = connOut.length>0 ? Math.max(...connOut.map(e2=>e2.lanes*LANE_W)) : 0;
  const placeDist = dist - trimTo - 30;
  const canvasX = targetEdge.from.x + ux * Math.max(placeDist, dist*0.5);
  const canvasY = targetEdge.from.y + uy * Math.max(placeDist, dist*0.5);
  // canvas上の座標をページ座標に変換
  const scaleX = r.width  / canvas.width;
  const scaleY = r.height / canvas.height;
  let px = r.left + canvasX * scaleX;
  let py = r.top  + canvasY * scaleY + 10;
  // 画面外にはみ出さないよう調整
  if(px + 170 > window.innerWidth)  px = window.innerWidth - 175;
  if(py + 240 > window.innerHeight) py = py - 250;

  pop.style.left = px + 'px';
  pop.style.top  = py + 'px';

  const title = document.createElement('div');
  title.textContent = '🛣 進行方向を選択' + laneLabel;
  title.style.cssText = 'font-weight:bold;margin-bottom:8px;color:#80d0ff;border-bottom:1px solid #444;padding-bottom:4px';
  pop.appendChild(title);

  // 現在の設定
  const curDirs = targetEdge.signOverride !== null ? targetEdge.signOverride : autoDirs;

  for(const combo of SIGN_COMBOS){
    const btn = document.createElement('button');
    const isCurrent = combo.key==='auto'
      ? targetEdge.signOverride === null
      : (curDirs.size===combo.dirs.length && combo.dirs.every(d=>curDirs.has(d)));

    btn.textContent = (isCurrent ? '✔ ' : '') + combo.label;
    btn.style.cssText = `
      display:block; width:100%; margin:3px 0; padding:5px 8px;
      background:${isCurrent ? '#1a4a9a' : '#2a2a3a'}; color:white;
      border:1px solid ${isCurrent ? '#4a8aff' : '#444'};
      border-radius:4px; cursor:pointer; text-align:left; font-size:12px;
    `;
    btn.onmouseover = ()=>btn.style.background='#2a4a6a';
    btn.onmouseout  = ()=>btn.style.background=isCurrent?'#1a4a9a':'#2a2a3a';

    btn.onclick = ()=>{
      if(budget < COST_SIGN){ flashBudget(); pop.remove(); return; }
      budget -= COST_SIGN;
      score  -= COST_SIGN;
      if(combo.key==='auto'){
        if(laneIndex !== null) targetEdge.signLaneOverride.delete(laneIndex);
        else { targetEdge.signOverride=null; targetEdge.signLaneOverride.clear(); }
        showToast('🛣 サインをリセットしました (-'+COST_SIGN+'pt)');
      } else {
        if(laneIndex !== null) targetEdge.signLaneOverride.set(laneIndex, new Set(combo.dirs));
        else targetEdge.signOverride = new Set(combo.dirs);
        showToast('🛣 サインを変更: '+combo.label+laneLabel+' (-'+COST_SIGN+'pt)');
      }
      pop.remove();
      signEditEdge = null;
      setMode(null);
      updateBudgetButtons();
    };
    pop.appendChild(btn);
  }

  // 閉じるボタン
  const closeBtn = document.createElement('button');
  closeBtn.textContent = '✕ キャンセル';
  closeBtn.style.cssText = 'display:block;width:100%;margin-top:6px;padding:4px;background:#333;color:#aaa;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:11px';
  closeBtn.onclick = ()=>{ pop.remove(); signEditEdge=null; setMode(null); };
  pop.appendChild(closeBtn);

  document.body.appendChild(pop);

  // 外部クリックで閉じる（少し遅延させてクリックイベントと競合しないように）
  setTimeout(()=>{
    const outside = (ev)=>{
      if(!pop.contains(ev.target)){
        pop.remove(); signEditEdge=null;
        document.removeEventListener('click', outside);
      }
    };
    document.addEventListener('click', outside);
  }, 200);
}

let _signPanelNode = null; // 現在設定中の交差点ノード

function openSignPanel(node, pageX, pageY){
  _signPanelNode = node;
  const old = document.getElementById('signPanel');
  if(old) old.remove();

  const pop = document.createElement('div');
  pop.id = 'signPanel';
  pop.style.cssText = `
    position:fixed; z-index:10500; background:rgba(15,15,30,0.97);
    border:1px solid rgba(80,200,255,0.7); border-radius:10px;
    padding:12px 14px; color:#ddd; font-size:12px;
    box-shadow:0 4px 20px rgba(0,0,0,0.85);
    min-width:240px; max-width:300px;
    pointer-events:auto; user-select:none;
  `;

  // 位置
  let px = pageX + 12, py = pageY + 12;
  if(px + 310 > window.innerWidth)  px = pageX - 315;
  if(py + 400 > window.innerHeight) py = pageY - 410;
  pop.style.left = px + 'px';
  pop.style.top  = py + 'px';

  // タイトル
  const title = document.createElement('div');
  title.style.cssText = 'font-weight:bold;font-size:13px;color:#80d0ff;margin-bottom:10px;border-bottom:1px solid #334;padding-bottom:6px;';
  title.textContent = '🛣 交差点サイン設定';
  pop.appendChild(title);

  // この交差点への入口エッジを全て取得（有効なもののみ）
  const inEdges = edges.filter(e =>
    e.to === node &&
    !e.from.external &&    // 外部入口は除外（地図端）
    e.type !== 'roundabout' &&
    e.signLaneOverride !== undefined
  );
  // 外部入口エッジも含める
  const inEdgesAll = edges.filter(e =>
    e.to === node &&
    e.type !== 'roundabout' &&
    e.signLaneOverride !== undefined
  );

  const dirLabel = {straight:'直進', right:'右折', left:'左折'};
  const COMBOS = [
    { dirs:['straight'],              label:'直進のみ' },
    { dirs:['right'],                 label:'右折のみ' },
    { dirs:['left'],                  label:'左折のみ' },
    { dirs:['straight','right'],      label:'直進・右折' },
    { dirs:['straight','left'],       label:'直進・左折' },
    { dirs:['right','left'],          label:'右折・左折' },
    { dirs:['straight','right','left'],label:'全方向' },
  ];

  // 方向計算ヘルパー
  function getAutoDir(e){
    const effFrom = getEffectiveFrom(e, node) || e.from;
    if(effFrom === node) return new Set();
    const outEdges = edges.filter(ox =>
      ox.from === node &&
      ox.to !== e.from &&          // Uターン除外: 直前ノード(e.from)で判定
      ox.to.type !== 'parking'     // parking本体への出口は除外
    );
    const fakeIn = { from: effFrom, to: node };
    return new Set(outEdges.map(ox => getDirectionType(fakeIn, ox)));
  }

  // 進入方向の角度から方角ラベルを生成
  function directionName(e){
    const dx = node.x - e.from.x, dy = node.y - e.from.y;
    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
    if(angle > -45 && angle <= 45)  return '→ 左から';
    if(angle > 45  && angle <= 135) return '↓ 上から';
    if(angle > 135 || angle <= -135) return '← 右から';
    return '↑ 下から';
  }

  if(inEdgesAll.length === 0){
    const msg = document.createElement('div');
    msg.style.color = '#888';
    msg.textContent = '設定できるエッジがありません';
    pop.appendChild(msg);
  } else {
    for(const e of inEdgesAll){
      const autoDir = getAutoDir(e);
      const section = document.createElement('div');
      section.style.cssText = 'margin-bottom:10px;border:1px solid #334;border-radius:6px;padding:8px;';

      const secTitle = document.createElement('div');
      secTitle.style.cssText = 'color:#adf;font-weight:bold;margin-bottom:6px;font-size:11px;';
      secTitle.textContent = directionName(e) + (e.lanes > 1 ? ` (${e.lanes}車線)` : '');
      section.appendChild(secTitle);

      // 各車線の設定行
      for(let ln = 0; ln < e.lanes; ln++){
        const row = document.createElement('div');
        row.style.cssText = 'display:flex;align-items:center;gap:6px;margin:3px 0;';

        const laneLabel = document.createElement('span');
        laneLabel.style.cssText = 'color:#888;font-size:10px;min-width:50px;';
        laneLabel.textContent = e.lanes > 1 ? (ln===0 ? '車線1(内)' : '車線2(外)') : '車線';
        row.appendChild(laneLabel);

        const sel = document.createElement('select');
        sel.style.cssText = 'background:#1a1a2a;color:#ddd;border:1px solid #446;border-radius:3px;padding:2px 4px;font-size:11px;cursor:pointer;flex:1;';

        // 現在の設定を取得
        const curDirs = e.signLaneOverride.has(ln)
          ? e.signLaneOverride.get(ln)
          : (e.signOverride !== null ? e.signOverride : autoDir);

        // 自動オプション
        const autoOpt = document.createElement('option');
        autoOpt.value = 'auto';
        autoOpt.textContent = '自動 (' + [...autoDir].map(d=>dirLabel[d]||d).join('・') + ')';
        autoOpt.selected = e.signOverride === null && !e.signLaneOverride.has(ln);
        sel.appendChild(autoOpt);

        for(const combo of COMBOS){
          const opt = document.createElement('option');
          opt.value = combo.dirs.join(',');
          opt.textContent = combo.label;
          const isCur = curDirs.size === combo.dirs.length &&
                        combo.dirs.every(d => curDirs.has(d));
          opt.selected = isCur && !(e.signOverride === null && !e.signLaneOverride.has(ln));
          sel.appendChild(opt);
        }

        sel.onchange = () => {
          if(budget < COST_SIGN){ flashBudget(); return; }
          if(sel.value === 'auto'){
            e.signLaneOverride.delete(ln);
            if(e.signLaneOverride.size === 0) e.signOverride = null;
          } else {
            const dirs = sel.value.split(',');
            e.signLaneOverride.set(ln, new Set(dirs));
          }
          budget -= COST_SIGN; score -= COST_SIGN;
          // 既存の走行中の車はそのまま継続（新しく生成される車から新サインが適用）
          updateBudgetButtons();
          showToast('🛣 サインを変更しました (-'+COST_SIGN+'pt)');
        };
        row.appendChild(sel);
        section.appendChild(row);
      }

      // リセットボタン
      const resetBtn = document.createElement('button');
      resetBtn.textContent = 'リセット';
      resetBtn.style.cssText = 'margin-top:4px;padding:2px 8px;background:#222;color:#888;border:1px solid #444;border-radius:3px;cursor:pointer;font-size:10px;';
      resetBtn.onclick = () => {
        if(budget < COST_SIGN){ flashBudget(); return; }
        e.signOverride = null; e.signLaneOverride.clear();
        budget -= COST_SIGN; score -= COST_SIGN;
        // select を「自動」に戻す
        for(const sel2 of section.querySelectorAll('select')) sel2.value = 'auto';
        updateBudgetButtons();
        showToast('🛣 サインをリセットしました (-'+COST_SIGN+'pt)');
      };
      section.appendChild(resetBtn);
      pop.appendChild(section);
    }
  }

  // 閉じるボタン
  const closeBtn = document.createElement('button');
  closeBtn.textContent = '✕ 閉じる';
  closeBtn.style.cssText = 'display:block;width:100%;margin-top:6px;padding:5px;background:#222;color:#aaa;border:1px solid #555;border-radius:5px;cursor:pointer;font-size:12px;';
  closeBtn.onclick = () => { pop.remove(); _signPanelNode=null; };
  pop.appendChild(closeBtn);

  document.body.appendChild(pop);

  // ドラッグ（addEventListener で競合回避）
  let dragging=false, dox=0, doy=0;
  title.style.cursor='move';
  title.addEventListener('mousedown', ev => {
    dragging=true; dox=ev.clientX-pop.offsetLeft; doy=ev.clientY-pop.offsetTop;
    ev.preventDefault();
  });
  const _mm = ev => { if(dragging){ pop.style.left=(ev.clientX-dox)+'px'; pop.style.top=(ev.clientY-doy)+'px'; } };
  const _mu = () => { dragging=false; };
  document.addEventListener('mousemove', _mm);
  document.addEventListener('mouseup',   _mu);
  // パネル削除時にイベントも削除
  const _obs = new MutationObserver(()=>{
    if(!document.getElementById('signPanel')){
      document.removeEventListener('mousemove',_mm);
      document.removeEventListener('mouseup',_mu);
      _obs.disconnect();
    }
  });
  _obs.observe(document.body, {childList:true, subtree:false});
}

// 一方通行反転: from↔to を入れ替え、走行中の車を除去
function reverseOneway(edge){
  if(budget < COST_REVERSE){ flashBudget(); return; }
  // そのエッジ上の車を全て消す
  for(let i=cars.length-1;i>=0;i--){
    if(cars[i].edge===edge) cars[i].die();
  }
  // from/to を入れ替え
  const tmp=edge.from; edge.from=edge.to; edge.to=tmp;
  // laneCars リセット
  edge.laneCars = Array.from({length:edge.lanes}, ()=>[]);
  edge.length = Math.hypot(edge.to.x-edge.from.x, edge.to.y-edge.from.y);
  budget -= COST_REVERSE;
  score  -= COST_REVERSE;
  reverseHighlight = null;
  setMode(null);
  showToast('🔀 一方通行を反転しました');
}
